<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8"/>
<title>Larraun Kartela Paginado - Stories</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

/* ================= BASE ================= */

body{
  margin:0;
  background:#1b4d31;
  font-family:"Trebuchet MS","Arial Black",sans-serif;
}

.exportar{
  text-align:center;
  margin:18px;
}

.exportar button {
  background: #ff0050;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.exportar button:hover {
  transform: scale(1.05);
}

/* ================= A3 adaptado a Stories ================= */
.pagina{
  width:1080px; /* Ancho para stories */
  margin:30px auto;
  display:flex;
  flex-direction:column;
  background:#3f8159;
  position:relative;
  box-shadow:0 0 18px rgba(0,0,0,.4);
}

/* ================= HEADER ================= */

.header{
  height:140px; /* Un poco más alto para stories */
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(#3d6fe6, #2448b5);
  box-shadow: inset 0 -10px 18px rgba(0,0,0,.35);
}

.header::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:40px;
  background:linear-gradient(rgba(255,255,255,.35), transparent);
}

/* logos laterales */
.logo-izq,.logo-der{
  position:absolute;
  top:25px;
  height:95px; /* Más grandes */
}
.logo-izq{ left:20px; }
.logo-der{ right:20px; }

.titulo-curvo{
  width:100%;
  height:120px;
}

.titulo-curvo text{
  font-size:38px; /* Más grande */
  font-weight:900;
  fill:white;
  letter-spacing:2px;
}

.pelota-real{
  position:absolute;
  top:75px;
  left:50%;
  transform:translateX(-50%);
  width:35px;
  height:35px;
  border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #ffffff 0%, #f5f5f5 40%, #e2e2e2 65%, #cfcfcf 100%);
  border:1.5px solid #d9d9d9;
  box-shadow: inset -4px -6px 10px rgba(0,0,0,.35), inset 4px 4px 8px rgba(255,255,255,.9), 0 3px 5px rgba(0,0,0,.4);
}

.pelota-real::before,
.pelota-real::after{
  content:"";
  position:absolute;
  width:80%;
  height:42%;
  left:10%;
  border-top:1.8px solid #c40000;
  border-radius:50%;
  opacity:.85;
}

.pelota-real::before{ top:7px; }
.pelota-real::after{ bottom:7px; }

/* ================= CHAPAS ================= */

.chapa{
  height:12px;
  background:#000;
}

/* ================= PELOTAZOS ================= */

.pelotazos{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:20;
  mix-blend-mode:multiply;
}

.pelota-dot{
  position:absolute;
  border-radius:50%;
  background:#000;
  opacity:.25;
}

/* ================= CONTENIDO ================= */

.contenido{
  flex:1;
  padding:25px;
  overflow:hidden;
}

/* ================= BLOQUES ================= */

.bloque h2{
  text-align:center;
  margin:28px 0 18px 0;
  color:#f2f2f2;
  font-size:30px; /* Más grande */
  font-weight:900;
  letter-spacing:3px;
  text-shadow: 0 2px 0 #fff, 0 -2px 0 rgba(0,0,0,.5), 2px 3px 4px rgba(0,0,0,.6);
}

/* ================= PARTIDOS ================= */

.grupo{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:10px;
}

.grupo-header{
  padding:8px 14px;
  font-weight:bold;
  color:#fff;
  background:#2448b5;
  font-size:15px;
}

.grupo-header.rojo{
  background:#b00000;
}

.linea{
  display:flex;
  padding:8px 12px;
  border-top:1px solid #ddd;
  font-size:15px;
  align-items:center;
  font-weight:900;
  border-radius:4px;
  transition: all 0.2s ease;
}

.linea.finala-linea {
  background: repeating-linear-gradient(
    45deg,
    rgba(255, 215, 0, 0.25) 0px,
    rgba(255, 215, 0, 0.25) 20px,
    rgba(220, 220, 220, 0.25) 20px,
    rgba(220, 220, 220, 0.25) 40px
  );
  border-left: 4px solid #d4af37;
  border-right: 4px solid #d4af37;
  position: relative;
  padding: 14px 12px;
}

.larraun{
  font-weight:900;
  font-size:17px;
}

.zkia{
  flex:0 0 4%;
  font-size:14px;
}

.etxekoa{
  flex:0 0 32%;
  color:#103c54;
  font-size:15px;
}

.kanpokoa{
  flex:0 0 32%;
  color:#b00000;
  font-size:15px;
}

.equipo{
  line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
}

.lehiaketa{
  flex:0 0 32%;
  text-align:right;
  font-size:14px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:8px;
  min-height: 50px;
}

.fase{
  font-size:12px;
  font-weight:700;
  padding:3px 8px;
  border-radius:8px;
  background:#e7d3c2;
  color:#5a2d0c;
  white-space:nowrap;
  letter-spacing:.5px;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.fase-finala{
  background:linear-gradient(145deg, #c9a227, #f7e27a);
  color:#000;
  font-weight:900;
  font-size:14px;
  padding: 16px 8px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.8);
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid #b38b1e;
  line-height: 1.2;
  min-width: 70px;
  height: auto;
  white-space: nowrap;
  position: relative;
  overflow: visible;
  z-index: 2;
}

/* ================= FOOTER ================= */

.footer{
  display:flex;
  flex-direction:column;
}

.chapa{
  height:12px;
  background:#000;
}

.pie-gris{
  padding:16px 14px;
  background:linear-gradient(#4a4a4a, #2f2f2f);
  box-shadow: inset 0 10px 14px rgba(255,255,255,.25), inset 0 -12px 18px rgba(0,0,0,.6);
}

.logos-grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:10px;
}

.logo-item{
  background:#fff;
  padding:8px;
  border-radius:8px;
}

.logo-item img{
  width:100%;
  height:42px;
  object-fit:contain;
}

/* ================= INDICADOR DE PÁGINA ================= */
.page-indicator {
  position: absolute;
  bottom: 20px;
  right: 30px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  z-index: 100;
  border: 2px solid gold;
}

/* ================= BOTONES DE EXPORTACIÓN ================= */
.export-options {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

</style>
</head>

<body>

<div class="exportar">
  <div class="export-options">
    <button onclick="exportarTodasLasPaginas()">📱 EXPORTAR TODAS LAS STORIES (9:16)</button>
    <button onclick="exportarPaginaActual()">📸 EXPORTAR PÁGINA ACTUAL</button>
  </div>
  <div id="pageCounter" style="margin-top: 10px; color: white; font-size: 16px;"></div>
</div>

<div id="contenedorPaginas"></div>

<script>

  let FASES = {};
  let CATEGORIAS = {};
  let paginas = [];
  let paginaActual = 0;

/* ================= CREAR HEADER/FOOTER REUTILIZABLE ================= */

function crearHeader(){
 return `
 <div class="header">
   <img src="images/logo-larraun.png" class="logo-izq">
   <img src="images/logo-fnp.png" class="logo-der">

   <svg class="titulo-curvo" viewBox="0 0 1080 140">
     <path id="arco" d="M70,130 Q540,-70 1010,130" fill="transparent"/>
     <text text-anchor="middle">
       <textPath href="#arco" startOffset="50%">LARRAUN PILOTA ELKARTEA</textPath>
     </text>
   </svg>

   <div class="pelota-real"></div>
 </div>
 <div class="chapa"></div>
 `;
}

function crearFooter(numPagina, totalPaginas){
 return `
 <div class="chapa"></div>

<div class="footer">
  <div class="pie-gris">
    <div class="logos-grid"></div>
  </div>
</div>
<div class="page-indicator">${numPagina}/${totalPaginas}</div>
 `;
}

/* ================= CREAR NUEVA PÁGINA ================= */

function nuevaPagina(numPagina, totalPaginas){

 const p=document.createElement("div");
 p.className="pagina";
 p.id = `pagina-${numPagina}`;

 const pel=document.createElement("div");
 pel.className="pelotazos";
 p.appendChild(pel);

 p.insertAdjacentHTML("beforeend",
   crearHeader()+
   `<div class="contenido"></div>`+
   crearFooter(numPagina, totalPaginas)
 );

 document.getElementById("contenedorPaginas").appendChild(p);
 paginas.push(p);

 return p.querySelector(".contenido");
}

function generarPelotazos(contenedor){
 const altura = document.querySelector(".pagina").scrollHeight;

 for(let i=0;i<6000;i++){
   const d=document.createElement("div");
   const s=Math.random()*4+2;

   d.className="pelota-dot";
   d.style.width=d.style.height=s+"px";
   d.style.left=Math.random()*1080+"px";
   d.style.top=Math.random()*altura+"px";

   contenedor.appendChild(d);
 }
}

function rellenarLogos(pagina){

 const LOGOS=[
 "aliprox.jpg","arbeondo.jpg","asadorepeleta.jpg","barainhoa.jpg","kotxera.jpg",
 "barilargi.jpg","barlekuonberri.jpg","begoñajanaridenda.jpg","carniceriaartxueta.jpg",
 "carpinteriahnosazpiroz.jpg","construccionesgañarbe.jpg","construccionesgarciarenasaralegi.jpg",
 "construccionesurangasaigos.jpg","hotelayestaran.jpg",
 "iseelectricidad.jpg","kattagorrielkartea.jpg","lacturale.jpg","lagunasesoria.jpg",
 "maderasnasorena.jpg","maskarada.jpg","suacontrol.jpg","urzubi.jpg",
 "ventamugiro.jpg","dietistaanagurrea.jpg","ekin.jpg",
 "farmaciaitziarmendia.png","fontaneriabalenciaga.jpg","fontaneriairibarren.jpg",
 "izarberri.png","lakita.jpg","sidreriatokialai.jpg","tallereslarraun.jpg",
 "talleresotxotorena.jpg","veterinarialekunberri.jpg"
 ];

 const grid=pagina.querySelector(".logos-grid");

 grid.innerHTML = LOGOS
   .map(f=>`<div class="logo-item"><img src="images/patrocinio/${f}"></div>`)
   .join("");
}

/* ================= CREAR BLOQUES PARTIDOS ================= */
function formatearEquipo(texto){
  if(!texto) return "";
  return texto.replace(" (","<br>(");
}

function formatearLehiaketa(texto, esFinala = false){
  if(!texto) return "";

  const fasesOrdenadas = Object.values(FASES)
    .sort((a,b)=> b.length - a.length);

  let textoProcesado = texto;
  let faseEncontrada = null;

  for(const fase of fasesOrdenadas){
    const regex = new RegExp(`\\b${fase}\\b`, "g");

    if(regex.test(textoProcesado)){
      faseEncontrada = fase;
      let claseExtra = "";

      if(fase.toUpperCase() === "FINALA"){
        claseExtra = " fase-finala";
      }

      textoProcesado = textoProcesado.replace(
        regex,
        `<span class="fase${claseExtra}">${fase}</span>`
      );
      break;
    }
  }

  return textoProcesado;
}

function generarClasesCategorias(){
  const style = document.createElement("style");
  let css = "";

  for(const cat in CATEGORIAS){
    css += `
      .cat-${cat}{
        background:${CATEGORIAS[cat]};
      }
    `;
  }

  style.innerHTML = css;
  document.head.appendChild(style);
}

function obtenerClaseCategoria(texto){
  if(!texto) return "";

  const textoLower = texto.toLowerCase();

  for(const cat in CATEGORIAS){
    if(textoLower.includes(cat.toLowerCase())){
      return "cat-"+cat;
    }
  }
  return "";
}

function crearBloques(titulo,data){
 if(!data || data.length===0) return [];

 const arr=[];

 const h2=document.createElement("div");
 h2.className="bloque";
 h2.innerHTML=`<h2>${titulo}</h2>`;
 arr.push(h2);

 const dataFiltrada = data.filter(p=>{
   const e=(p.etxekoa||"").toLowerCase();
   const k=(p.kanpokoak||"").toLowerCase();

   return !(
     e.includes("descanso") ||
     e.includes("atseden") ||
     k.includes("descanso") ||
     k.includes("atseden")
   );
 });

 dataFiltrada.sort((a,b)=>{
   const fechaA = new Date(a.fecha.replace(/\//g,"-"));
   const fechaB = new Date(b.fecha.replace(/\//g,"-"));
   if(fechaA - fechaB !== 0) return fechaA - fechaB;
   if(a.hora !== b.hora){
     return a.hora.localeCompare(b.hora);
   }
   return (a.fronton || "").localeCompare(b.fronton || "");
 });

 const grupos={};

 dataFiltrada.forEach(p=>{
   const key = p.fecha+"|"+p.hora+"|"+p.fronton;
   if(!grupos[key]) grupos[key]=[];
   grupos[key].push(p);
 });

 Object.values(grupos).forEach(partidos=>{
   const g=document.createElement("div");
   g.className="grupo";

   const fronton = partidos[0].fronton || "";
   const esLocal = fronton.toLowerCase().includes("lekunberri") || fronton.toLowerCase().includes("aldatz");
   const colorClase = esLocal ? "" : " rojo";

   g.innerHTML=`
     <div class="grupo-header${colorClase}">
       ${partidos[0].fecha} | ${partidos[0].hora} | ${fronton}
     </div>
     ${partidos.map(p => {
       const esFinala = p.lehiaketa && p.lehiaketa.toUpperCase().includes("FINALA");
       
       let etx = formatearEquipo(p.etxekoa);
       let kan = formatearEquipo(p.kanpokoak);

       if(etx.toLowerCase().includes("larraun")){
         etx = "<strong>"+etx+"</strong>";
       }
       if(kan.toLowerCase().includes("larraun")){
         kan = "<strong>"+kan+"</strong>";
       }

       const lineaClass = esFinala ? "linea finala-linea" : "linea";
       
       return `
         <div class="${lineaClass} ${obtenerClaseCategoria(p.lehiaketa)}">
           <div class="zkia">${p.zkia}</div>
           <div class="etxekoa">${etx}</div>
           <div class="kanpokoa">${kan}</div>
           <div class="lehiaketa">${formatearLehiaketa(p.lehiaketa, esFinala)}</div>
         </div>
       `;
     }).join("")}
   `;

   arr.push(g);
 });

 return arr;
}

/* ================= DIVIDIR CONTENIDO EN PÁGINAS ================= */
function dividirEnPaginas(bloques) {
  const paginasContenido = [];
  let paginaActual = [];
  let alturaActual = 0;
  const ALTURA_MAXIMA = 1400; // Altura máxima para stories (ajustable)

  bloques.forEach(bloque => {
    // Estimación aproximada de altura (200px por bloque)
    const alturaBloque = bloque.tagName === 'H2' ? 100 : 200;
    
    if (alturaActual + alturaBloque > ALTURA_MAXIMA && paginaActual.length > 0) {
      paginasContenido.push(paginaActual);
      paginaActual = [bloque];
      alturaActual = alturaBloque;
    } else {
      paginaActual.push(bloque);
      alturaActual += alturaBloque;
    }
  });

  if (paginaActual.length > 0) {
    paginasContenido.push(paginaActual);
  }

  return paginasContenido;
}

/* ================= FETCH + CONSTRUIR ================= */

Promise.all([
 fetch("data/cartelera-larraun.json").then(r=>r.json()),
 fetch("data/partidos-no-oficiales.json").then(r=>r.json()),
 fetch("data/fases.json").then(r=>r.json()),
 fetch("data/categoriacartel.json").then(r=>r.json())
]).then(([oficiales,noOficiales,fases,categorias])=>{

 FASES = fases;
 CATEGORIAS = categorias;

 generarClasesCategorias();

 const todosBloques = [
   ...crearBloques("FNP PARTIDUAK", oficiales),
   ...crearBloques("BESTE TXAPELKETAK OFIZIALAK", noOficiales.filter(p=>p.ofiziala==="true")),
   ...crearBloques("TXAPELKETAK EZ OFIZIALAK", noOficiales.filter(p=>p.ofiziala!=="true"))
 ];

 // Dividir en páginas
 const paginasDivididas = dividirEnPaginas(todosBloques);
 const totalPaginas = paginasDivididas.length;

 // Crear páginas
 paginasDivididas.forEach((bloquesPagina, index) => {
   const contenido = nuevaPagina(index + 1, totalPaginas);
   bloquesPagina.forEach(b => contenido.appendChild(b.cloneNode(true)));
   
   // Añadir pelotazos a cada página
   const pel = document.querySelectorAll(".pelotazos")[index];
   generarPelotazos(pel);
   
   // Rellenar logos
   rellenarLogos(paginas[index]);
 });

 // Mostrar contador de páginas
 document.getElementById('pageCounter').innerHTML = `📱 ${totalPaginas} páginas generadas para Stories`;

});

/* ================= FUNCIONES DE EXPORTACIÓN ================= */

async function exportarPaginaActual() {
  const pagina = document.querySelector(".pagina");
  if (!pagina) return;

  const canvas = await html2canvas(pagina, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#3f8159',
    windowWidth: 1080,
    windowHeight: 1920
  });

  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/jpeg", 0.95);
  a.download = `kartela-story-${new Date().getTime()}.jpg`;
  a.click();
}

async function exportarTodasLasPaginas() {
  const paginas = document.querySelectorAll(".pagina");
  
  for (let i = 0; i < paginas.length; i++) {
    const pagina = paginas[i];
    
    // Mostrar progreso
    document.getElementById('pageCounter').innerHTML = `📸 Exportando página ${i+1}/${paginas.length}...`;
    
    const canvas = await html2canvas(pagina, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#3f8159',
      windowWidth: 1080,
      windowHeight: 1920,
      allowTaint: false,
      logging: false
    });

    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/jpeg", 0.95);
    a.download = `kartela-story-${(i+1).toString().padStart(2, '0')}.jpg`;
    a.click();
    
    // Pequeña pausa entre descargas
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  
  document.getElementById('pageCounter').innerHTML = `✅ ¡${paginas.length} stories exportadas!`;
}

</script>

</body>
</html>
