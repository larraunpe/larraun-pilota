/* ================= HEADER ================= */

/* ================= PARTIDO ================= */

.partido{
  position:relative;
  background:#fff;
  border-radius:6px;
  margin-bottom:26px;
  overflow:visible;
}

.partido::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-14px;
  height:8px;
  background-image: radial-gradient(#0b2350 2px, transparent 2px);
  background-size:12px 8px;
}

.partido::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.45;
}

.win::before{ background-image: var(--pelotas-verdes); }
.lose::before{ background-image: var(--pelotas-rojas); }
.rest::before{ background-image: var(--pelotas-grises); }

/* ================= CABECERA ================= */

.partido-header{
  font-family:'Share Tech Mono', monospace;
  font-size:12px;
  padding:4px 8px;
  color:#fff;
  text-decoration:none;
  letter-spacing:1px;
  display:flex;
  align-items:center;
}

.partido-header span{
  white-space:nowrap;
}

.partido-header::after{

.azul{ background:#2f5fd2; box-shadow: inset 0 0 8px rgba(255,255,255,.4); }
.granate{ background:#8b3a4a; }

.pixelado{

.fila img:first-child{justify-self:start}
.fila img:last-child{justify-self:end}

// ================= PELOTAS =================

function generarPelotas(color){
  let dots=[];
  for(let i=0;i<60;i++){
    const x=Math.random()*100;
    const y=Math.random()*100;
    const r=2+Math.random()*3;
    dots.push(`radial-gradient(circle ${r}px at ${x}% ${y}%, ${color} 98%, transparent)`);
  }
  return dots.join(",");
}

document.documentElement.style.setProperty('--pelotas-verdes', generarPelotas('#19c93f'));
document.documentElement.style.setProperty('--pelotas-rojas', generarPelotas('#ff6b6b'));
document.documentElement.style.setProperty('--pelotas-grises', generarPelotas('#bdbdbd'));

// ================= UTIL =================

function dividirEquipo(txt){
  if(!txt) return { principal: "", resto: "" };
  txt = txt.replace(" (","<br>(");
  const partes=txt.split(")");
  const principal=partes[0]+")";
  const resto=partes.slice(1).join(")").trim();
  return {principal, resto};
}

function logoClub(nombre){
  if(!nombre) return "";
  if(nombre.toLowerCase().includes("atseden"))
    return `<img class="logo pixelado" src="images/ATSEDENA.jpg" onerror="this.style.display='none'">`;

  const limpio = nombre
    .split("(")[0]
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[.,]/g,"")
    .replace(/–/g,"-")
    .replace(/-/g," ")
    .trim()
    .toUpperCase();

  const archivo = limpio.replace(/\s+/g,"-");
  return `<img class="logo pixelado" src="images/clubes/${archivo}.jpg" onerror="this.src='images/clubes/DEFAULT.jpg'">`;
}

function estado(p){
  const texto=(p.modalidad||"").toLowerCase();
  if(texto.includes("atseden") || texto.includes("descanso")) return "rest";
  if(!p.tanteoa) return "";
  const [a,b]=p.tanteoa.split("-").map(Number);
  if((p.etxekoa||"").includes("LARRAUN"))
    return a>b?"win":"lose";
  else
    return b>a?"win":"lose";
}

function ordenar(lista){
  return lista.sort((a,b)=>{
    const fa=new Date(a.fecha+"T"+(a.hora||"00:00"));
    const fb=new Date(b.fecha+"T"+(b.hora||"00:00"));
    return fb - fa;
  });
}

function filtrarPeriodo(lista){
  const hoy=new Date();
  hoy.setHours(23,59,59,999);
  const diaSemana=hoy.getDay();
  const diasAtras=diaSemana===0?6:diaSemana-1;
  const inicioSemanaActual=new Date(hoy);
  inicioSemanaActual.setDate(hoy.getDate()-diasAtras);
  inicioSemanaActual.setHours(0,0,0,0);
  const inicioSemanaPasada=new Date(inicioSemanaActual);
  inicioSemanaPasada.setDate(inicioSemanaActual.getDate()-7);
  return lista.filter(p=>{
    const f=new Date(p.fecha+"T00:00");
    return f>=inicioSemanaPasada && f<=hoy;
  });
}

// ================= RENDER =================

let FASES = {};
let CATEGORIAS = {};

function generarClasesCategorias(){
  const style = document.createElement("style");
  let css = "";
  for(const cat in CATEGORIAS){
    css += `.cat-${cat}{ background-color:${CATEGORIAS[cat]}; }`;
  }
  style.innerHTML = css;
  document.head.appendChild(style);
}

function obtenerClaseCategoria(texto){
  if(!texto) return "";
  const textoLower = texto.toLowerCase();
  for(const cat in CATEGORIAS){
    if(textoLower.includes(cat.toLowerCase())){
      return "cat-"+cat;
    }
  }
  return "";
}

function extraerFase(texto){
  if(!texto) return { limpio:texto, etiqueta:"" };
  const fasesOrdenadas = Object.values(FASES).sort((a,b)=> b.length - a.length);
  for(const fase of fasesOrdenadas){
    const regex = new RegExp(`\\b${fase}\\b`, "i");
    if(regex.test(texto)){
      const textoLimpio = texto.replace(regex,"").trim();
      let claseExtra = "";
      if(fase.toUpperCase() === "FINALA") claseExtra = " fase-finala";
      const etiqueta = `<span class="fase${claseExtra}">${fase}</span>`;
      return { limpio:textoLimpio, etiqueta };
    }
  }
  return { limpio:texto, etiqueta:"" };
}

// ================= GENERACIÓN DE QR CON API DE QR SERVER (MÁS ESTABLE) =================

function generarQRServer(url, size = 90) {
  // Usar qrserver.com que es muy estable y no tiene problemas de CORS
  const encodedUrl = encodeURIComponent(url);
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodedUrl}&margin=0`;
}

function crearQRConRetry(url, elementId) {
  const qrUrl = generarQRServer(url, 70);
  const img = document.createElement('img');
  img.className = 'qr-code-img';
  img.alt = 'QR code';
  img.style.cursor = 'pointer';
  
  // Manejar carga exitosa
  img.onload = () => {
    const container = document.getElementById(elementId);
    if (container) {
      container.innerHTML = '';
      container.appendChild(img);
      // Añadir también el label
      const label = document.createElement('div');
      label.className = 'qr-label';
      label.textContent = '📱 ESCANEA';
      container.appendChild(label);
    }
  };
  
  // Manejar error
  img.onerror = () => {
    console.log('Error cargando QR para:', url);
    const container = document.getElementById(elementId);
    if (container) {
      container.innerHTML = '<div class="qr-loading">⚠️</div>';
      const label = document.createElement('div');
      label.className = 'qr-label';
      label.textContent = 'ERROR';
      container.appendChild(label);
      // Intentar con otra API como fallback
      img.src = `https://quickchart.io/qr?text=${encodeURIComponent(url)}&size=70&margin=0`;
      img.onload = () => {
        container.innerHTML = '';
        container.appendChild(img);
        const newLabel = document.createElement('div');
        newLabel.className = 'qr-label';
        newLabel.textContent = '📱 ESCANEA';
        container.appendChild(newLabel);
      };
    }
  };
  
  img.src = qrUrl;
  return img;
}

  const esAzul = fronton.includes("lekunberri") || fronton.includes("aldatz");
  const colorHeader = esAzul ? "azul" : "granate";
  const est = estado(p);

  const [a,b] = (p.tanteoa||"").split("-");
  const faseTexto = p.lehiaketa || p.modalidad || "";
  const esFinala = faseTexto.toUpperCase().includes("FINALA");
  
  let icono = "";
  if(est==="win"){
    icono = esFinala ? `<div class="icono-resultado gana">🥇</div>` : `<div class="icono-resultado gana">✔</div>`;

    icono = esFinala ? `<div class="icono-resultado pierde">🥈</div>` : `<div class="icono-resultado pierde">✖</div>`;
  }

  const faseData = extraerFase(p.lehiaketa || p.modalidad);
  const urlPartido = p.url || "#";
  const qrId = "qr_" + Math.random().toString(36).substr(2, 9);
  
  const div = document.createElement("div");
  div.className = "partido " + est + " " + obtenerClaseCategoria(p.lehiaketa || p.modalidad) + (esFinala ? " partido-finala" : "");
  
  const qrHtml = (urlPartido !== "#" && urlPartido) ? `
    <div id="${qrId}" class="qr-cell" onclick="window.open('${urlPartido}', '_blank')" style="cursor:pointer;">
      <div class="qr-loading">📱</div>
      <div class="qr-label">CARGANDO...</div>
    </div>
  ` : `
    <div class="qr-cell" style="opacity:0.4; cursor:default;">
      <div style="width:65px;height:65px;background:#f0f0f0;border-radius:6px;margin:0 auto;display:flex;align-items:center;justify-content:center;">❌</div>
      <div class="qr-label">SIN INFO</div>
    </div>
  `;
  
  div.innerHTML = `
    <a href="${urlPartido}" target="_blank" class="partido-header ${colorHeader}">
      <span>${p.fecha} · ${p.fronton} · ${urlPartido !== "#" ? `<u>${faseData.limpio}</u>` : faseData.limpio} ${faseData.etiqueta}</span>
    </a>
    <div class="fila">
      ${logoClub(p.etxekoa)}
      <div class="local">
        <div class="principal">${eq1.principal}</div>
        ${eq1.resto?`<div class="pelotaris">${eq1.resto}</div>`:""}
      </div>
      <div class="score">
        <div class="resultado-linea">
          <span class="blue">${a||""}</span>
          <span class="icono-wrapper">${icono}</span>
          <span class="red">${b||""}</span>
        </div>
        ${p.sets?`<div class="sets">${p.sets}</div>`:""}
      </div>
      <div class="visit">
        <div class="principal">${eq2.principal}</div>
        ${eq2.resto?`<div class="pelotaris">${eq2.resto}</div>`:""}
      </div>
      ${logoClub(p.kanpokoak)}
      ${qrHtml}
    </div>
  `;
  
  // Generar QR después de insertar en DOM
  if (urlPartido !== "#" && urlPartido) {
    setTimeout(() => {
      const container = div.querySelector(`#${qrId}`);
      if (container) {
        crearQRConRetry(urlPartido, qrId);
      }
    }, 50);
  }
  
  return div;
}

function bloque(titulo, lista, clase){
  if(!lista.length) return document.createDocumentFragment();
  const frag = document.createDocumentFragment();
  const h = document.createElement("div");
  h.className = "titulo-seccion " + clase;
  h.textContent = titulo;
  frag.appendChild(h);
  lista.forEach(p => frag.appendChild(crearPartido(p)));
  return frag;
}

// ================= CARGA DE DATOS =================

async function cargarDatos() {
  // Cargar datos de ejemplo primero
  FASES = DATOS_EJEMPLO.fases;
  CATEGORIAS = DATOS_EJEMPLO.categorias;
  generarClasesCategorias();
  
  const lista = document.getElementById("lista");
  const todos = filtrarPeriodo([...DATOS_EJEMPLO.larraun, ...DATOS_EJEMPLO.noOficiales]);
  
  const nkj = todos.filter(p => DATOS_EJEMPLO.larraun.some(e => e === p));
  const ofizial = todos.filter(p => !DATOS_EJEMPLO.larraun.some(e => e === p) && p.ofiziala === true);
  const ezOfizial = todos.filter(p => !DATOS_EJEMPLO.larraun.some(e => e === p) && p.ofiziala !== true);
  
  lista.appendChild(bloque("NEPF EMAITZAK", ordenar(nkj), "bloque-nkj"));
  lista.appendChild(bloque("BESTE TXAPELKETAK OFIZIALAK", ordenar(ofizial), "bloque-ofizial"));
  lista.appendChild(bloque("TXAPELKETAK EZ OFIZIALAK", ordenar(ezOfizial), "bloque-ezofizial"));
  
  // Intentar cargar datos reales
  try {
    const [larraunReal, noOficialesReal, fasesReal, categoriasReal] = await Promise.all([
      fetch("data/resultados-larraun.json").then(r => r.json()).catch(() => null),
      fetch("data/resultados-no-oficiales.json").then(r => r.json()).catch(() => null),
      fetch("data/fases.json").then(r => r.json()).catch(() => null),
      fetch("data/categoriacartel.json").then(r => r.json()).catch(() => null)
    ]);
    
    if(larraunReal && noOficialesReal && larraunReal.length > 0) {
      FASES = fasesReal || DATOS_EJEMPLO.fases;
      CATEGORIAS = categoriasReal || DATOS_EJEMPLO.categorias;
      generarClasesCategorias();
      
      const todosReales = filtrarPeriodo([...larraunReal, ...noOficialesReal]);
      const nkjReal = todosReales.filter(p => larraunReal.includes(p));
      const ofizialReal = todosReales.filter(p => !larraunReal.includes(p) && (p.ofiziala === true || p.ofiziala === "true"));
      const ezOfizialReal = todosReales.filter(p => !larraunReal.includes(p) && !(p.ofiziala === true || p.ofiziala === "true"));
      
      lista.innerHTML = "";
      lista.appendChild(bloque("NEPF EMAITZAK", ordenar(nkjReal), "bloque-nkj"));
      lista.appendChild(bloque("BESTE TXAPELKETAK OFIZIALAK", ordenar(ofizialReal), "bloque-ofizial"));
      lista.appendChild(bloque("TXAPELKETAK EZ OFIZIALAK", ordenar(ezOfizialReal), "bloque-ezofizial"));
    }
  } catch(e) {
    console.log("Usando datos de ejemplo");
  }
}

// Iniciar
cargarDatos();

// ================= EXPORTAR A JPG =================

document.getElementById("btnExportar").addEventListener("click", async () => {
  const btn = document.getElementById("btnExportar");
  btn.style.display = "none";
  await document.fonts.ready;
  await new Promise(resolve => setTimeout(resolve, 1000));
  
  const bloques = Array.from(document.querySelector("#lista").children);
  const headerHTML = document.querySelector(".header").outerHTML;
  const footerHTML = document.querySelector(".patrocinadores").outerHTML;
  
  const paginas = [];
  let paginaActual = crearPagina(headerHTML, footerHTML);
  document.body.appendChild(paginaActual);
  let contenedor = paginaActual.querySelector(".contenido");
  
  for (const bloque of bloques) {
    const clon = bloque.cloneNode(true);
    contenedor.appendChild(clon);
    if (paginaActual.scrollHeight > 1587) {
      contenedor.removeChild(clon);
      paginas.push(paginaActual);
      paginaActual = crearPagina(headerHTML, footerHTML);
      document.body.appendChild(paginaActual);
      contenedor = paginaActual.querySelector(".contenido");
      contenedor.appendChild(clon);
    }
  }
  paginas.push(paginaActual);
  
  let contador = 1;
  for (const pagina of paginas) {
    const canvas = await html2canvas(pagina, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
    const enlace = document.createElement("a");
    enlace.download = `larraun-emaitzak-${contador}.jpg`;
    enlace.href = canvas.toDataURL("image/jpeg", 0.95);
    enlace.click();
    contador++;
  }
  paginas.forEach(p => p.remove());
  btn.style.display = "block";
});

function crearPagina(headerHTML, footerHTML){
  const pagina = document.createElement("div");
  pagina.className = "pagina-a3";
  pagina.innerHTML = `${headerHTML}<div class="contenido" style="padding:20px;"></div>${footerHTML}`;
  return pagina;
}
