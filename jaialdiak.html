<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaialdiak – Larraun Pilota Elkartea</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;margin:0;}
h1{text-align:center;color:#33691e;margin-bottom:20px;font-weight:normal;}
.table-container{overflow-x:auto;max-width:1000px;margin:auto;}
table{width:100%;border-collapse:collapse;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.2);}
thead{background:#7cb342;color:white;}
th,td{padding:12px 8px;border:1px solid #ccc;text-align:center;}
th{font-weight:900;}
input{width:100%;border:none;background:#e8f5e9;padding:8px;font-size:1em;box-sizing:border-box;}
input:focus{outline:2px solid #7cb342;background:#fff;}

/* Senior BAI en azul */
.senior-bai {
  background-color: #2196F3 !important;
  color: white !important;
  font-weight: bold;
}

/* Estilo para la fila completa (mantenemos los laterales) */
.lateral-jaianjai{box-shadow:inset 6px 0 0 #1565c0;}
.lateral-trinkete{box-shadow:inset 6px 0 0 #2e7d32;}
.lateral-default{box-shadow:inset 6px 0 0 #3f51b5;}

.loading{text-align:center;padding:40px;font-size:1.2em;color:#666;}
.error{text-align:center;padding:40px;color:#c62828;background:#ffebee;}
.guardado{background:#e8f5e9!important;transition:background 0.3s;}
</style>
</head>

<body>

<h1>JAIALDIAK</h1>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>EGUNA</th>
        <th>ORDUA</th>
        <th>LEKUA</th>
        <th>ZB</th>
        <th>SENIOR</th>
        <th>EPAILEA(K)</th>
      </tr>
    </thead>
    <tbody id="taula">
      <tr><td colspan="6" class="loading">Datuak kargatzen...</td></tr>
    </tbody>
  </table>
</div>

<script>
// --- CONFIGURACIÓN ---
// IMPORTANTE: Reemplaza con tu URL de Google Apps Script
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyj70d0n6jlVld_wE2QO8Hk8iF6gXuxHCcQZ36r4sC4raJF1DnMXxOkrvc0spWhWHwJ/exec";
const SENIOR_RE = /(NAGUSI|HELDUA|SENIOR|ESPAINA|ABSOLUTO)/i;

// Estado de la aplicación
let epaileakData = [];

/* =========================
   Cargar árbitros desde Google Sheets
========================= */
async function cargarEpaileak() {
  try {
    console.log("Cargando árbitros...");
    const response = await fetch(SCRIPT_URL);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const data = await response.json();
    epaileakData = Array.isArray(data) ? data : [];
    console.log(`${epaileakData.length} árbitros cargados`);
    return epaileakData;
  } catch (error) {
    console.error("Error al cargar árbitros:", error);
    epaileakData = [];
    return [];
  }
}

/* =========================
   Guardar en Google Sheets
========================= */
async function guardar(fecha, hora, fronton, value, inputElement) {
  // Feedback visual: cambiar color mientras guarda
  const originalBg = inputElement.style.backgroundColor;
  inputElement.style.backgroundColor = "#fff9c4";
  
  try {
    const params = new URLSearchParams({
      fecha: fecha,
      hora: hora,
      fronton: fronton,
      epailea: value
    });

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: params.toString()
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const result = await response.json();
    console.log("Guardado OK:", result);
    
    // Feedback visual: verde de éxito
    inputElement.style.backgroundColor = "#c8e6c9";
    setTimeout(() => {
      inputElement.style.backgroundColor = originalBg;
    }, 500);

    // Actualizar epaileakData
    const index = epaileakData.findIndex(item =>
      item.fecha === fecha && item.hora === hora && item.fronton === fronton
    );
    
    if (index !== -1) {
      epaileakData[index].epailea = value;
    } else {
      epaileakData.push({ fecha, hora, fronton, epailea: value });
    }

  } catch (error) {
    console.error("Error al guardar:", error);
    inputElement.style.backgroundColor = "#ffcdd2";
    setTimeout(() => {
      inputElement.style.backgroundColor = originalBg;
    }, 1000);
  }
}

/* =========================
   Utilidades
========================= */
function normalizaHora(h) {
  if (!h) return "00:00";
  return h.slice(0, 5);
}

/* =========================
   Crear tabla
========================= */
async function crearTabla() {
  const tbody = document.getElementById("taula");
  tbody.innerHTML = '<tr><td colspan="6" class="loading">Datuak kargatzen...</td></tr>';

  try {
    // 1. Cargar JSONs
    console.log("Cargando JSONs...");
    const [oficialesResp, noOficialesResp] = await Promise.all([
      fetch("data/cartelera-larraun.json"),
      fetch("data/partidos-no-oficiales.json")
    ]);

    if (!oficialesResp.ok) throw new Error("No se pudo cargar cartelera-larraun.json");
    if (!noOficialesResp.ok) throw new Error("No se pudo cargar partidos-no-oficiales.json");

    const oficiales = await oficialesResp.json();
    const noOficiales = await noOficialesResp.json();

    // 2. Combinar datos
    const data = [
      ...oficiales.map(p => ({ ...p, ofiziala: true })),
      ...noOficiales
    ];

    // 3. Procesar partidos para agrupar por horario
    const jaialdiak = {};
    data.forEach(p => {
      if (!/lekunberri|aldatz/i.test(p.fronton || "")) return;

      const hora = normalizaHora(p.hora);
      const key = `${p.fecha}|${hora}|${p.fronton}`;

      if (!jaialdiak[key]) {
        jaialdiak[key] = {
          fecha: p.fecha,
          hora: hora,
          fronton: p.fronton,
          zb: 0,
          senior: "EZ"
        };
      }

      jaialdiak[key].zb++;

      const testua = `${p.lehiaketa || ""} ${p.modalitatea || ""}`;
      if (SENIOR_RE.test(testua)) {
        jaialdiak[key].senior = "BAI";
      }
    });

    // 4. Ordenar
    const filas = Object.values(jaialdiak).sort((a, b) => 
      new Date(a.fecha + " " + a.hora) - new Date(b.fecha + " " + b.hora)
    );

    // 5. Limpiar y construir tabla
    tbody.innerHTML = "";

    filas.forEach(j => {
      const tr = document.createElement("tr");

      // Aplicar clases CSS (laterales de color)
      if (/jaian\s*jai/i.test(j.fronton)) {
        tr.classList.add("lateral-jaianjai");
      } else if (/trinkete/i.test(j.fronton)) {
        tr.classList.add("lateral-trinkete");
      } else {
        tr.classList.add("lateral-default");
      }

      // Buscar árbitro guardado
      const guardado = epaileakData.find(item =>
        item.fecha === j.fecha &&
        item.hora === j.hora &&
        item.fronton === j.fronton
      );
      const valorInicial = guardado ? guardado.epailea : "";

      // --- Crear celdas ---
      
      // Fecha
      const tdFecha = document.createElement("td");
      tdFecha.textContent = j.fecha;
      tr.appendChild(tdFecha);

      // Hora
      const tdHora = document.createElement("td");
      tdHora.textContent = j.hora;
      tr.appendChild(tdHora);

      // Frontón
      const tdFronton = document.createElement("td");
      tdFronton.textContent = j.fronton;
      tr.appendChild(tdFronton);

      // ZB (número de partidos)
      const tdZb = document.createElement("td");
      tdZb.innerHTML = `<strong>${j.zb}</strong>`;
      tr.appendChild(tdZb);

      // Senior - AHORA EN AZUL SI ES "BAI"
      const tdSenior = document.createElement("td");
      if (j.senior === "BAI") {
        tdSenior.style.backgroundColor = "#2196F3";
        tdSenior.style.color = "white";
        tdSenior.style.fontWeight = "bold";
        tdSenior.innerHTML = `<strong>BAI</strong>`;
      } else {
        tdSenior.innerHTML = `<strong>EZ</strong>`;
      }
      tr.appendChild(tdSenior);

      // Input para árbitro
      const tdInput = document.createElement("td");
      const input = document.createElement("input");
      input.value = valorInicial;
      input.placeholder = "...";
      
      input.onchange = function() {
        guardar(j.fecha, j.hora, j.fronton, this.value, this);
      };
      
      tdInput.appendChild(input);
      tr.appendChild(tdInput);

      tbody.appendChild(tr);
    });

    console.log(`Tabla creada con ${filas.length} filas`);

  } catch (error) {
    console.error("Error creando tabla:", error);
    tbody.innerHTML = `<tr><td colspan="6" class="error">Errorea: ${error.message}</td></tr>`;
  }
}

/* =========================
   INICIALIZACIÓN
========================= */
(async function init() {
  // 1. Cargar árbitros
  await cargarEpaileak();
  
  // 2. Crear tabla
  await crearTabla();
})();

</script>
</body>
</html>
