<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaialdiak – Larraun Pilota Elkartea</title>

<style>
/* --- (Tus estilos CSS permanecen IGUALES) --- */
body{font-family:Arial;background:#f4f4f4;padding:20px;}
h1{text-align:center;color:#33691e;margin-bottom:20px;}
table{width:100%;max-width:900px;margin:auto;border-collapse:collapse;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.2);}
thead{background:#7cb342;}
th,td{padding:10px;border:1px solid #ccc;text-align:center;}
th{font-weight:900;}
input{width:100%;border:none;background:#e8f5e9;padding:6px;font-size:1em;}
input:focus{outline:2px solid #7cb342;}
.senior-bai{background:linear-gradient(90deg,#fffde7,#ffffff);}
.lateral-jaianjai{box-shadow:inset 6px 0 0 #1565c0;}
.lateral-trinkete{box-shadow:inset 6px 0 0 #2e7d32;}
.lateral-default{box-shadow:inset 6px 0 0 #3f51b5;}
</style>
</head>

<body>

<h1>JAIALDIAK</h1>

<table>
<thead>
<tr>
<th>EGUNA</th>
<th>ORDUA</th>
<th>LEKUA</th>
<th>ZB</th>
<th>SENIOR</th>
<th>EPAILEA(K)</th>
</tr>
</thead>
<tbody id="taula"></tbody>
</table>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyj70d0n6jlVld_wE2QO8Hk8iF6gXuxHCcQZ36r4sC4raJF1DnMXxOkrvc0spWhWHwJ/exec";
const SENIOR_RE = /(NAGUSI|HELDUA|SENIOR|ESPAINA)/i;

// --- Variable global para guardar los árbitros ---
let epaileakData = []; // Aquí guardaremos los datos de doGet

/* =========================
   Función para cargar los árbitros desde Google Sheets
========================= */
async function cargarEpaileak() {
  try {
    const response = await fetch(SCRIPT_URL);
    epaileakData = await response.json() || [];
    console.log("Árbitros cargados:", epaileakData.length);
  } catch (error) {
    console.error("Error al cargar árbitros:", error);
    epaileakData = []; // En caso de error, array vacío
  }
}

/* =========================
   Función para guardar en Sheets
========================= */
function guardar(fecha, hora, fronton, value) {
  // Usamos fetch con POST, pero no esperamos respuesta para no bloquear
  fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: `fecha=${encodeURIComponent(fecha)}&hora=${encodeURIComponent(hora)}&fronton=${encodeURIComponent(fronton)}&epailea=${encodeURIComponent(value)}`
  }).catch(error => console.error("Error al guardar:", error));

  // --- MEJORA: Actualizar epaileakData para que si se re-dibuja la tabla, el nuevo valor persista ---
  const index = epaileakData.findIndex(item =>
    item.fecha === fecha && item.hora === hora && item.fronton === fronton
  );
  if (index !== -1) {
    epaileakData[index].epailea = value; // Actualiza existente
  } else {
    epaileakData.push({ fecha, hora, fronton, epailea: value }); // Añade nuevo
  }
}

/* =========================
   Utilidades
========================= */
function normalizaHora(h) {
  if (!h) return "00:00";
  return h.slice(0, 5);
}

/* =========================
   Función principal para crear la tabla
========================= */
async function crearTabla() {
  const tbody = document.getElementById("taula");
  tbody.innerHTML = ''; // Limpiar tabla

  try {
    // 1. Cargar los dos archivos JSON en paralelo
    const [oficialesResp, noOficialesResp] = await Promise.all([
      fetch("data/cartelera-larraun.json"),
      fetch("data/partidos-no-oficiales.json")
    ]);

    const oficiales = await oficialesResp.json();
    const noOficiales = await noOficialesResp.json();

    // 2. Combinar datos
    const data = [
      ...oficiales.map(p => ({ ...p, ofiziala: true })),
      ...noOficiales
    ];

    // 3. Procesar para crear la estructura de la tabla (como tu hacías)
    const jaialdiak = {};
    data.forEach(p => {
      if (!/lekunberri|aldatz/i.test(p.fronton || "")) return;

      const hora = normalizaHora(p.hora);
      const key = `${p.fecha}|${hora}|${p.fronton}`;

      if (!jaialdiak[key]) {
        jaialdiak[key] = {
          fecha: p.fecha,
          hora: hora,
          fronton: p.fronton,
          zb: 0,
          senior: "EZ"
        };
      }

      jaialdiak[key].zb++;

      const testua = `${p.lehiaketa || ""} ${p.modalitatea || ""}`;
      if (SENIOR_RE.test(testua)) {
        jaialdiak[key].senior = "BAI";
      }
    });

    // 4. Ordenar y dibujar filas
    Object.values(jaialdiak)
      .sort((a, b) => new Date(a.fecha + " " + a.hora) - new Date(b.fecha + " " + b.hora))
      .forEach(j => {
        const tr = document.createElement("tr");

        // Aplicar clases CSS
        if (j.senior === "BAI") tr.classList.add("senior-bai");
        if (/jaian\s*jai/i.test(j.fronton)) {
          tr.classList.add("lateral-jaianjai");
        } else if (/trinkete/i.test(j.fronton)) {
          tr.classList.add("lateral-trinkete");
        } else {
          tr.classList.add("lateral-default");
        }

// Buscar el árbitro guardado en epaileakData
const guardado = epaileakData.find(item =>
  item.fecha === j.fecha &&
  item.hora === j.hora &&
  item.fronton === j.fronton
);

const valorInicial = guardado ? guardado.epailea : "";

// Crear la fila con el input - AHORA CON COMILLAS ESCAPADAS CORRECTAMENTE
tr.innerHTML = `
  <td>${j.fecha}</td>
  <td>${j.hora}</td>
  <td>${j.fronton}</td>
  <td><strong>${j.zb}</strong></td>
  <td><strong>${j.senior}</strong></td>
  <td>
    <input
      value="${valorInicial.replace(/"/g, '&quot;')}"
      onchange="guardar('${j.fecha.replace(/'/g, "\\'")}', '${j.hora.replace(/'/g, "\\'")}', '${j.fronton.replace(/'/g, "\\'")}', this.value)"
    >
  </td>
`;

        tbody.appendChild(tr);
      });

  } catch (error) {
    console.error("Error al crear la tabla:", error);
    tbody.innerHTML = '<tr><td colspan="6">Error al cargar los datos. Intenta de nuevo.</td></tr>';
  }
}

/* =========================
   FLUJO PRINCIPAL: Cargar todo de manera SEGURA y SECUENCIAL
========================= */
(async function init() {
  // 1. Primero, aseguramos que los árbitros estén cargados
  await cargarEpaileak();

  // 2. Luego, creamos la tabla (que usará epaileakData)
  await crearTabla();

  // 3. (Opcional) Recargar periódicamente? Mejor no, para no perder cambios no guardados.
  // Si quieres actualizar cada cierto tiempo, puedes hacerlo con cuidado.
})();

</script>
</body>
</html>
