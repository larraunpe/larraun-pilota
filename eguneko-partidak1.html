<!DOCTYPE html>
<html lang="eu">
<head>

  <style> 
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .selector-botoia {

    @media (min-width: 480px) {

    @media (min-width: 768px) {

    /* BOTOI BERRIA: Argazkia atera */

    /* ETIKETA BERRIAK */

<body>
<div class="ordutegi-kartela">
  <div class="header-ordutegiak">
    <img src="images/logo-larraun.png" alt="Larraun Pilota">
    <h1>ORDUTEGIAK</h1>
    <img src="images/logo-fnp.png" alt="FNP">
  </div>

  <!-- SELECTORES EN LINEA -->
  <div class="selectores-container">
    <!-- SELECTOR DE TALDE NAGUSIAK -->
    <div class="selector-grupo">
      <div class="selector-label">TALDEA</div>
      <div id="talde-selector-container" class="selector-opciones"></div>
    </div>
    
    <!-- SELECTOR DE EGUNAK -->
    <div class="selector-grupo">
      <div class="selector-label">EGUNA</div>
      <div id="eguna-selector-container" class="selector-opciones"></div>
    </div>
  </div>

  <!-- BOTOI BERRIA: Argazkia atera -->
  <div class="argazkia-botoia-container">
    <button id="argazkia-botoia" class="argazkia-botoia">
      📸 ARGAZKIA ATERA
    </button>
  </div>

  <!-- EGUNEN KONTENEDOREA (hau izango da argazkian agertuko dena) -->
  <div id="egunak-container" class="egunak-container"></div>

  <div class="footer-ordutegiak">
    <div>📍 Larraun Pilota Elkartea</div>
    <div class="social">@larraunpilota</div>
  </div>
</div>

<script>
  (async function() {
    // ---------- 1. Kategoriak kargatu categoriaedad.json-tik ----------
    let kategoriakMap = new Map();
    let kategoriaKoloreak = {};

    try {
      const kategoriaResp = await fetch('/data/categoriaedad.json');
      if (kategoriaResp.ok) {
        const kategoriaData = await kategoriaResp.json();
        
        // Procesar categorías del JSON
        if (kategoriaData && kategoriaData.categorias) {
          kategoriaData.categorias.forEach(kat => {
            if (kat.nombre && kat.color) {
              const izena = kat.nombre.toUpperCase();
              kategoriakMap.set(izena, {
                kolorea: kat.color,
                edadMin: kat.edad_min || 0,
                edadMax: kat.edad_max || 99,
                izena: kat.nombre,
                kategoriaNagusia: kat.nombre
              });
              kategoriaKoloreak[izena] = kat.color;
            }
          });
          console.log('Kategoriak kargatuta:', kategoriakMap.size);
        }
      } else {
        console.warn('Ezin categoriaedad.json kargatu, kolore lehenetsiak erabiliko dira');
      }
    } catch (e) {
      console.warn('Errorea kategoriak kargatzean:', e);
    }

    // Kolore lehenetsiak kargatu ez badira
    if (kategoriakMap.size === 0) {
      const koloreLehenetsiak = {
        'SEIN': '#FFD700',
        'KIMU': '#87CEEB', 
        'HAURRAK': '#98FB98',
        'ALEBINAK': '#FFA07A',
        'KADETE': '#DDA0DD',
        'GAZTE': '#F08080',
        'ESKUZ KOPA': '#B0C4DE'
      };
      
      Object.keys(koloreLehenetsiak).forEach(kat => {
        kategoriakMap.set(kat, {
          kolorea: koloreLehenetsiak[kat],
          izena: kat,
          kategoriaNagusia: kat
        });
      });
    }

    // ---------- 2. Partidak kargatu ----------
    let partidakOficiales = [];

    try {
      const oficialesResp = await fetch('/data/cartelera-larraun.json');
      
      if (!oficialesResp.ok) throw new Error('ezin partida ofizialak kargatu');
      
      partidakOficiales = await oficialesResp.json();
      console.log('Partidak kargatuta:', partidakOficiales.length);
      
    } catch (e) {
      document.getElementById('egunak-container').innerHTML = '<div class="ez-partidurik">❌ Ezin partidak kargatu.</div>';
      console.error(e);
      return;
    }

    // ---------- ASTE HONETAKO PARTIDAK KALKULATU (egungo data) ----------
    function getAsteaTartea() {
      const gaur = new Date();
      // Astelehena lortu (0 = igandea, 1 = astelehena...)
      const astelehena = new Date(gaur);
      const egunIndizea = gaur.getDay(); // 0 = igandea
      
      if (egunIndizea === 0) { // Igandea bada
        astelehena.setDate(gaur.getDate() - 6); // Aurreko astelehenera
      } else {
        astelehena.setDate(gaur.getDate() - (egunIndizea - 1)); // Astelehenera
      }
      
      astelehena.setHours(0, 0, 0, 0);
      
      const igandea = new Date(astelehena);
      igandea.setDate(astelehena.getDate() + 6);
      igandea.setHours(23, 59, 59, 999);
      
      return { hasiera: astelehena, bukaera: igandea };
    }

    const { hasiera: astekoLehen, bukaera: astekoAzken } = getAsteaTartea();
    
    console.log('ASTE HONETAKO TARTEA:', {
      hasiera: astekoLehen.toLocaleDateString('eu-ES'),
      bukaera: astekoAzken.toLocaleDateString('eu-ES'),
      hasieraRaw: astekoLehen,
      bukaeraRaw: astekoAzken
    });

    function dateStrToDate(fechaStr) {
      if (!fechaStr) return null;
      // Formato: "2025/03/14" o "2025-03-14"
      let parts;
      if (fechaStr.includes('/')) {
        parts = fechaStr.split('/');
      } else if (fechaStr.includes('-')) {
        parts = fechaStr.split('-');
      } else {
        return null;
      }
      
      if (parts.length !== 3) return null;
      
      // Año, mes (0-11), día
      const urtea = parseInt(parts[0]);
      const hilabetea = parseInt(parts[1]) - 1;
      const eguna = parseInt(parts[2]);
      
      return new Date(urtea, hilabetea, eguna);
    }

    // ---------- 3. Partida guztiak ----------
    const partidaGuztiak = partidakOficiales.map(p => ({ ...p, iturria: 'fnp' }));

    // "Descanso" -> "Atsedena"
    partidaGuztiak.forEach(p => {
      if (p.etxekoa && typeof p.etxekoa === 'string' && p.etxekoa.includes('Descanso')) {
        p.etxekoa = p.etxekoa.replace('Descanso', 'Atsedena');
      }
      if (p.kanpokoak && typeof p.kanpokoak === 'string' && p.kanpokoak.includes('Descanso')) {
        p.kanpokoak = p.kanpokoak.replace('Descanso', 'Atsedena');
      }
    });

    // Aste honetako partidak - FILTRO CORREGIDO
    const partidakAsteHonetan = partidaGuztiak.filter(p => {
      if (!p.fecha) return false;
      const d = dateStrToDate(p.fecha);
      if (!d) return false;
      
      // Konparatu data hutsak (orduak gabe)
      const partidaDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const hasieraDate = new Date(astekoLehen.getFullYear(), astekoLehen.getMonth(), astekoLehen.getDate());
      const bukaeraDate = new Date(astekoAzken.getFullYear(), astekoAzken.getMonth(), astekoAzken.getDate());
      
      const barruan = partidaDate >= hasieraDate && partidaDate <= bukaeraDate;
      
      if (barruan) {
        console.log('Partida aste honetan:', p.fecha, p.etxekoa, 'vs', p.kanpokoak);
      }
      
      return barruan;
    });

    console.log('Partidak aste honetan GUZTIRA:', partidakAsteHonetan.length);
    
    if (partidakAsteHonetan.length === 0) {
      document.getElementById('egunak-container').innerHTML = '<div class="ez-partidurik">🗓 Aste honetan ez dago partidarik.</div>';
      return;
    }

    // ---------- 4. Kategoria nagusia aurkitu ----------
    function aurkituKategoria(testua) {
      if (!testua) return null;
      
      const up = testua.toUpperCase();
      
      // Bilatu kategoria ezagunak
      for (let [izena, info] of kategoriakMap.entries()) {
        if (up.includes(izena)) {
          return izena;
        }
      }
      
      // Bilatu partzialki
      if (up.includes('KADETE')) return 'KADETE';
      if (up.includes('GAZTE')) return 'GAZTE';
      if (up.includes('KIMU')) return 'KIMU';
      if (up.includes('HAUR')) return 'HAURRAK';
      if (up.includes('ALEBIN')) return 'ALEBINAK';
      if (up.includes('SEIN')) return 'SEIN';
      if (up.includes('ESKUZ KOPA')) return 'ESKUZ KOPA';
      if (up.includes('BENJAMIN')) return 'KIMU'; // Benjaminak Kimu bezala
      
      return 'BESTE';
    }

    function getKategoriaKolorea(testua) {
      const katIzena = aurkituKategoria(testua);
      const info = kategoriakMap.get(katIzena);
      return info?.kolorea || '#cccccc';
    }

    // ---------- 5. Talde nagusia esleitu ----------
    function taldeNagusia(partida) {
      const testua = (partida.lehiaketa || partida.modalidad || '').toUpperCase();
      const etxekoa = (partida.etxekoa || '').toUpperCase();
      const kanpokoa = (partida.kanpokoak || '').toUpperCase();
      
      // NESKAK taldea
      if (testua.includes('NESKA') || testua.includes('NESKAK') || 
          testua.includes('EMAKUME') || testua.includes('FEMENINO')) {
        return 'neskak';
      }
      
      // TXIKIAK taldea: KIMU, SEIN, HAURRAK txikiak, AURREBENJAMINAK
      if (testua.includes('KIMU') || testua.includes('SEIN') || 
          testua.includes('AURREBENJAMIN') || testua.includes('BENJAMIN')) {
        return 'txikiak';
      }
      
      // HAURRAK ere txikiak?
      if (testua.includes('HAUR') && !testua.includes('HAURRAK')) {
        return 'txikiak';
      }
      
      // NAGUSIAK taldea: gainerakoak
      return 'nagusiak';
    }

    // ---------- 6. Iturriaren etiketa ----------
    function getIturriaEtiketa(iturria) {
      return { text: 'FNP', class: 'fnp' };
    }

    // ---------- 7. Talde nagusien selectorea ----------
    const taldeSelectorContainer = document.getElementById('talde-selector-container');
    
    const taldeNagusiak = [
      { id: 'neskak', izena: 'NESKAK' },
      { id: 'txikiak', izena: 'TXIKIAK' },
      { id: 'nagusiak', izena: 'NAGUSIAK' }
    ];
    
    const taldeBotoiak = [];
    let taldeAktibo = 'txikiak'; // Por defecto TXIKIAK
    
    taldeNagusiak.forEach(talde => {
      const botoia = document.createElement('button');
      botoia.className = `selector-botoia ${talde.id === taldeAktibo ? 'aktibo' : ''}`;
      botoia.textContent = talde.izena;
      botoia.setAttribute('data-talde', talde.id);
      taldeSelectorContainer.appendChild(botoia);
      taldeBotoiak.push(botoia);
    });

    // ---------- 8. HTML eraiki ----------
    function renderEgunak(taldeAktibo, egunaAktibo = null) {
      const container = document.getElementById('egunak-container');
      container.innerHTML = '';

      const egunakEus = ['igandea', 'astelehena', 'asteartea', 'asteazkena', 'osteguna', 'ostirala', 'larunbata'];

      // Partidak taldearen arabera iragazi
      const partidakIragaziak = partidakAsteHonetan.filter(p => {
        const taldea = taldeNagusia(p);
        return taldea === taldeAktibo;
      });

      console.log(`Partidak talde ${taldeAktibo}:`, partidakIragaziak.length);

      if (partidakIragaziak.length === 0) {
        container.innerHTML = '<div class="ez-partidurik">🔍 Ez dago partidarik talde honetan aste honetan.</div>';
        return;
      }

      // Partidak egunka antolatu
      const partidakEgunka = {};
      partidakIragaziak.forEach(p => {
        if (!p.fecha) return;
        if (!partidakEgunka[p.fecha]) partidakEgunka[p.fecha] = [];
        partidakEgunka[p.fecha].push(p);
      });

      // Egunak ordenatu
      const egunakOrdenatuak = Object.keys(partidakEgunka).sort((a, b) => {
        const dA = dateStrToDate(a);
        const dB = dateStrToDate(b);
        return dA - dB;
      });

      // Egunen selectorea (lehendik dagoena garbitu)
      const egunaSelectorContainer = document.getElementById('eguna-selector-container');
      egunaSelectorContainer.innerHTML = '';
      
      egunakOrdenatuak.forEach((fechaStr, index) => {
        const dObj = dateStrToDate(fechaStr);
        if (!dObj) return;
        
        const egunIndizea = dObj.getDay(); // 0 = igandea
        const egunIzenaEus = egunakEus[egunIndizea] || 'eguna';
        
        // Egunaren laburdura
        let egunLabur;
        switch(egunIndizea) {
          case 0: egunLabur = 'IG'; break; // igandea
          case 1: egunLabur = 'AL'; break; // astelehena
          case 2: egunLabur = 'AR'; break; // asteartea
          case 3: egunLabur = 'AZ'; break; // asteazkena
          case 4: egunLabur = 'OG'; break; // osteguna
          case 5: egunLabur = 'OL'; break; // ostirala
          case 6: egunLabur = 'LR'; break; // larunbata
          default: egunLabur = 'EG';
        }
        
        const botoia = document.createElement('button');
        botoia.className = `selector-botoia ${index === 0 ? 'aktibo' : ''}`;
        botoia.textContent = egunLabur;
        botoia.setAttribute('data-eguna', fechaStr);
        botoia.setAttribute('title', `${egunIzenaEus}, ${fechaStr.replace(/\//g,'/')}`);
        egunaSelectorContainer.appendChild(botoia);
      });

      // Si no hay egunaAktibo, usar el primero
      if (!egunaAktibo && egunakOrdenatuak.length > 0) {
        egunaAktibo = egunakOrdenatuak[0];
      }

      // Ordua parseatzeko
      function parseOrdua(horaStr) {
        if (!horaStr || horaStr.trim() === '-' || horaStr.startsWith('-')) return '--:--';
        const match = horaStr.match(/(\d{1,2}:\d{2})/);
        return match ? match[1] : '--:--';
      }

      egunakOrdenatuak.forEach(fechaStr => {
        const partidak = partidakEgunka[fechaStr];
        
        // Ordenar partidas
        partidak.sort((a, b) => {
          const horaA = parseOrdua(a.hora || '--:--');
          const horaB = parseOrdua(b.hora || '--:--');
          if (horaA !== '--:--' && horaB !== '--:--' && horaA !== horaB) {
            return horaA.localeCompare(horaB);
          }
          
          const frontA = a.fronton || '';
          const frontB = b.fronton || '';
          return frontA.localeCompare(frontB);
        });

        const dObj = dateStrToDate(fechaStr);
        if (!dObj) return;
        
        const egunIndizea = dObj.getDay(); // 0 = igandea
        const egunIzenaEus = egunakEus[egunIndizea] || 'eguna';
        
        // Formatear fecha: DD/MM/YYYY
        const dia = dObj.getDate().toString().padStart(2, '0');
        const mes = (dObj.getMonth() + 1).toString().padStart(2, '0');
        const año = dObj.getFullYear();
        const fechaFormateada = `${dia}/${mes}/${año}`;
        
        const egunFormat = `${egunIzenaEus}, ${fechaFormateada}`;

        const egunDiv = document.createElement('div');
        egunDiv.className = 'egun-saila';
        egunDiv.setAttribute('data-eguna', fechaStr);
        
        // Ezkutatu eguna ez bada aktiboa
        if (egunaAktibo && fechaStr !== egunaAktibo) {
          egunDiv.classList.add('eguna-ezkutuan');
        }
        
        // Kolorea taldearen arabera
        let bordeKolorea = '#0d6efd'; // txikiak
        if (taldeAktibo === 'neskak') bordeKolorea = '#d63384';
        if (taldeAktibo === 'nagusiak') bordeKolorea = '#198754';
        
        egunDiv.style.borderLeftColor = bordeKolorea;
        egunDiv.innerHTML = `<div class="egun-izena">📅 ${egunFormat}</div>`;

        let currentFrontoi = null;
        let frontoiDiv = null;

        partidak.forEach(p => {
          const katIzena = aurkituKategoria(p.lehiaketa || p.modalidad || '');
          const kolorea = getKategoriaKolorea(p.lehiaketa || p.modalidad || '');

          const frontIzen = p.fronton || 'Frontoia zehaztu gabe';
          if (frontIzen !== currentFrontoi) {
            currentFrontoi = frontIzen;
            frontoiDiv = document.createElement('div');
            frontoiDiv.className = 'frontoi-taldea';

            const frontoiSpan = document.createElement('div');
            frontoiSpan.className = 'frontoi-izena';
            if (/lekunberri|aldatz/i.test(frontIzen)) {
              frontoiSpan.classList.add('berezia');
            }
            frontoiSpan.textContent = '🎯 ' + frontIzen;
            frontoiDiv.appendChild(frontoiSpan);
            egunDiv.appendChild(frontoiDiv);
          }

          const partidaDiv = document.createElement('div');
          partidaDiv.className = 'partido-txikia';
          partidaDiv.style.borderLeftColor = kolorea;

          const orduGarbi = parseOrdua(p.hora || '');
          const prov = (p.hora && (p.hora.includes('provisional') || p.hora.includes('provis.'))) ? 'provisorio' : '';

          const etxekoaTestua = p.etxekoa || '?';
          const kanpokoaTestua = p.kanpokoak || '?';

          const etxekoaLarraun = etxekoaTestua.toUpperCase().includes('LARRAUN');
          const kanpokoaLarraun = kanpokoaTestua.toUpperCase().includes('LARRAUN');

          const etxekoaClass = `etxekoa ${etxekoaLarraun ? 'larraun-handiagoa' : ''}`;
          const kanpokoClass = `kanpokoak ${kanpokoaLarraun ? 'larraun-handiagoa' : ''}`;

          const faseTestua = p.lehiaketa || p.modalidad || '';
          const finala = faseTestua.toUpperCase().includes('FINALA');
          
          const iturriaInfo = getIturriaEtiketa(p.iturria);

          partidaDiv.innerHTML = `
            <div class="ordu-blokea ${prov}">${orduGarbi} ${prov ? '<small>provis.</small>' : ''}</div>
            <div class="partido-info">
              <div class="parejak">
                <span class="${etxekoaClass}">🏠 ${etxekoaTestua}</span>
                <span class="${kanpokoClass}">✈️ ${kanpokoaTestua}</span>
              </div>
              <div class="lehiaketa-labur">
                <span class="iturria-etiketa ${iturriaInfo.class}">${iturriaInfo.text}</span>
                <span>🏆 ${faseTestua}</span>
                ${finala ? '<span class="fase-etiketa finala">⚡ FINALA</span>' : ''}
                ${p.zkia && p.zkia !== '-' ? `<span class="zkia-etiketa">#${p.zkia}</span>` : ''}
              </div>
            </div>
          `;

          if (frontoiDiv) {
            frontoiDiv.appendChild(partidaDiv);
          }
        });

        container.appendChild(egunDiv);
      });
      
      // Egunen botoiei event listener-ak
      const egunaBotoiak = document.querySelectorAll('#eguna-selector-container .selector-botoia');
      egunaBotoiak.forEach(botoia => {
        botoia.addEventListener('click', (e) => {
          const eguna = e.target.getAttribute('data-eguna');
          
          // Aktualizar clases
          egunaBotoiak.forEach(b => b.classList.remove('aktibo'));
          e.target.classList.add('aktibo');
          
          // Mostrar día seleccionado
          document.querySelectorAll('.egun-saila').forEach(el => {
            if (el.getAttribute('data-eguna') === eguna) {
              el.classList.remove('eguna-ezkutuan');
            } else {
              el.classList.add('eguna-ezkutuan');
            }
          });
        });
      });
    }

    // ---------- 9. Hasierako render ----------
    renderEgunak('txikiak');

    // ---------- 10. Taldea aldatzean ----------
    taldeBotoiak.forEach(botoia => {
      botoia.addEventListener('click', (e) => {
        const taldea = e.target.getAttribute('data-talde');
        taldeAktibo = taldea;
        
        taldeBotoiak.forEach(b => b.classList.remove('aktibo'));
        e.target.classList.add('aktibo');
        
        renderEgunak(taldea);
      });
    });

    // ---------- 11. ARGAZKIA ATERATZEKO ----------
    const argazkiaBotoia = document.getElementById('argazkia-botoia');
    
    argazkiaBotoia.addEventListener('click', function() {
      const element = document.getElementById('egunak-container');
      
      const originalText = argazkiaBotoia.textContent;
      argazkiaBotoia.textContent = '📸 ARGAZKIA PRESTATZEN...';
      argazkiaBotoia.disabled = true;
      
      html2canvas(element, {
        scale: 2,
        backgroundColor: '#ffffff',
        logging: false,
        allowTaint: false,
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `larraun-ordutegia-${taldeAktibo}-${new Date().toISOString().slice(0,10)}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
        
        argazkiaBotoia.textContent = originalText;
        argazkiaBotoia.disabled = false;
      }).catch(error => {
        console.error('Errorea argazkia sortzean:', error);
        alert('Ezin izan da argazkia sortu. Saiatu berriro.');
        argazkiaBotoia.textContent = originalText;
        argazkiaBotoia.disabled = false;
      });
    });

  })();
</script>
</body>
</html>
