/* ================= CABECERA ================= */

<body>
<button id="btnExportar" class="no-print">DESCARGAR JPG</button>
<div class="pagina" id="contenedor-paginas"></div>

<script>
let FASES = {};
let CATEGORIAS = {};
let CATEGORIAS_EDAD = [];
let GRUPOS_EDAD = {}; // Para almacenar los grupos agrupados por edadmin

/* ================= PELOTAS ================= */

function generarPelotas(color){
  let dots=[];
  for(let i=0;i<60;i++){
    const x=Math.random()*100;
    const y=Math.random()*100;
    const r=2+Math.random()*3;
    dots.push(`radial-gradient(circle ${r}px at ${x}% ${y}%, ${color} 98%, transparent)`);
  }
  return dots.join(",");
}

document.documentElement.style.setProperty('--pelotas-verdes', generarPelotas('#19c93f'));
document.documentElement.style.setProperty('--pelotas-rojas', generarPelotas('#ff6b6b'));
document.documentElement.style.setProperty('--pelotas-grises', generarPelotas('#bdbdbd'));

/* ================= UTIL ================= */

function dividirEquipo(txt){
  if (!txt) return {principal: "", resto: ""};
  
  txt = txt.replace(" (","<br>(");
  const partes = txt.split(")");
  if (partes.length < 2) return {principal: txt, resto: ""};
  
  const principal = partes[0] + ")";
  const resto = partes.slice(1).join(")").trim();
  return {principal, resto};
}

function logoClub(nombre){
  if(!nombre) return '<img class="logo pixelado" src="images/clubes/DEFAULT.jpg">';

  if(nombre.toLowerCase().includes("atseden"))
    return `<img class="logo pixelado" src="images/ATSEDENA.jpg" onerror="this.src='images/clubes/DEFAULT.jpg'">`;

  const limpio = nombre
    .split("(")[0]
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[.,]/g,"")
    .replace(/–/g,"-")
    .replace(/-/g," ")
    .trim()
    .toUpperCase();

  const archivo = limpio.replace(/\s+/g,"-");

  return `
    <img class="logo pixelado"
         src="images/clubes/${archivo}.jpg"
         onerror="this.src='images/clubes/DEFAULT.jpg'">
  `;
}

function estado(p){
  const texto = (p.modalidad || "").toLowerCase();
  if(texto.includes("atseden") || texto.includes("descanso"))
    return "rest";

  if(!p.tanteoa || !p.tanteoa.includes("-")) return "";

  const [a,b] = p.tanteoa.split("-").map(Number);
  if (isNaN(a) || isNaN(b)) return "";

  if((p.etxekoa || "").includes("LARRAUN"))
    return a > b ? "win" : "lose";
  else
    return b > a ? "win" : "lose";
}

/* ================= NUEVA FUNCIÓN DE ORDENACIÓN ================= */
function ordenarPorDiaYFronton(lista){
  return lista.sort((a,b) => {
    // Primero por fecha
    const fa = new Date(a.fecha + "T" + (a.hora || "00:00"));
    const fb = new Date(b.fecha + "T" + (b.hora || "00:00"));
    
    if (fa - fb !== 0) return fa - fb;
    
    // Si misma fecha, por frontón
    return (a.fronton || "").localeCompare(b.fronton || "");
  });
}

/* ================= AGRUPAR POR DÍA ================= */
function agruparPorDia(partidos) {
  const grupos = {};
  
  partidos.forEach(partido => {
    const dia = partido.fecha || "Sin fecha";
    if (!grupos[dia]) {
      grupos[dia] = [];
    }
    grupos[dia].push(partido);
  });
  
  return grupos;
}

function formatearFecha(fechaStr) {
  if (!fechaStr) return "DATA EZEZAGUNA";
  const partes = fechaStr.split("-");
  if (partes.length !== 3) return fechaStr;
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function filtrarPeriodo(lista){
  const hoy = new Date();
  hoy.setHours(23,59,59,999);

  const diaSemana = hoy.getDay();
  const diasAtras = diaSemana === 0 ? 6 : diaSemana - 1;

  const inicioSemanaActual = new Date(hoy);
  inicioSemanaActual.setDate(hoy.getDate() - diasAtras);
  inicioSemanaActual.setHours(0,0,0,0);

  const inicioSemanaPasada = new Date(inicioSemanaActual);
  inicioSemanaPasada.setDate(inicioSemanaActual.getDate() - 7);

  return lista.filter(p => {
    if (!p.fecha) return false;
    const f = new Date(p.fecha + "T00:00");
    return f >= inicioSemanaPasada && f <= hoy;
  });
}

/* ================= NUEVA FUNCIÓN PARA AGRUPAR POR ADMIN ================= */
function procesarGruposEdad() {
  GRUPOS_EDAD = {};
  
  CATEGORIAS_EDAD.forEach(item => {
    const edadMin = item.EDADMIN;
    if (!GRUPOS_EDAD[edadMin]) {
      // El primer elemento de cada edad define el nombre del grupo
      GRUPOS_EDAD[edadMin] = {
        nombre: Object.keys(item).find(key => key !== "EDADMIN" && key !== "EDADMAX") || "Besteak",
        color: item[Object.keys(item).find(key => key !== "EDADMIN" && key !== "EDADMAX")] || "#6c757d",
        categorias: []
      };
    }
    // Añadir todas las categorías de esta edad
    Object.keys(item).forEach(key => {
      if (key !== "EDADMIN" && key !== "EDADMAX") {
        GRUPOS_EDAD[edadMin].categorias.push(key);
      }
    });
  });
}

function detectarGrupo(partido) {
  const textoCompleto = (
    (partido.lehiaketa || "") + " " + 
    (partido.modalidad || "") + " " +
    (partido.categoria || "")
  ).toLowerCase();
  
  // Buscar por grupos de edad
  for (const [edadMin, grupo] of Object.entries(GRUPOS_EDAD)) {
    for (const categoria of grupo.categorias) {
      if (textoCompleto.includes(categoria.toLowerCase())) {
        return {
          nombre: grupo.nombre,
          edadMinima: edadMin,
          color: grupo.color
        };
      }
    }
  }
  
  // Detectar por palabras clave si no se encuentra en grupos
  if (textoCompleto.includes("sein") || textoCompleto.includes("benjamin")) {
    return { nombre: "SEIN", edadMinima: 8, color: CATEGORIAS["SEIN"] || "#ff6b6b" };
  }
  if (textoCompleto.includes("haur") || textoCompleto.includes("alebin")) {
    return { nombre: "HAUR", edadMinima: 10, color: CATEGORIAS["HAUR"] || "#4ecdc4" };
  }
  if (textoCompleto.includes("kadete")) {
    return { nombre: "KADETE", edadMinima: 12, color: CATEGORIAS["KADETE"] || "#45b7d1" };
  }
  if (textoCompleto.includes("junior")) {
    return { nombre: "JUNIOR", edadMinima: 14, color: CATEGORIAS["JUNIOR"] || "#96ceb4" };
  }
  
  return {
    nombre: "Besteak",
    edadMinima: null,
    color: "#6c757d"
  };
}

function agruparPorGrupoEdad(partidos) {
  const grupos = {};
  
  partidos.forEach(partido => {
    const grupoInfo = detectarGrupo(partido);
    const key = grupoInfo.nombre;
    
    if (!grupos[key]) {
      grupos[key] = {
        nombre: key,
        edadMinima: grupoInfo.edadMinima,
        color: grupoInfo.color,
        partidos: []
      };
    }
    grupos[key].partidos.push(partido);
  });
  
  return grupos;
}

function ordenarGrupos(grupos) {
  const ordenPredefinido = ["SEIN", "HAUR", "KADETE", "JUNIOR", "HELDUAK", "Besteak"];
  
  return grupos.sort((a, b) => {
    const indexA = ordenPredefinido.indexOf(a.nombre);
    const indexB = ordenPredefinido.indexOf(b.nombre);
    
    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a.nombre.localeCompare(b.nombre);
  });
}

function extraerFase(texto){
  if(!texto) return { limpio: "", etiqueta: "" };

  const fasesOrdenadas = Object.values(FASES).sort((a,b)=> b.length - a.length);

  for(const fase of fasesOrdenadas){
    const regex = new RegExp(`\\b${fase}\\b`, "i");
    if(regex.test(texto)){
      const textoLimpio = texto.replace(regex, "").trim();
      let claseExtra = fase.toUpperCase() === "FINALA" ? " fase-finala" : "";
      const etiqueta = `<span class="fase${claseExtra}">${fase}</span>`;
      return { limpio: textoLimpio, etiqueta };
    }
  }

  return { limpio: texto, etiqueta: "" };
}

function crearPartido(p){
  if (!p) return document.createElement("div");

  const fronton = (p.fronton || "").toLowerCase();
  const esAzul = fronton.includes("lekunberri") || fronton.includes("aldatz");
  const colorHeader = esAzul ? "azul" : "granate";

  const est = estado(p);
  const eq1 = dividirEquipo(p.etxekoa || "");
  const eq2 = dividirEquipo(p.kanpokoak || "");
  
  let a = "", b = "";
  if (p.tanteoa && p.tanteoa.includes("-")) {
    [a, b] = p.tanteoa.split("-").map(x => x.trim());
  }

  let icono = "";
  const faseTexto = p.lehiaketa || p.modalidad || "";
  const esFinala = faseTexto.toUpperCase().includes("FINALA");

  if (est === "win") {
    icono = esFinala ? 
      `<div class="icono-resultado gana">🥇</div>` : 
      `<div class="icono-resultado gana">✔</div>`;
  } else if (est === "lose") {
    icono = esFinala ? 
      `<div class="icono-resultado pierde">🥈</div>` : 
      `<div class="icono-resultado pierde">✖</div>`;
  }

  const div = document.createElement("div");
  div.className = "partido " + est + (esFinala ? " partido-finala" : "");
  
  const faseData = extraerFase(p.lehiaketa || p.modalidad || "");
  
  div.innerHTML = `
    <a href="${p.url || '#'}" target="_blank"
       class="partido-header ${colorHeader}">
      <span>
        ${p.fecha || ''} · ${p.fronton || ''} ·
        ${p.url ? `<u>${faseData.limpio}</u>` : faseData.limpio}
        ${faseData.etiqueta}
      </span>
    </a>

    <div class="fila">
      ${logoClub(p.etxekoa)}
      <div class="local">
        <div class="principal">${eq1.principal}</div>
        ${eq1.resto ? `<div class="pelotaris">${eq1.resto}</div>` : ""}
      </div>
      <div class="score">
        <div class="resultado-linea">
          <span class="blue">${a}</span>
          <span class="icono-wrapper">${icono}</span>
          <span class="red">${b}</span>
        </div>
        ${p.sets ? `<div class="sets">${p.sets}</div>` : ""}
      </div>
      <div class="visit">
        <div class="principal">${eq2.principal}</div>
        ${eq2.resto ? `<div class="pelotaris">${eq2.resto}</div>` : ""}
      </div>
      ${logoClub(p.kanpokoak)}
    </div>
  `;

  return div;
}

/* ================= CARGA CON FALLBACK ================= */
async function cargarDatos() {
  try {
    const resultados = await Promise.allSettled([
      fetch("data/resultados-larraun.json").then(r => r.ok ? r.json() : []),
      fetch("data/resultados-no-oficiales.json").then(r => r.ok ? r.json() : []),
      fetch("data/fases.json").then(r => r.ok ? r.json() : {}),
      fetch("data/categoriacartel.json").then(r => r.ok ? r.json() : {}),
      fetch("data/categorias_edad.json").then(r => r.ok ? r.json() : [])
    ]);
    
    const larraun = resultados[0].status === 'fulfilled' ? resultados[0].value : [];
    const noOficiales = resultados[1].status === 'fulfilled' ? resultados[1].value : [];
    FASES = resultados[2].status === 'fulfilled' ? resultados[2].value : {};
    CATEGORIAS = resultados[3].status === 'fulfilled' ? resultados[3].value : {};
    CATEGORIAS_EDAD = resultados[4].status === 'fulfilled' ? resultados[4].value : [];
    
    // Procesar grupos por edad
    procesarGruposEdad();
    
    // Categorías por defecto si no hay
    if (Object.keys(CATEGORIAS).length === 0) {
      CATEGORIAS = {
        "SEIN": "#ff6b6b",
        "HAUR": "#4ecdc4", 
        "KADETE": "#45b7d1",
        "JUNIOR": "#96ceb4",
        "HELDUAK": "#9898FA"
      };
    }
    
    const todos = filtrarPeriodo([...larraun, ...noOficiales]);
    
    if (todos.length === 0) {
      document.getElementById("contenedor-paginas").innerHTML = `
        <div style="text-align: center; padding: 50px; font-family: Orbitron; color: #00ff9d;">
          <h2>EZ DA PARTIDURIK AURKITU</h2>
          <p>Azken 7 egunetako partidurik ez</p>
        </div>
      `;
      return;
    }
    
    // Agrupar por grupo de edad
    const grupos = agruparPorGrupoEdad(todos);
    const gruposArray = Object.values(grupos);
    const gruposOrdenados = ordenarGrupos(gruposArray);
    
    const contenedor = document.getElementById("contenedor-paginas");
    contenedor.innerHTML = '';
    
    // Crear página para cada grupo
    gruposOrdenados.forEach((grupo, index) => {
      // Ordenar partidos por día y frontón
      const partidosOrdenados = ordenarPorDiaYFronton(grupo.partidos);
      
      // Agrupar por día para mostrar separadores
      const partidosPorDia = agruparPorDia(partidosOrdenados);
      const dias = Object.keys(partidosPorDia).sort();
      
      const pagina = document.createElement("div");
      pagina.className = "pagina-a3";
      pagina.id = `pagina-${index}`;
      
      // Header
      const header = document.createElement("div");
      header.className = "header";
      header.innerHTML = `
        <img src="images/logo-larraun.png" class="logo-izq" onerror="this.style.display='none'">
        EMAITZAK - LARRAUN PILOTA ELKARTEA
        <img src="images/logo-fnp.png" class="logo-der" onerror="this.style.display='none'">
      `;
      
      // Contenido
      const contenido = document.createElement("div");
      contenido.className = "contenido";
      contenido.style.padding = "20px";
      
      // Título de categoría (siempre con texto azul oscuro)
      const tituloCat = document.createElement("div");
      tituloCat.className = "categoria-titulo";
      tituloCat.style.backgroundColor = grupo.color;
      tituloCat.style.color = "#003366"; // Forzar azul oscuro
      tituloCat.textContent = grupo.nombre.toUpperCase();
      contenido.appendChild(tituloCat);
      
      // Subtítulo de edad
      const infoSub = document.createElement("div");
      infoSub.className = "edad-subtitulo";
      if (grupo.edadMinima) {
        infoSub.textContent = `⏳ ${grupo.edadMinima}+ URTE | ⚾ ${partidosOrdenados.length} PARTIDU`;
      } else {
        infoSub.textContent = `⚾ ${partidosOrdenados.length} PARTIDU`;
      }
      contenido.appendChild(infoSub);
      
      // Mostrar partidos agrupados por día
      dias.forEach(dia => {
        // Separador de día
        const diaSeparador = document.createElement("div");
        diaSeparador.className = "dia-separador";
        diaSeparador.innerHTML = `📅 ${formatearFecha(dia)} <span>${partidosPorDia[dia].length} partidu</span>`;
        contenido.appendChild(diaSeparador);
        
        // Partidos de ese día
        partidosPorDia[dia].forEach(partido => {
          contenido.appendChild(crearPartido(partido));
        });
      });
      
      // Footer con patrocinadores (simplificado para ejemplo)
      const footer = document.createElement("div");
      footer.className = "patrocinadores";
      footer.innerHTML = `
        <div class="patro-titulo">BABESLEAK</div>
        <div class="patro-grid">
          <img src="images/patrocinio/aliprox.jpg" onerror="this.style.display='none'">
          <img src="images/patrocinio/arbeondo.jpg" onerror="this.style.display='none'">
          <img src="images/patrocinio/asadorepeleta.jpg" onerror="this.style.display='none'">
        </div>
      `;
      
      pagina.appendChild(header);
      pagina.appendChild(contenido);
      pagina.appendChild(footer);
      
      contenedor.appendChild(pagina);
    });

  } catch (error) {
    console.error("Error cargando datos:", error);
    document.getElementById("contenedor-paginas").innerHTML = `
      <div style="text-align: center; padding: 50px; font-family: Orbitron; color: red;">
        <h2>KARGA ERROREA</h2>
        <p>${error.message}</p>
      </div>
    `;
  }
}

// Iniciar carga
cargarDatos();

document.getElementById("btnExportar").addEventListener("click", async () => {
  const btn = document.getElementById("btnExportar");
  btn.style.display = "none";

  await document.fonts.ready;

  const paginas = document.querySelectorAll(".pagina-a3");
  let contador = 1;

  for (const pagina of paginas) {
    try {
      const canvas = await html2canvas(pagina, {
        scale: 2,
        backgroundColor: "#0a0a0a",
        allowTaint: true,
        useCORS: true
      });

      const titulo = pagina.querySelector('.categoria-titulo')?.textContent.toLowerCase().replace(/\s+/g, '-') || 'emaitzak';
      const enlace = document.createElement("a");
      enlace.download = `larraun-${titulo}-${contador}.jpg`;
      enlace.href = canvas.toDataURL("image/jpeg", 0.95);
      enlace.click();

      contador++;
    } catch (error) {
      console.error("Error exportando página:", error);
    }
  }

  btn.style.display = "block";
});

</script>
