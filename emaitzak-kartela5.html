/* ================= PELOTAS ================= */

:root {
  --pelotas-verdes: radial-gradient(circle 3px at 10% 20%, #19c93f 98%, transparent), radial-gradient(circle 4px at 30% 40%, #19c93f 98%, transparent);
  --pelotas-rojas: radial-gradient(circle 3px at 15% 25%, #ff6b6b 98%, transparent), radial-gradient(circle 4px at 35% 45%, #ff6b6b 98%, transparent);

<div class="exportar">

  </div>

<div id="contenedorPaginas"></div>

<script>
let FASES = {};
let CATEGORIAS = {};
let CATEGORIAS_EDAD = {};

/* ================= CARGAR CATEGORÍAS DE EDAD ================= */
function cargarCategoriasEdad() {
  return fetch("data/categoriaedad.json")
    .then(r => r.json())
    .catch(() => ({}));
}

/* ================= PELOTAS ================= */

function generarPelotas(color){
  let dots=[];
  for(let i=0;i<60;i++){
    const x=Math.random()*100;
    const y=Math.random()*100;
    const r=2+Math.random()*3;
    dots.push(`radial-gradient(circle ${r}px at ${x}% ${y}%, ${color} 98%, transparent)`);
  }
  return dots.join(",");
}

document.documentElement.style.setProperty('--pelotas-verdes', generarPelotas('#19c93f'));
document.documentElement.style.setProperty('--pelotas-rojas', generarPelotas('#ff6b6b'));
document.documentElement.style.setProperty('--pelotas-grises', generarPelotas('#bdbdbd'));

/* ================= UTIL ================= */

function esPartidoChicas(texto) {
  if (!texto) return false;
  const textoLower = texto.toLowerCase();
  const palabrasClave = ['neska', 'neskak', 'emakume', 'emakumea', 'emakumeak', 'femenino', 'femenina'];
  return palabrasClave.some(palabra => textoLower.includes(palabra));
}

function obtenerCategoriaEdad(texto) {
  if (!texto) return 'BESTEAK';
  
  // Primero comprobar si es de chicas
  if (esPartidoChicas(texto)) {
    return 'NESKAK';
  }
  
  const textoLower = texto.toLowerCase();
  
  for (const cat in CATEGORIAS_EDAD) {
    if (textoLower.includes(cat.toLowerCase())) {
      return cat;
    }
  }
  
  return 'BESTEAK';
}

function dividirEquipo(txt){
  txt = txt.replace(" (","<br>(");
  const partes = txt.split(")");
  const principal = partes[0] + ")";
  const resto = partes.slice(1).join(")").trim();
  return {principal, resto};
}

function logoClub(nombre){

  if(!nombre) return "";

  if(nombre.toLowerCase().includes("atseden"))
    return `<img class="logo pixelado" src="images/ATSEDENA.jpg">`;

  const limpio = nombre
    .split("(")[0]
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[.,]/g,"")
    .replace(/–/g,"-")
    .replace(/-/g," ")
    .trim()
    .toUpperCase();

  const archivo = limpio.replace(/\s+/g,"-");

  return `
    <img class="logo pixelado"
         src="images/clubes/${archivo}.jpg"
         onerror="this.src='images/clubes/DEFAULT.jpg'">
  `;
}

function estado(p){

  const texto = (p.modalidad || "").toLowerCase();
  if(texto.includes("atseden") || texto.includes("descanso"))
    return "rest";

  if(!p.tanteoa) return "";

  const [a,b] = p.tanteoa.split("-").map(Number);

  if((p.etxekoa||"").includes("LARRAUN"))
    return a > b ? "win" : "lose";
  else
    return b > a ? "win" : "lose";
}

function ordenar(lista){

  return lista.sort((a,b)=>{

    const esDescanso = p => {
      const texto = (
        (p.modalidad || "") + " " +
        (p.etxekoa || "") + " " +
        (p.kanpokoak || "")
      ).toLowerCase();

      return texto.includes("atseden") ||
             texto.includes("atsedena") ||
             texto.includes("descanso");
    };

    if(esDescanso(a) && !esDescanso(b)) return 1;
    if(!esDescanso(a) && esDescanso(b)) return -1;

    const fa = new Date(a.fecha + "T" + (a.hora || "00:00"));
    const fb = new Date(b.fecha + "T" + (b.hora || "00:00"));

    return fa - fb;
  });

}

function filtrarPeriodo(lista){

  const hoy = new Date();
  hoy.setHours(23,59,59,999);

  const diaSemana = hoy.getDay();
  const diasAtras = diaSemana === 0 ? 6 : diaSemana - 1;

  const inicioSemanaActual = new Date(hoy);
  inicioSemanaActual.setDate(hoy.getDate() - diasAtras);
  inicioSemanaActual.setHours(0,0,0,0);

  const inicioSemanaPasada = new Date(inicioSemanaActual);
  inicioSemanaPasada.setDate(inicioSemanaActual.getDate() - 7);

  return lista.filter(p => {
    const f = new Date(p.fecha + "T00:00");
    return f >= inicioSemanaPasada && f <= hoy;
  });
}

function extraerFase(texto){

  if(!texto) return { limpio:texto, etiqueta:"" };

  const fasesOrdenadas = Object.values(FASES)
    .sort((a,b) => b.length - a.length);

  for(const fase of fasesOrdenadas){

    const regex = new RegExp(`\\b${fase}\\b`, "i");

    if(regex.test(texto)){

      const textoLimpio = texto.replace(regex,"").trim();

      let claseExtra = "";
      if(fase.toUpperCase() === "FINALA"){
        claseExtra = " fase-finala";
      }

      const etiqueta = `<span class="fase${claseExtra}">${fase}</span>`;

      return { limpio:textoLimpio, etiqueta };
    }
  }

  return { limpio:texto, etiqueta:"" };
}

/* ================= RENDER ================= */

function crearPartido(p){

  const fronton = (p.fronton || "").toLowerCase();
  const esAzul = fronton.includes("lekunberri") || fronton.includes("aldatz");
  const colorHeader = esAzul ? "azul" : "granate";

  const est = estado(p);
  const eq1 = dividirEquipo(p.etxekoa);
  const eq2 = dividirEquipo(p.kanpokoak);
  const [a,b] = (p.tanteoa || "").split("-");

  let icono = "";

  const faseTexto = p.lehiaketa || p.modalidad || "";
  const esFinala = faseTexto.toUpperCase().includes("FINALA");

  if(est === "win"){
    icono = esFinala 
      ? `<div class="icono-resultado gana">🥇</div>`
      : `<div class="icono-resultado gana">✔</div>`;
  }
  else if(est === "lose"){
    icono = esFinala 
      ? `<div class="icono-resultado pierde">🥈</div>`
      : `<div class="icono-resultado pierde">✖</div>`;
  }

  const div = document.createElement("div");
  div.className = "partido " + est + (esFinala ? " partido-finala" : "");
  
  div.innerHTML = `
    <a href="${p.url || '#'}" target="_blank"
       class="partido-header ${colorHeader}">
      ${(() => {
        const faseData = extraerFase(p.lehiaketa || p.modalidad);
        return `
          <span>
            ${p.fecha} · ${p.fronton} ·
            ${p.url ? `<u>${faseData.limpio}</u>` : faseData.limpio}
            ${faseData.etiqueta}
          </span>
        `;
      })()}
    </a>

    <div class="fila">

      ${logoClub(p.etxekoa)}

      <div class="local">
        <div class="principal">${eq1.principal}</div>
        ${eq1.resto ? `<div class="pelotaris">${eq1.resto}</div>` : ""}
      </div>

      <div class="score">
        <div class="resultado-linea">
          <span class="blue">${a || ""}</span>
          <span class="icono-wrapper">${icono}</span>
          <span class="red">${b || ""}</span>
        </div>
        ${p.sets ? `<div class="sets">${p.sets}</div>` : ""}
      </div>

      <div class="visit">
        <div class="principal">${eq2.principal}</div>
        ${eq2.resto ? `<div class="pelotaris">${eq2.resto}</div>` : ""}
      </div>

      ${logoClub(p.kanpokoak)}

    </div>
  `;

  return div;
}

/* ===== DIVIDIR PARTIDOS EN PÁGINAS POR CATEGORÍA ===== */
function dividirPartidosPorCategoria(partidos, maxPartidosPorPagina = 4) {
  const paginas = [];
  let paginaActual = [];
  let partidosEnPaginaActual = 0;
  
  partidos.forEach(partido => {
    if (partidosEnPaginaActual >= maxPartidosPorPagina) {
      paginas.push(paginaActual);
      paginaActual = [partido];
      partidosEnPaginaActual = 1;
    } else {
      paginaActual.push(partido);
      partidosEnPaginaActual++;
    }
  });
  
  if (paginaActual.length > 0) {
    paginas.push(paginaActual);
  }
  
  return paginas;
}

/* ===== CREAR PÁGINA STORY PARA UNA CATEGORÍA ===== */
function crearPaginaCategoria(nombreCategoria, partidos, numPagina, totalPaginas, esPrimeraPagina = true, esUltimaPagina = true) {
  const p = document.createElement("div");
  p.className = "pagina-story";
  p.id = `pagina-${numPagina}`;
  
  const headerHTML = `
    <div class="header">
      <img src="images/logo-larraun.png" class="logo-izq">
      EMAITZAK
      <img src="images/logo-fnp.png" class="logo-der">
    </div>
  `;
  
  let categoriaHTML = `
    <div class="categoria-container">
      <div class="categoria-badge">
        <div class="categoria-nombre">${nombreCategoria}</div>
  `;
  
  if (!esPrimeraPagina || !esUltimaPagina) {
    categoriaHTML += `<div class="categoria-info">⚡ ${partidos.length} partidu · ZATIA ${numPagina}</div>`;
  } else {
    categoriaHTML += `<div class="categoria-info">${partidos.length} partidu</div>`;
  }
  
  categoriaHTML += `
      </div>
    </div>
  `;
  
  p.innerHTML = headerHTML + `
    <div class="contenido-story">
      ${categoriaHTML}
      <div id="partidos-${numPagina}"></div>
    </div>
  `;
  
  document.getElementById("contenedorPaginas").appendChild(p);
  
  // Añadir partidos
  const partidosContainer = p.querySelector(`#partidos-${numPagina}`);
  
  partidos.forEach(partido => {
    partidosContainer.appendChild(crearPartido(partido));
  });
  
  // AÑADIR INDICADOR DE CONTINUACIÓN SI NO ES LA ÚLTIMA PÁGINA
  if (!esUltimaPagina) {
    const indicator = document.createElement("div");
    indicator.className = "continuation-indicator";
    indicator.innerHTML = `
      <span>👇</span> JARRAITU <span>👇</span>
    `;
    partidosContainer.appendChild(indicator);
  }
  
  return p;
}

/* ===== CREAR PÁGINA FINAL CON PATROCINADORES ===== */
function crearPaginaPatrocinadores(numPagina, totalPaginas) {
  const p = document.createElement("div");
  p.className = "pagina-story";
  p.id = `pagina-${numPagina}`;
  
  const headerHTML = `
    <div class="header">
      <img src="images/logo-larraun.png" class="logo-izq">
      EMAITZAK
      <img src="images/logo-fnp.png" class="logo-der">
    </div>
  `;
  
  const patroHTML = `
    <div class="categoria-container">
      <div class="categoria-badge">
        <div class="categoria-nombre">BABESLEAK</div>
        <div class="categoria-info">Eskerrik asko!</div>
      </div>
    </div>
  `;
  
  const footerHTML = `
    <div class="patrocinadores">
      <div class="patro-titulo">BABESLEAK</div>
      <div class="patro-grid">
        <img src="images/patrocinio/aliprox.jpg" alt="aliprox.jpg">
        <img src="images/patrocinio/arbeondo.jpg" alt="arbeondo.jpg">
        <img src="images/patrocinio/asadorepeleta.jpg" alt="asadorepeleta.jpg">

/* ================= CARGA PRINCIPAL ================= */

Promise.all([
  fetch("data/resultados-larraun.json").then(r => r.json()),
  fetch("data/resultados-no-oficiales.json").then(r => r.json()),
  fetch("data/fases.json").then(r => r.json()),
  fetch("data/categoriacartel.json").then(r => r.json()),
  cargarCategoriasEdad()
]).then(([larraun, noOficiales, fases, categorias, categoriasEdad]) => {

  FASES = fases;
  CATEGORIAS = categorias;
  CATEGORIAS_EDAD = categoriasEdad;

  const todos = filtrarPeriodo([...larraun, ...noOficiales]);
  
  console.log('Total partidos:', todos.length);
  
  // Agrupar por categoría de edad
  const partidosPorCategoria = {};
  
  todos.forEach(p => {
    const textoLehiaketa = p.lehiaketa || p.modalidad || "";
    const categoria = obtenerCategoriaEdad(textoLehiaketa);
    
    if (!partidosPorCategoria[categoria]) {
      partidosPorCategoria[categoria] = [];
    }
    partidosPorCategoria[categoria].push(p);
  });
  
  console.log('Categorías encontradas:', Object.keys(partidosPorCategoria));
  
  // Ordenar categorías (NESKAK primero, luego por edad, luego BESTEAK)
  const categoriasOrdenadas = Object.keys(partidosPorCategoria).sort((a, b) => {
    if (a === 'NESKAK') return -1;
    if (b === 'NESKAK') return 1;
    if (a === 'BESTEAK') return 1;
    if (b === 'BESTEAK') return -1;
    return a.localeCompare(b);
  });
  
  let contadorPaginas = 1;
  const todasLasPaginas = [];
  
  // Crear páginas para cada categoría
  categoriasOrdenadas.forEach(categoria => {
    const partidos = ordenar(partidosPorCategoria[categoria]);
    
    // Dividir la categoría en páginas (máx 4 partidos por página)
    const paginasCategoria = dividirPartidosPorCategoria(partidos, 4);
    
    paginasCategoria.forEach((partidosPagina, index) => {
      todasLasPaginas.push({
        categoria,
        partidos: partidosPagina,
        esPrimera: index === 0,
        esUltima: index === paginasCategoria.length - 1,
        numPaginaEnCategoria: index + 1,
        totalPaginasEnCategoria: paginasCategoria.length
      });
    });
  });
  
  // Crear todas las páginas de partidos
  todasLasPaginas.forEach((info, index) => {
    crearPaginaCategoria(
      info.categoria,
      info.partidos,
      index + 1,
      todasLasPaginas.length + 1, // +1 por la página de patrocinadores
      info.esPrimera,
      info.esUltima
    );
  });
  
  // Añadir página final de patrocinadores
  crearPaginaPatrocinadores(todasLasPaginas.length + 1, todasLasPaginas.length + 1);
  
  document.getElementById('pageCounter').innerHTML = 
    todasLasPaginas.length > 0 
      ? `📱 ${todasLasPaginas.length + 1} story${todasLasPaginas.length + 1 > 1 ? 's' : ''} generada${todasLasPaginas.length + 1 > 1 ? 's' : ''} (${Object.keys(partidosPorCategoria).length} categorías)` 
      : '📱 No hay resultados esta semana';
});

/* ===== EXPORTAR ===== */
async function exportarTodasLasStories() {
  const paginas = document.querySelectorAll(".pagina-story");
  const total = paginas.length;
  
  for (let i = 0; i < paginas.length; i++) {
    const pagina = paginas[i];
    
    document.getElementById('pageCounter').innerHTML = `📸 Exportando story ${i + 1}/${total}...`;
    
    await document.fonts.ready;
    
    const imagenes = Array.from(pagina.images);
    await Promise.all(
      imagenes.map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = img.onerror = resolve;
        });
      })
    );
    
    const canvas = await html2canvas(pagina, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#1e4f32',
      windowWidth: 1080,
      allowTaint: false,
      logging: false,
      scrollY: -window.scrollY,
      height: pagina.offsetHeight,
      windowHeight: pagina.offsetHeight
    });
    
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/jpeg", 0.95);
    
    // Extraer información para el nombre del archivo
    const categoriaElem = pagina.querySelector('.categoria-nombre');
    const categoria = categoriaElem ? categoriaElem.textContent.trim() : 'emaitzak';
    
    // Ver si es múltiples partes
    const infoElem = pagina.querySelector('.categoria-info');
    let sufijo = '';
    if (infoElem && infoElem.textContent.includes('ZATIA')) {
      const match = infoElem.textContent.match(/ZATIA (\d+)/);
      if (match) {
        sufijo = `-parte-${match[1]}`;
      }
    }
    
    a.download = `emaitzak-${categoria}${sufijo}-${(i + 1).toString().padStart(2, '0')}.jpg`;
    a.click();
    
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  
  document.getElementById('pageCounter').innerHTML = `✅ ¡${total} stories exportadas!`;
}
