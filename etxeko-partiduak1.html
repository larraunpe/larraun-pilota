<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etxeko partiduak – Stories</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#1b4d31;
  font-family:'Trebuchet MS','Arial Black',sans-serif;
  padding:20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.exportar{
  text-align:center;
  margin:20px auto;
  max-width:1200px;
  width: 100%;
}

.exportar button{
  background:#ff0050;
  color:white;
  border:none;
  padding:12px 30px;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
  transition:transform .2s;
}

.exportar button:hover{
  transform:scale(1.05);
}

.exportar button.secondary {
  background: #2a5fc4;
}

#pageCounter{
  color:white;
  font-size:16px;
  margin-top:10px;
}

#contenedorPaginas {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

/* ===== SELECTOR DE DÍA ===== */
.selector-dia {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 50px;
  margin: 20px auto;
  border: 2px solid gold;
  max-width: 800px;
}

.dias-grid {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.dia-btn {
  background: rgba(0,0,0,0.5);
  color: white;
  border: 2px solid gold;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
  min-width: 120px;
}

.dia-btn:hover {
  transform: scale(1.05);
  background: gold;
  color: black;
}

.dia-btn.active {
  background: gold;
  color: black;
  border-color: white;
}

.dia-btn.sunday {
  background: #c60000;
}

.dia-btn.sunday.active {
  background: #ffd700;
  color: black;
}

.info-dia {
  text-align: center;
  color: white;
  font-size: 18px;
  margin: 15px 0 0;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 30px;
}

/* ===== PÁGINA STORY ===== */
.pagina{
  width:1080px;
  margin:30px auto;
  display:flex;
  flex-direction:column;
  /* Fondo de roca - usar una imagen con textura de piedra */
  background-image: url('https://www.transparenttextures.com/ascii/stone-wall.png'), 
                    linear-gradient(145deg, #5a5a5a, #3a3a3a);
  background-size: auto, cover;
  background-position: center;
  background-repeat: repeat, no-repeat;
  background-blend-mode: overlay;
  position:relative;
  box-shadow:0 0 30px rgba(0,0,0,.5);
  border-radius:30px;
  overflow: hidden;
  height: auto;
  min-height: 1200px;
}

/* Alternativa si no hay conexión a internet - fondo de roca con CSS */
.pagina::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: repeating-linear-gradient(
    45deg,
    rgba(100, 100, 100, 0.2) 0px,
    rgba(100, 100, 100, 0.2) 2px,
    rgba(80, 80, 80, 0.2) 2px,
    rgba(80, 80, 80, 0.2) 4px
  );
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER COMPACTO ===== */
.header{
  height:100px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(5px);
  flex-shrink: 0;
  padding:0 30px;
  border-bottom:3px solid gold;
  z-index: 10;
}

.logo-izq, .logo-der{
  height:70px;
  object-fit:contain;
}

.dia-header{
  color:white;
  font-size:36px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:3px;
  text-shadow:3px 3px 0 #000;
}

/* ===== CONTENIDO ===== */
.contenido{
  padding:20px 30px;
  flex: 1;
  overflow: visible;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(2px);
  margin:20px;
  border-radius:30px;
  position: relative;
  z-index: 10;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* ===== GRUPO PARTIDOS ===== */
.grupo{
  background:white;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  border:2px solid gold;
}

.grupo-header{
  padding:12px 20px;
  color:white;
  position:relative;
  overflow:hidden;
}

.grupo-header.jai-alai{ background:linear-gradient(135deg, #1565c0, #0d47a1); }
.grupo-header.trinkete{ background:linear-gradient(135deg, #ad1457, #7a0c3a); }

.fronton{
  font-size:22px;
  font-weight:900;
  margin-bottom:3px;
  display:flex;
  align-items:center;
  gap:8px;
}

.fronton-icon{
  font-size:24px;
}

.datetime{
  font-size:18px;
  display:flex;
  align-items:center;
  gap:15px;
  opacity:.9;
}

.grupo-body{
  padding:12px;
  background:white;
}

/* ===== PARTIDO ===== */
.partido{
  padding:10px 0;
  border-bottom:2px solid #eee;
  transition:all .2s;
}

.partido:last-child{
  border-bottom:none;
}

.partido.finala-partido {
  background: linear-gradient(145deg, rgba(255, 215, 0, 0.15), rgba(255, 200, 0, 0.25));
  border-left: 8px solid #d4af37;
  border-right: 8px solid #d4af37;
  border-radius: 20px;
  margin: 12px -5px;
  padding: 12px 10px;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

.partido-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.partido-numero{
  background:#333;
  color:white;
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:16px;
  flex-shrink:0;
}

.torneo-container{
  flex:1;
  margin-left:10px;
}

.torneo{
  font-size:18px;
  font-weight:900;
  padding:5px 12px;
  border-radius:30px;
  display:inline-block;
  color:#1e4f32!important;
  background:rgba(255,255,255,0.7);
  box-shadow:0 2px 5px rgba(0,0,0,.2);
  border:2px solid rgba(30,79,50,.3);
}

.torneo.finala-torneo {
  background:linear-gradient(145deg,#FFD700,#FDB931)!important;
  color:#000!important;
  font-size:20px;
  padding:6px 18px;
  border:3px solid #b8860b;
  box-shadow:0 5px 15px rgba(0,0,0,0.5),0 0 15px #FFD700;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}

.equipos{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:8px;
}

.equipo{
  display:flex;
  align-items:center;
  font-size:18px;
  font-weight:700;
  padding:5px 10px;
  border-radius:10px;
  background:#f5f5f5;
}

.equipo-icon{
  font-size:20px;
  margin-right:10px;
  width:30px;
  text-align:center;
}

.etxekoa{ color:#0d47a1; }
.kanpokoa{ color:#b71c1c; }

/* ===== INDICADOR DE CONTINUACIÓN ===== */
.continuation-indicator {
  display:flex!important;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin:30px 0 20px;
  color:white;
  font-size:22px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:60px;
  backdrop-filter:blur(5px);
  border:4px solid gold;
  width:80%;
  margin-left:auto;
  margin-right:auto;
  position: relative;
  z-index: 10;
}

.continuation-indicator span {
  animation:bounce 2s infinite;
  font-size:36px;
  display:inline-block;
}

@keyframes bounce {
  0%,20%,50%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(-15px)}
  60%{transform:translateY(-8px)}
}

/* ===== INDICADOR PÁGINA ===== */
.page-indicator{
  position:absolute;
  bottom:25px;
  right:35px;
  background:rgba(0,0,0,.7);
  color:white;
  padding:10px 20px;
  border-radius:40px;
  font-size:20px;
  font-weight:bold;
  border:3px solid gold;
  z-index:100;
  backdrop-filter:blur(5px);
}

/* ===== FOOTER ===== */
.footer{
  background:linear-gradient(#2f2f2f, #1a1a1a);
  padding:15px;
  border-top:3px solid gold;
  flex-shrink:0;
  border-radius:0 0 30px 30px;
  position: relative;
  z-index: 10;
}

.logos-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:10px;
}

.logo-item{
  background:white;
  padding:5px;
  border-radius:8px;
  box-shadow:0 4px 8px rgba(0,0,0,.3);
}

.logo-item img{
  width:100%;
  height:35px;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="exportar">
  <div class="selector-dia" id="selectorDia">
    <div class="dias-grid" id="diasGrid"></div>
    <div class="info-dia" id="infoDia">Cargando partidos...</div>
  </div>
  <div>
    <button onclick="exportarTodasLasStories()">📱 EXPORTAR STORIES DEL DÍA SELECCIONADO</button>
    <button class="secondary" onclick="exportarTodosLosDias()">📱 EXPORTAR TODOS LOS DÍAS</button>
  </div>
  <div id="pageCounter"></div>
</div>

<div id="contenedorPaginas"></div>

<script>
let CATEGORIAS = {};
let todosLosPartidos = [];
let partidosPorDiaReal = {};

/* ===== CARGAR CATEGORÍAS ===== */
function cargarCategorias() {
  return fetch("data/categoriacartel.json")
    .then(r => r.json())
    .catch(() => ({}));
}

/* ===== GENERAR CLASES CSS PARA CATEGORÍAS ===== */
function generarClasesCategorias() {
  const style = document.createElement("style");
  let css = "";
  
  for (const cat in CATEGORIAS) {
    css += `
      .cat-${cat} {
        background: ${CATEGORIAS[cat]} !important;
      }
    `;
  }
  
  style.innerHTML = css;
  document.head.appendChild(style);
}

/* ===== OBTENER CLASE DE CATEGORÍA ===== */
function obtenerClaseCategoria(texto) {
  if (!texto) return "";
  
  const textoLower = texto.toLowerCase();
  
  for (const cat in CATEGORIAS) {
    if (textoLower.includes(cat.toLowerCase())) {
      return "cat-" + cat;
    }
  }
  return "";
}

/* ===== FORMATO DE FECHA ===== */
function dayEU(d) {
  if (!d || !(d instanceof Date) || isNaN(d.getTime())) {
    d = new Date();
  }
  
  const days = ["IGANDEA", "ASTELEHENA", "ASTEARTEA", "ASTEAZKENA", "OSTEGUNA", "OSTIRALA", "LARUNBATA"];
  const months = ["URTARRILA", "OTSAILA", "MARTXOA", "APIRILA", "MAIATZA", "EKAINA", "UZTAILA", "ABUZTUA", "IRAILA", "URRIA", "AZAROA", "ABENDUA"];
  
  return {
    dia: days[d.getDay()],
    fecha: `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`
  };
}

function formatearFechaKey(d) {
  return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
}

/* ===== PARSEAR FECHA DESDE STRING ===== */
function parseFecha(fechaStr) {
  if (!fechaStr) return new Date();
  
  let fecha;
  
  if (fechaStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
    fecha = new Date(fechaStr + "T12:00:00");
  }
  else if (fechaStr.match(/^\d{4}\/\d{2}\/\d{2}$/)) {
    const partes = fechaStr.split('/');
    fecha = new Date(`${partes[0]}-${partes[1]}-${partes[2]}T12:00:00`);
  }
  else if (fechaStr.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
    const partes = fechaStr.split('/');
    fecha = new Date(`${partes[2]}-${partes[1]}-${partes[0]}T12:00:00`);
  }
  else if (fechaStr.match(/^\d{2}-\d{2}-\d{4}$/)) {
    const partes = fechaStr.split('-');
    fecha = new Date(`${partes[2]}-${partes[1]}-${partes[0]}T12:00:00`);
  }
  else {
    fecha = new Date(fechaStr + "T12:00:00");
  }
  
  if (isNaN(fecha.getTime())) {
    console.warn("Fecha inválida:", fechaStr, "usando fecha actual");
    fecha = new Date();
  }
  
  return fecha;
}

/* ===== GENERAR PELOTAZOS ===== */
function generarPelotazos(contenedor, altura) {
  contenedor.innerHTML = '';
  
  for (let i = 0; i < 2000; i++) {
    const d = document.createElement("div");
    const s = Math.random() * 4 + 2;
    
    d.className = "pelota-dot";
    d.style.width = d.style.height = s + "px";
    d.style.left = Math.random() * 1080 + "px";
    d.style.top = Math.random() * altura + "px";
    
    contenedor.appendChild(d);
  }
}

/* ===== CREAR HEADER COMPACTO ===== */
function crearHeader(diaInfo) {
  return `
    <div class="header">
      <img src="images/logo-larraun.png" class="logo-izq" onerror="this.style.display='none'">
      <div class="dia-header">${diaInfo.dia}</div>
      <img src="images/logo-fnp.png" class="logo-der" onerror="this.style.display='none'">
    </div>
    <div class="pelotazos"></div>
  `;
}

/* ===== CREAR FOOTER ===== */
function crearFooter(numPagina, totalPaginas) {
  return `
    <div class="footer">
      <div class="logos-grid"></div>
    </div>
    <div class="page-indicator">${numPagina}/${totalPaginas}</div>
  `;
}

/* ===== RELLENAR LOGOS ===== */
function rellenarLogos(pagina) {
  const LOGOS = [
    "aliprox.jpg","arbeondo.jpg","asadorepeleta.jpg","barainhoa.jpg","kotxera.jpg",
    "barilargi.jpg","barlekuonberri.jpg","begoñajanaridenda.jpg","carniceriaartxueta.jpg",
    "carpinteriahnosazpiroz.jpg","construccionesgañarbe.jpg","construccionesgarciarenasaralegi.jpg",
    "construccionesurangasaijos.jpg","hotelayestaran.jpg","iseelectricidad.jpg",
    "kattagorrielkartea.jpg","lacturale.jpg","lagunasesoria.jpg","maderasnasorena.jpg",
    "maskarada.jpg","suacontrol.jpg","urzubi.jpg","ventamugiro.jpg","dietistaanagurrea.jpg",
    "ekin.jpg","farmaciaitziarmendia.png","fontaneriabalenciaga.jpg","fontaneriairibarren.jpg",
    "izarberri.png","lakita.jpg","sidreriatokialai.jpg","tallereslarraun.jpg",
    "talleresotxotorena.jpg","veterinarialekunberri.jpg"
  ];

  const grid = pagina.querySelector(".logos-grid");
  if (grid) {
    grid.innerHTML = LOGOS
      .map(f => `<div class="logo-item"><img src="images/patrocinio/${f}" onerror="this.style.display='none'"></div>`)
      .join("");
  }
}

/* ===== PAGINACIÓN AL FINAL ===== */
function paginarGrupos(grupos, maxPartidosPorPagina = 6) {
  const paginas = [];
  let paginaActual = [];
  let partidosEnPaginaActual = 0;
  
  grupos.forEach(grupo => {
    const tamañoGrupo = grupo.length;
    
    if (partidosEnPaginaActual + tamañoGrupo > maxPartidosPorPagina && paginaActual.length > 0) {
      paginas.push(paginaActual);
      paginaActual = [grupo];
      partidosEnPaginaActual = tamañoGrupo;
    } else {
      paginaActual.push(grupo);
      partidosEnPaginaActual += tamañoGrupo;
    }
  });
  
  if (paginaActual.length > 0) {
    paginas.push(paginaActual);
  }
  
  return paginas;
}

/* ===== CREAR PÁGINA CON GRUPOS ===== */
function crearPaginaConGrupos(diaInfo, grupos, numPagina, totalPaginas, fechaOriginal) {
  const p = document.createElement("div");
  p.className = "pagina";
  p.id = `pagina-${numPagina}`;
  
  let partidosEnPagina = 0;
  grupos.forEach(g => partidosEnPagina += g.length);
  
  p.innerHTML = crearHeader(diaInfo) + `
    <div class="contenido">
      <div style="text-align:center; margin-bottom:15px;">
        <div style="font-size:20px; color:#333; font-weight:bold;">${fechaOriginal}</div>
        ${totalPaginas > 1 ? `<div style="font-size:18px; color:gold; background:rgba(0,0,0,0.5); padding:5px 15px; border-radius:40px; display:inline-block; margin-top:5px;">⚡ ${partidosEnPagina} partidu · ZATIA ${numPagina}/${totalPaginas}</div>` : ''}
      </div>
      <div id="grupos-${numPagina}"></div>
    </div>
  ` + crearFooter(numPagina, totalPaginas);
  
  document.getElementById("contenedorPaginas").appendChild(p);
  
  const gruposContainer = p.querySelector(`#grupos-${numPagina}`);
  
  grupos.forEach((partidosGrupo, idx) => {
    const b0 = partidosGrupo[0];
    const esTrinkete = /trinkete/i.test(b0.fronton || "");
    
    const grupo = document.createElement("div");
    grupo.className = "grupo";
    
    grupo.innerHTML = `
      <div class="grupo-header ${esTrinkete ? 'trinkete' : 'jai-alai'}">
        <div class="fronton">
          <span class="fronton-icon">📍</span>
          ${b0.fronton || "Frontoia"}
        </div>
        <div class="datetime">
          <span>🗓 ${b0.fecha || ""}</span>
          <span>⏰ ${b0.hora || "00:00"}</span>
        </div>
      </div>
      <div class="grupo-body" id="grupo-${numPagina}-${idx}"></div>
    `;
    
    const body = grupo.querySelector(`#grupo-${numPagina}-${idx}`);
    
    partidosGrupo.forEach((m, i) => {
      const claseCategoria = obtenerClaseCategoria(m.lehiaketa);
      const esFinala = m.lehiaketa && m.lehiaketa.toUpperCase().includes("FINALA");
      
      const partidoClass = esFinala ? "partido finala-partido" : "partido";
      const torneoClass = esFinala ? "torneo finala-torneo" : `torneo ${claseCategoria}`;
      
      body.innerHTML += `
        <div class="${partidoClass}">
          <div class="partido-header">
            <div class="partido-numero">${i + 1}</div>
            <div class="torneo-container">
              <div class="${torneoClass}">${m.lehiaketa || "Txapelketa"}</div>
            </div>
          </div>
          <div class="equipos">
            <div class="equipo etxekoa">
              <span class="equipo-icon">🏠</span>
              ${m.etxekoa || ""}
            </div>
            <div class="equipo kanpokoa">
              <span class="equipo-icon">✈️</span>
              ${m.kanpokoak || ""}
            </div>
          </div>
        </div>
      `;
    });
    
    gruposContainer.appendChild(grupo);
  });
  
  if (numPagina < totalPaginas) {
    const indicator = document.createElement("div");
    indicator.className = "continuation-indicator";
    indicator.innerHTML = `
      <span>👇</span> JARRAITU <span>👇</span>
    `;
    gruposContainer.appendChild(indicator);
  }
  
  setTimeout(() => {
    const alturaTotal = p.offsetHeight;
    const pel = p.querySelector(".pelotazos");
    generarPelotazos(pel, alturaTotal);
  }, 100);
  
  rellenarLogos(p);
  
  return p;
}

/* ===== CARGAR Y PROCESAR PARTIDOS ===== */
Promise.all([
  fetch("data/cartelera-larraun.json").then(r => r.json()),
  fetch("data/partidos-no-oficiales.json").then(r => r.json()),
  cargarCategorias()
]).then(([oficiales, noOficiales, categorias]) => {
  
  CATEGORIAS = categorias;
  generarClasesCategorias();
  
  todosLosPartidos = [
    ...oficiales.map(p => ({ ...p, ofiziala: true })),
    ...noOficiales.map(p => ({ ...p, ofiziala: p.ofiziala === "true" }))
  ];
  
  const partidosFiltrados = todosLosPartidos.filter(p => {
    if (!p.fronton) return false;
    const frontonLower = p.fronton.toLowerCase();
    return frontonLower.includes('lekunberri') || frontonLower.includes('aldatz');
  });
  
  partidosFiltrados.forEach(p => {
    const fecha = parseFecha(p.fecha);
    const fechaKey = formatearFechaKey(fecha);
    
    if (!partidosPorDiaReal[fechaKey]) {
      partidosPorDiaReal[fechaKey] = {
        fecha: fecha,
        partidos: []
      };
    }
    partidosPorDiaReal[fechaKey].partidos.push(p);
  });
  
  const diasGrid = document.getElementById('diasGrid');
  const diasOrdenados = Object.keys(partidosPorDiaReal).sort();
  
  diasOrdenados.forEach((fechaKey) => {
    const diaData = partidosPorDiaReal[fechaKey];
    const diaInfo = dayEU(diaData.fecha);
    const totalPartidos = diaData.partidos.length;
    
    const btn = document.createElement('button');
    btn.className = `dia-btn ${diaInfo.dia === 'IGANDEA' ? 'sunday' : ''}`;
    btn.innerHTML = `${diaInfo.dia}<br><small>${diaInfo.fecha}</small><br><strong>${totalPartidos} partidu</strong>`;
    btn.onclick = (e) => {
      document.querySelectorAll('.dia-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      seleccionarDia(fechaKey);
    };
    
    diasGrid.appendChild(btn);
  });
  
  if (diasOrdenados.length > 0) {
    seleccionarDia(diasOrdenados[0]);
    document.querySelector('.dia-btn')?.classList.add('active');
  } else {
    document.getElementById('infoDia').innerHTML = '❌ No hay partidos en Lekunberri o Aldatz';
  }
}).catch(error => {
  console.error("Error cargando datos:", error);
  document.getElementById('infoDia').innerHTML = '❌ Error cargando partidos';
});

/* ===== SELECCIONAR DÍA ===== */
function seleccionarDia(fechaKey) {
  document.getElementById('contenedorPaginas').innerHTML = '';
  
  const diaData = partidosPorDiaReal[fechaKey];
  if (!diaData) return;
  
  const diaInfo = dayEU(diaData.fecha);
  const fechaOriginal = `${diaInfo.dia} ${diaInfo.fecha}`;
  const partidos = diaData.partidos;
  
  // Ordenar partidos por hora
  partidos.sort((a, b) => {
    const horaA = a.hora || "00:00";
    const horaB = b.hora || "00:00";
    return horaA.localeCompare(horaB);
  });
  
  // Agrupar por frontón y hora
  const gruposMap = {};
  partidos.forEach(p => {
    const key = `${p.fronton}|${p.fecha}|${p.hora}`;
    if (!gruposMap[key]) gruposMap[key] = [];
    gruposMap[key].push(p);
  });
  
  const grupos = Object.values(gruposMap);
  
  // Paginar al final (máximo 6 partidos por página)
  const paginasDia = paginarGrupos(grupos, 6);
  
  paginasDia.forEach((gruposPagina, index) => {
    crearPaginaConGrupos(
      diaInfo,
      gruposPagina,
      index + 1,
      paginasDia.length,
      fechaOriginal
    );
  });
  
  document.getElementById('infoDia').innerHTML = 
    `📅 ${fechaOriginal} · ${partidos.length} partidos · ${paginasDia.length} página${paginasDia.length > 1 ? 's' : ''}`;
  
  document.getElementById('pageCounter').innerHTML = 
    `📱 ${paginasDia.length} story${paginasDia.length > 1 ? 's' : ''} para este día`;
}

/* ===== EXPORTAR ===== */
async function exportarTodasLasStories() {
  const paginas = document.querySelectorAll(".pagina");
  const total = paginas.length;
  
  for (let i = 0; i < paginas.length; i++) {
    const pagina = paginas[i];
    
    document.getElementById('pageCounter').innerHTML = `📸 Exportando story ${i + 1}/${total}...`;
    
    await new Promise(resolve => setTimeout(resolve, 200));
    
    const canvas = await html2canvas(pagina, {
      scale: 2,
      useCORS: true,
      backgroundColor: null,
      windowWidth: 1080,
      allowTaint: false,
      logging: false,
      scrollY: 0,
      height: pagina.offsetHeight,
      windowHeight: pagina.offsetHeight
    });
    
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/jpeg", 0.95);
    
    const diaElem = pagina.querySelector('.dia-header');
    const dia = diaElem ? diaElem.textContent.trim() : `dia-${i + 1}`;
    
    const infoElem = pagina.querySelector('.contenido div:first-child div:last-child');
    let sufijo = '';
    if (infoElem && infoElem.textContent.includes('ZATIA')) {
      const match = infoElem.textContent.match(/ZATIA (\d+)\/(\d+)/);
      if (match) {
        sufijo = `-parte-${match[1]}`;
      }
    }
    
    a.download = `etxekoak-${dia}${sufijo}.jpg`;
    a.click();
    
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  
  document.getElementById('pageCounter').innerHTML = `✅ ¡${total} stories exportadas!`;
}

async function exportarTodosLosDias() {
  const dias = Object.keys(partidosPorDiaReal).sort();
  
  for (const fechaKey of dias) {
    seleccionarDia(fechaKey);
    await new Promise(resolve => setTimeout(resolve, 1000));
    await exportarTodasLasStories();
  }
}
