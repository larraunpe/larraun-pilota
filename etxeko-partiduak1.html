<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etxeko partiduak – Stories</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#1b4d31;
  font-family:'Trebuchet MS','Arial Black',sans-serif;
  padding:20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.exportar{
  text-align:center;
  margin:20px auto;
  max-width:1200px;
  width: 100%;
}

.exportar button{
  background:#ff0050;
  color:white;
  border:none;
  padding:12px 30px;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
  transition:transform .2s;
}

.exportar button:hover{
  transform:scale(1.05);
}

#pageCounter{
  color:white;
  font-size:16px;
  margin-top:10px;
}

#contenedorPaginas {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

/* ===== PÁGINA STORY ===== */
.pagina{
  width:1080px;
  margin:30px auto;
  display:flex;
  flex-direction:column;
  background:linear-gradient(145deg, #2a6e46, #1e4f32);
  position:relative;
  box-shadow:0 0 30px rgba(0,0,0,.5);
  border-radius:30px;
  overflow: visible;
}

/* ===== HEADER ===== */
.header{
  height:160px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg, #2a5fc4, #1a3a8a);
  box-shadow:inset 0 -10px 20px rgba(0,0,0,.4);
  flex-shrink: 0;
  border-radius: 30px 30px 0 0;
}

.header::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:50px;
  background:linear-gradient(rgba(255,255,255,.3), transparent);
  border-radius: 30px 30px 0 0;
}

.logo-izq, .logo-der{
  position:absolute;
  top:25px;
  height:100px;
  z-index:10;
}
.logo-izq{ left:25px; }
.logo-der{ right:25px; }

.titulo-curvo{
  width:100%;
  height:140px;
}

.titulo-curvo text{
  font-size:40px;
  font-weight:900;
  fill:white;
  text-shadow:2px 2px 4px rgba(0,0,0,.3);
}

/* ===== DÍA SEMANA ===== */
.dia-container{
  text-align:center;
  margin:25px 0 15px;
  position:relative;
  flex-shrink: 0;
}

.dia-semana{
  display:inline-block;
  background:rgba(255,215,0,0.25);
  backdrop-filter:blur(5px);
  padding:15px 40px;
  border-radius:60px;
  border:3px solid gold;
  box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.dia-semana .dia{
  font-size:42px;
  font-weight:900;
  color:white;
  text-transform:uppercase;
  letter-spacing:3px;
  text-shadow:3px 3px 0 #000, 5px 5px 10px rgba(0,0,0,.5);
}

.dia-semana .fecha{
  font-size:24px;
  color:#f0f0f0;
  margin-top:5px;
  font-weight:bold;
}

/* ===== CONTENIDO ===== */
.contenido{
  padding:20px 30px;
  flex: 1;
}

/* ===== GRUPO PARTIDOS ===== */
.grupo{
  background:rgba(255,255,255,.95);
  border-radius:25px;
  overflow:hidden;
  margin-bottom:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
  border:2px solid rgba(255,215,0,.3);
}

.grupo-header{
  padding:18px 22px;
  color:white;
  position:relative;
  overflow:hidden;
}

.grupo-header.jai-alai{ background:linear-gradient(135deg, #1565c0, #0d47a1); }
.grupo-header.trinkete{ background:linear-gradient(135deg, #ad1457, #7a0c3a); }

.grupo-header::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:40px;
  background:linear-gradient(rgba(255,255,255,.2), transparent);
}

.fronton{
  font-size:30px;
  font-weight:900;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
  z-index:2;
}

.fronton-icon{
  font-size:36px;
}

.datetime{
  font-size:22px;
  display:flex;
  align-items:center;
  gap:15px;
  opacity:.9;
  position:relative;
  z-index:2;
}

.grupo-body{
  padding:20px;
  background:white;
}

/* ===== PARTIDO ===== */
.partido{
  padding:18px 0;
  border-bottom:2px solid #eee;
  transition:all .2s;
}

.partido:last-child{
  border-bottom:none;
}

/* Estilo especial para FINALA */
.partido.finala-partido {
  background: linear-gradient(145deg, rgba(255, 215, 0, 0.15), rgba(255, 200, 0, 0.25));
  border-left: 8px solid #d4af37;
  border-right: 8px solid #d4af37;
  border-radius: 20px;
  margin: 20px -5px;
  padding: 18px 10px;
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
}

.partido-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.partido-numero{
  background:#333;
  color:white;
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:20px;
  flex-shrink: 0;
}

.torneo-container{
  flex:1;
  margin-left:15px;
}

/* Estilo base para torneo - TEXTO EN VERDE OSCURO */
.torneo{
  font-size:22px;
  font-weight:900;
  padding:8px 18px;
  border-radius:40px;
  display:inline-block;
  color: #1e4f32 !important;
  background: rgba(255,255,255,0.7);
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  border: 2px solid rgba(30, 79, 50, 0.3);
  text-shadow: 0 1px 0 white;
}

/* Estilo especial para FINALA - MUY DESTACADO */
.torneo.finala-torneo {
  background: linear-gradient(145deg, #FFD700, #FDB931) !important;
  color: #000000 !important;
  font-size: 26px;
  padding: 12px 25px;
  border: 3px solid #b8860b;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 20px #FFD700;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 1px 1px 0 #FFF;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.equipos{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.equipo{
  display:flex;
  align-items:center;
  font-size:24px;
  font-weight:700;
  padding:8px 15px;
  border-radius:15px;
  background:#f5f5f5;
}

.equipo-icon{
  font-size:28px;
  margin-right:15px;
  width:40px;
  text-align:center;
}

.etxekoa{ color:#0d47a1; }
.kanpokoa{ color:#b71c1c; }

/* ===== INDICADOR DE CONTINUACIÓN ===== */
.continuation-indicator {
  display: flex !important;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin: 40px 0 30px;
  color: white;
  font-size: 28px;
  font-weight: bold;
  background: rgba(0,0,0,0.6);
  padding: 25px;
  border-radius: 60px;
  backdrop-filter: blur(5px);
  border: 4px solid gold;
  text-transform: uppercase;
  letter-spacing: 3px;
  width: 80%;
  margin-left: auto;
  margin-right: auto;
}

.continuation-indicator span {
  animation: bounce 2s infinite;
  font-size: 48px;
  display: inline-block;
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-20px); }
  60% { transform: translateY(-10px); }
}

/* ===== INDICADOR PÁGINA ===== */
.page-indicator{
  position:absolute;
  bottom:25px;
  right:35px;
  background:rgba(0,0,0,.7);
  color:white;
  padding:12px 25px;
  border-radius:40px;
  font-size:22px;
  font-weight:bold;
  border:3px solid gold;
  z-index:100;
  backdrop-filter:blur(5px);
}

/* ===== PELOTAZOS ===== */
.pelotazos{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:20;
  mix-blend-mode:multiply;
}

.pelota-dot{
  position:absolute;
  border-radius:50%;
  background:#000;
  opacity:.2;
}

/* ===== FOOTER ===== */
.footer{
  background:linear-gradient(#2f2f2f, #1a1a1a);
  padding:25px;
  border-top:3px solid gold;
  flex-shrink: 0;
  border-radius: 0 0 30px 30px;
}

.logos-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:15px;
}

.logo-item{
  background:white;
  padding:8px;
  border-radius:12px;
  box-shadow:0 4px 8px rgba(0,0,0,.3);
}

.logo-item img{
  width:100%;
  height:45px;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="exportar">
  <div>
    <button onclick="exportarTodasLasStories()">📱 EXPORTAR STORIES (DIVIDIDAS)</button>
  </div>
  <div id="pageCounter"></div>
</div>

<div id="contenedorPaginas"></div>

<script>
let CATEGORIAS = {};

/* ===== CARGAR CATEGORÍAS ===== */
function cargarCategorias() {
  return fetch("data/categoriacartel.json")
    .then(r => r.json())
    .catch(() => ({}));
}

/* ===== GENERAR CLASES CSS PARA CATEGORÍAS ===== */
function generarClasesCategorias() {
  const style = document.createElement("style");
  let css = "";
  
  for (const cat in CATEGORIAS) {
    css += `
      .cat-${cat} {
        background: ${CATEGORIAS[cat]} !important;
      }
    `;
  }
  
  style.innerHTML = css;
  document.head.appendChild(style);
}

/* ===== OBTENER CLASE DE CATEGORÍA ===== */
function obtenerClaseCategoria(texto) {
  if (!texto) return "";
  
  const textoLower = texto.toLowerCase();
  
  for (const cat in CATEGORIAS) {
    if (textoLower.includes(cat.toLowerCase())) {
      return "cat-" + cat;
    }
  }
  return "";
}

/* ===== FORMATO DE FECHA ===== */
function monday(d) {
  const x = new Date(d);
  const day = x.getDay() || 7;
  if (day !== 1) x.setDate(x.getDate() - day + 1);
  x.setHours(0, 0, 0, 0);
  return x;
}

function dayEU(d) {
  const days = ["IGANDEA", "ASTELEHENA", "ASTEARTEA", "ASTEAZKENA", "OSTEGUNA", "OSTIRALA", "LARUNBATA"];
  const months = ["URTARRILA", "OTSAILA", "MARTXOA", "APIRILA", "MAIATZA", "EKAINA", "UZTAILA", "ABUZTUA", "IRAILA", "URRIA", "AZAROA", "ABENDUA"];
  return {
    dia: days[d.getDay()],
    fecha: `${d.getDate()} ${months[d.getMonth()]}`
  };
}

/* ===== GENERAR PELOTAZOS ===== */
function generarPelotazos(contenedor, altura) {
  for (let i = 0; i < 3000; i++) {
    const d = document.createElement("div");
    const s = Math.random() * 4 + 2;
    
    d.className = "pelota-dot";
    d.style.width = d.style.height = s + "px";
    d.style.left = Math.random() * 1080 + "px";
    d.style.top = Math.random() * altura + "px";
    
    contenedor.appendChild(d);
  }
}

/* ===== CREAR HEADER ===== */
function crearHeader() {
  return `
    <div class="header">
      <img src="images/logo-larraun.png" class="logo-izq" onerror="this.style.display='none'">
      <img src="images/logo-fnp.png" class="logo-der" onerror="this.style.display='none'">
      
      <svg class="titulo-curvo" viewBox="0 0 1080 160" preserveAspectRatio="none">
        <path id="arco" d="M80,150 Q540,-50 1000,150" fill="transparent"/>
        <text text-anchor="middle">
          <textPath href="#arco" startOffset="50%" fill="white">ETXEKO PARTIDUAK</textPath>
        </text>
      </svg>
    </div>
    <div class="pelotazos"></div>
  `;
}

/* ===== CREAR FOOTER ===== */
function crearFooter(numPagina, totalPaginas) {
  return `
    <div class="footer">
      <div class="logos-grid"></div>
    </div>
    <div class="page-indicator">${numPagina}/${totalPaginas}</div>
  `;
}

/* ===== RELLENAR LOGOS ===== */
function rellenarLogos(pagina) {
  const LOGOS = [
    "aliprox.jpg","arbeondo.jpg","asadorepeleta.jpg","barainhoa.jpg","kotxera.jpg",
    "barilargi.jpg","barlekuonberri.jpg","begoñajanaridenda.jpg","carniceriaartxueta.jpg",
    "carpinteriahnosazpiroz.jpg","construccionesgañarbe.jpg","construccionesgarciarenasaralegi.jpg",
    "construccionesurangasaigos.jpg","hotelayestaran.jpg","iseelectricidad.jpg",
    "kattagorrielkartea.jpg","lacturale.jpg","lagunasesoria.jpg","maderasnasorena.jpg",
    "maskarada.jpg","suacontrol.jpg","urzubi.jpg","ventamugiro.jpg","dietistaanagurrea.jpg",
    "ekin.jpg","farmaciaitziarmendia.png","fontaneriabalenciaga.jpg","fontaneriairibarren.jpg",
    "izarberri.png","lakita.jpg","sidreriatokialai.jpg","tallereslarraun.jpg",
    "talleresotxotorena.jpg","veterinarialekunberri.jpg"
  ];

  const grid = pagina.querySelector(".logos-grid");
  if (grid) {
    grid.innerHTML = LOGOS
      .map(f => `<div class="logo-item"><img src="images/patrocinio/${f}" onerror="this.style.display='none'"></div>`)
      .join("");
  }
}

/* ===== DIVIDIR POR NÚMERO DE PARTIDOS (SIMPLE Y EFECTIVO) ===== */
function dividirPartidosPorDia(grupos, maxPartidosPorPagina = 4) {
  const paginas = [];
  let paginaActual = [];
  let partidosEnPaginaActual = 0;
  
  grupos.forEach(grupo => {
    const tamañoGrupo = grupo.length;
    
    // Si el grupo solo ya supera el máximo, lo dividimos (no debería pasar)
    if (tamañoGrupo > maxPartidosPorPagina) {
      console.warn('Grupo demasiado grande:', grupo);
      return;
    }
    
    // Si al añadir este grupo superamos el máximo, guardamos la página actual y empezamos nueva
    if (partidosEnPaginaActual + tamañoGrupo > maxPartidosPorPagina && paginaActual.length > 0) {
      paginas.push(paginaActual);
      paginaActual = [grupo];
      partidosEnPaginaActual = tamañoGrupo;
    } else {
      paginaActual.push(grupo);
      partidosEnPaginaActual += tamañoGrupo;
    }
  });
  
  // Añadir la última página
  if (paginaActual.length > 0) {
    paginas.push(paginaActual);
  }
  
  return paginas;
}

/* ===== CREAR PÁGINA CON GRUPOS ===== */
function crearPaginaConGrupos(diaInfo, grupos, numPagina, totalPaginas, esPrimeraPagina = true, esUltimaPagina = true) {
  const p = document.createElement("div");
  p.className = "pagina";
  p.id = `pagina-${numPagina}`;
  
  // Calcular total de partidos en esta página
  let partidosEnPagina = 0;
  grupos.forEach(g => partidosEnPagina += g.length);
  
  let diaHTML = `
    <div class="dia-container">
      <div class="dia-semana">
        <div class="dia">${diaInfo.dia}</div>
        <div class="fecha">${diaInfo.fecha}</div>
  `;
  
  // Si hay múltiples páginas para este día, mostrar información de parte
  if (!esPrimeraPagina || !esUltimaPagina) {
    // Calcular qué número de parte es esta
    // Esto es un poco complejo de saber aquí, lo simplificamos
    diaHTML += `<div style="font-size:20px; color:gold; margin-top:10px; background:rgba(0,0,0,0.5); padding:8px 20px; border-radius:40px; display:inline-block;">⚡ ${partidosEnPagina} partidu · ZATIA ${numPagina}</div>`;
  } else {
    diaHTML += `<div style="font-size:18px; color:gold; margin-top:8px;">${partidosEnPagina} partidu</div>`;
  }
  
  diaHTML += `
      </div>
    </div>
  `;
  
  p.innerHTML = crearHeader() + `
    <div class="contenido">
      ${diaHTML}
      <div id="grupos-${numPagina}"></div>
    </div>
  ` + crearFooter(numPagina, totalPaginas);
  
  document.getElementById("contenedorPaginas").appendChild(p);
  
  // Añadir grupos
  const gruposContainer = p.querySelector(`#grupos-${numPagina}`);
  
  grupos.forEach((partidosGrupo, idx) => {
    const b0 = partidosGrupo[0];
    const esTrinkete = /trinkete/i.test(b0.fronton || "");
    
    const grupo = document.createElement("div");
    grupo.className = "grupo";
    
    grupo.innerHTML = `
      <div class="grupo-header ${esTrinkete ? 'trinkete' : 'jai-alai'}">
        <div class="fronton">
          <span class="fronton-icon">📍</span>
          ${b0.fronton || "Frontoia"}
        </div>
        <div class="datetime">
          <span>🗓 ${b0.fecha || ""}</span>
          <span>⏰ ${b0.hora || "00:00"}</span>
        </div>
      </div>
      <div class="grupo-body" id="grupo-${numPagina}-${idx}"></div>
    `;
    
    const body = grupo.querySelector(`#grupo-${numPagina}-${idx}`);
    
    partidosGrupo.forEach((m, i) => {
      const claseCategoria = obtenerClaseCategoria(m.lehiaketa);
      const esFinala = m.lehiaketa && m.lehiaketa.toUpperCase().includes("FINALA");
      
      const partidoClass = esFinala ? "partido finala-partido" : "partido";
      const torneoClass = esFinala ? "torneo finala-torneo" : `torneo ${claseCategoria}`;
      
      body.innerHTML += `
        <div class="${partidoClass}">
          <div class="partido-header">
            <div class="partido-numero">${i + 1}</div>
            <div class="torneo-container">
              <div class="${torneoClass}">${m.lehiaketa || "Txapelketa"}</div>
            </div>
          </div>
          <div class="equipos">
            <div class="equipo etxekoa">
              <span class="equipo-icon">🏠</span>
              ${m.etxekoa || ""}
            </div>
            <div class="equipo kanpokoa">
              <span class="equipo-icon">✈️</span>
              ${m.kanpokoak || ""}
            </div>
          </div>
        </div>
      `;
    });
    
    gruposContainer.appendChild(grupo);
  });
  
  // AÑADIR INDICADOR DE CONTINUACIÓN SI NO ES LA ÚLTIMA PÁGINA
  if (!esUltimaPagina) {
    console.log('Añadiendo indicador de continuación a página', numPagina);
    const indicator = document.createElement("div");
    indicator.className = "continuation-indicator";
    indicator.innerHTML = `
      <span>👇</span> JARRAITU <span>👇</span>
    `;
    gruposContainer.appendChild(indicator);
  }
  
  // Calcular altura total para los pelotazos
  setTimeout(() => {
    const alturaTotal = p.offsetHeight;
    const pel = p.querySelector(".pelotazos");
    generarPelotazos(pel, alturaTotal);
  }, 100);
  
  // Rellenar logos
  rellenarLogos(p);
  
  return p;
}

/* ===== INICIALIZAR ===== */
Promise.all([
  fetch("data/cartelera-larraun.json").then(r => r.json()),
  fetch("data/partidos-no-oficiales.json").then(r => r.json()),
  cargarCategorias()
]).then(([oficiales, noOficiales, categorias]) => {
  
  CATEGORIAS = categorias;
  generarClasesCategorias();
  
  const partidos = [
    ...oficiales.map(p => ({ ...p, ofiziala: true })),
    ...noOficiales.map(p => ({ ...p, ofiziala: p.ofiziala === "true" }))
  ];
  
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const mon = monday(today);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  sun.setHours(23, 59, 59, 999);
  
  // Filtrar partidos de la semana en frontones locales
  const partidosSemana = partidos.filter(p => {
    if (!/lekunberri|aldatz/i.test(p.fronton || "")) return false;
    const d = new Date(`${p.fecha} ${p.hora || "00:00"}`);
    return d >= mon && d <= sun;
  });
  
  console.log('Partidos de la semana:', partidosSemana.length);
  
  // Ordenar por fecha
  partidosSemana.sort((a, b) => {
    const da = new Date(`${a.fecha} ${a.hora || "00:00"}`);
    const db = new Date(`${b.fecha} ${b.hora || "00:00"}`);
    return da - db;
  });
  
  // Agrupar por día
  const partidosPorDia = {};
  
  partidosSemana.forEach(p => {
    const d = new Date(`${p.fecha} ${p.hora || "00:00"}`);
    const diaKey = d.toDateString();
    
    if (!partidosPorDia[diaKey]) {
      partidosPorDia[diaKey] = [];
    }
    partidosPorDia[diaKey].push(p);
  });
  
  console.log('Días con partidos:', Object.keys(partidosPorDia));
  
  // Crear páginas por día, dividiendo por número de partidos
  const dias = Object.keys(partidosPorDia).sort();
  let contadorPaginasGlobal = 1;
  const todasLasPaginas = [];
  
  dias.forEach(diaKey => {
    const fecha = new Date(diaKey);
    const diaInfo = dayEU(fecha);
    
    // Agrupar partidos del día por frontón/fecha/hora
    const gruposMap = {};
    partidosPorDia[diaKey].forEach(p => {
      const key = `${p.fronton}|${p.fecha}|${p.hora}`;
      if (!gruposMap[key]) gruposMap[key] = [];
      gruposMap[key].push(p);
    });
    
    const grupos = Object.values(gruposMap);
    const totalPartidosDia = partidosPorDia[diaKey].length;
    
    console.log(`${diaInfo.dia}: ${totalPartidosDia} partidos en ${grupos.length} grupos`);
    
    // DIVIDIR POR NÚMERO DE PARTIDOS (máx 4 por página)
    const paginasDia = dividirPartidosPorDia(grupos, 4);
    
    console.log(`  → Dividido en ${paginasDia.length} páginas`);
    
    // Guardar información de cada página
    paginasDia.forEach((gruposPagina, index) => {
      todasLasPaginas.push({
        diaInfo,
        grupos: gruposPagina,
        esPrimera: index === 0,
        esUltima: index === paginasDia.length - 1,
        numPaginaEnDia: index + 1,
        totalPaginasEnDia: paginasDia.length
      });
    });
  });
  
  // Crear todas las páginas
  todasLasPaginas.forEach((info, index) => {
    crearPaginaConGrupos(
      info.diaInfo,
      info.grupos,
      index + 1,
      todasLasPaginas.length,
      info.esPrimera,
      info.esUltima
    );
  });
  
  document.getElementById('pageCounter').innerHTML = 
    todasLasPaginas.length > 0 
      ? `📱 ${todasLasPaginas.length} story${todasLasPaginas.length > 1 ? 's' : ''} generada${todasLasPaginas.length > 1 ? 's' : ''} (máx 4 partidos por story)` 
      : '📱 No hay partidos esta semana';
});

/* ===== EXPORTAR ===== */
async function exportarTodasLasStories() {
  const paginas = document.querySelectorAll(".pagina");
  const total = paginas.length;
  
  for (let i = 0; i < paginas.length; i++) {
    const pagina = paginas[i];
    
    document.getElementById('pageCounter').innerHTML = `📸 Exportando story ${i + 1}/${total}...`;
    
    const canvas = await html2canvas(pagina, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#1e4f32',
      windowWidth: 1080,
      allowTaint: false,
      logging: false,
      scrollY: -window.scrollY,
      height: pagina.offsetHeight,
      windowHeight: pagina.offsetHeight
    });
    
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/jpeg", 0.95);
    
    // Extraer información para el nombre del archivo
    const diaElem = pagina.querySelector('.dia');
    const dia = diaElem ? diaElem.textContent.trim() : `dia-${i + 1}`;
    
    // Ver si es múltiples partes
    const infoElem = pagina.querySelector('.dia-semana div:last-child');
    let sufijo = '';
    if (infoElem && infoElem.textContent.includes('ZATIA')) {
      const match = infoElem.textContent.match(/ZATIA (\d+)/);
      if (match) {
        sufijo = `-parte-${match[1]}`;
      }
    }
    
    a.download = `etxekoak-${dia}${sufijo}-${(i + 1).toString().padStart(2, '0')}.jpg`;
    a.click();
    
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  
  document.getElementById('pageCounter').innerHTML = `✅ ¡${total} stories exportadas!`;
}
</script>
