<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8"/>
<title>Larraun Kartela - Edición Piedra</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

  

/* ================= BASE ================= */

body{
  margin:0;
  background:#1b4d31;
  font-family:"Trebuchet MS","Arial Black",sans-serif;
}

.exportar{
  text-align:center;
  margin:18px;
}

/* ================= A3 ================= */
/* A3 vertical realista */
.pagina{
  width:900px;
  margin:30px auto;
  display:flex;
  flex-direction:column;
  background:#3f8159;
  position:relative;
  box-shadow:0 0 18px rgba(0,0,0,.4);
}


/* ================= HEADER ================= */

.header{
  height:120px;
  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  /* degradado SIMPLE (html2canvas sí lo pinta bien) */
  background:linear-gradient(#3d6fe6, #2448b5);

  /* solo 1 sombra interior ligera (las múltiples fallan) */
  box-shadow: inset 0 -10px 18px rgba(0,0,0,.35);
}

/* brillo superior falso (elemento real, no shadow) */
.header::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:35px;

  background:linear-gradient(rgba(255,255,255,.35), transparent);
}



/* logos laterales MÁS GRANDES */
.logo-izq,.logo-der{
  position:absolute;
  top:18px;
  height:85px;
}
.logo-izq{ left:14px; }
.logo-der{ right:14px; }

/* título MÁS curvado */
.titulo-curvo{
  width:100%;
  height:100px;
}

.titulo-curvo text{
  font-size:34px;
  font-weight:900;
  fill:white;
  letter-spacing:2px;
}

/* pelota MÁS pequeña y MÁS arriba */
.pelota-real{
  position:absolute;
  top:65px;
  left:50%;
  transform:translateX(-50%);

  width:30px;
  height:30px;
  border-radius:50%;

  background:
    radial-gradient(circle at 35% 30%,
      #ffffff 0%,
      #f5f5f5 40%,
      #e2e2e2 65%,
      #cfcfcf 100%
    );

  border:1.5px solid #d9d9d9;

  box-shadow:
    inset -4px -6px 10px rgba(0,0,0,.35),
    inset 4px 4px 8px rgba(255,255,255,.9),
    0 3px 5px rgba(0,0,0,.4);
}

.pelota-real::before,
.pelota-real::after{
  content:"";
  position:absolute;
  width:80%;
  height:42%;
  left:10%;
  border-top:1.8px solid #c40000;
  border-radius:50%;
  opacity:.85;
}

.pelota-real::before{ top:6px; }
.pelota-real::after{ bottom:6px; }

/* ================= CHAPAS ================= */

.chapa{
  height:12px;
  background:#000;
}

/* ================= PELOTAZOS ================= */

.pelotazos{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:20;
  mix-blend-mode:multiply;
}

.pelota-dot{
  position:absolute;
  border-radius:50%;
  background:#000;
  opacity:.25;
}

/* ================= CONTENIDO ================= */

.contenido{
  flex:1;
  padding:20px;
  overflow:hidden;
}

/* ================= BLOQUES ================= */

.bloque h2{
  text-align:center;
  margin:24px 0 16px 0;
  color:#f2f2f2;
  font-size:26px;
  font-weight:900;
  letter-spacing:3px;

  text-shadow:
    0 2px 0 #fff,
    0 -2px 0 rgba(0,0,0,.5),
    2px 3px 4px rgba(0,0,0,.6);
}

/* ================= PARTIDOS ================= */

.grupo{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:8px;
}

.grupo-header{
  padding:6px 12px;
  font-weight:bold;
  color:#fff;
  background:#2448b5;
  font-size:13px;
}

.grupo-header.rojo{
  background:#b00000;
}

.linea{
  display:flex;
  padding:8px 10px;
  border-top:1px solid #ddd;
  font-size:13px;
  align-items:flex-start;
  font-weight:900;
  border-radius:4px;
  transition: all 0.2s ease;
  gap: 8px;
  min-height: 44px;
}

/* Estilo para línea cuando es FINALA */
.linea.finala-linea {
  background: repeating-linear-gradient(
    45deg,
    rgba(255, 215, 0, 0.25) 0px,
    rgba(255, 215, 0, 0.25) 20px,
    rgba(220, 220, 220, 0.25) 20px,
    rgba(220, 220, 220, 0.25) 40px
  );
  border-left: 4px solid #d4af37;
  border-right: 4px solid #d4af37;
  position: relative;
  padding: 12px 10px;
}

.larraun{
  font-weight:900;
  font-size:15px;
}

/* 4% - ajustado para mejor distribucion */
.zkia{
  flex:0 0 4%;
  min-width: 30px;
  font-size:14px;
  font-weight:900;
  color:#2c3e2f;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
  text-align: center;
  padding-top: 2px;
}

/* === NUEVO ESTILO PARA ETXEKO Y KANPOKOAK === */
/* Distribución más flexible - cada uno 34% para dar espacio */
.etxekoa{
  flex:0 0 34%;
  color:#103c54;
  font-size:16px;          /* Tamaño base ajustable */
  font-weight:800;
  letter-spacing:0.5px;
  line-height: 1.3;        /* Mejor espacio entre líneas */
  
  /* EFECTO GRABADO EN PIEDRA (marcado) */
  text-shadow: 
    0px 2px 2px rgba(0,0,0,0.3),
    0px -1px 0px rgba(255,255,255,0.8),
    1px 0px 0px rgba(0,0,0,0.1);
  
  background: linear-gradient(145deg, #f8f9fa 0%, #e9ecef 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: #1a4d6b;
  text-fill-color: #1a4d6b;
  transition: all 0.2s ease;
  
  /* Permitir que el texto fluya y se ajuste */
  word-wrap: break-word;
  white-space: normal;
  overflow: visible;
}

.kanpokoa{
  flex:0 0 34%;
  color:#b00000;
  font-size:16px;
  font-weight:800;
  letter-spacing:0.5px;
  line-height: 1.3;
  
  /* EFECTO GRABADO EN PIEDRA (marcado) */
  text-shadow: 
    0px 2px 2px rgba(0,0,0,0.3),
    0px -1px 0px rgba(255,255,255,0.8),
    1px 0px 0px rgba(0,0,0,0.1);
  
  background: linear-gradient(145deg, #fff5f5 0%, #ffe0e0 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: #a01020;
  text-fill-color: #a01020;
  
  /* Permitir que el texto fluya y se ajuste */
  word-wrap: break-word;
  white-space: normal;
  overflow: visible;
}

.equipo{
  line-height:1.3;
  display: block;           /* Cambiado de -webkit-box a block */
  word-break: break-word;
  white-space: normal;
  overflow: visible;
}

/* Resalte especial para equipos LARRAUN (más destacado) */
.etxekoa strong, .kanpokoa strong {
  display: inline-block;
  font-weight: 900;
  color: #000000;
  background: linear-gradient(135deg, #ffd89b 0%, #c7e9fb 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: #1a4d6b;
  text-fill-color: #1a4d6b;
  text-shadow: 
    0px 1px 2px rgba(255,215,0,0.6),
    0px -1px 0px rgba(255,255,200,0.9),
    1px 1px 0px rgba(0,0,0,0.25);
  letter-spacing: 0.3px;
  transition: all 0.2s ease;
  position: relative;
}

/* Efecto adicional de "brillo" para Larraun */
.etxekoa strong::after, .kanpokoa strong::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 50% 30%, rgba(255,215,0,0.15), transparent);
  pointer-events: none;
  border-radius: 8px;
  z-index: -1;
}

/* 28% - más compacto para dar espacio a los equipos */
.lehiaketa{
  flex:0 0 24%;
  min-width: 110px;
  text-align:right;
  font-size:12px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:8px;
  min-height: 44px;
  flex-wrap: wrap;
}

.fase{
  font-size:10px;              /* más pequeña */
  font-weight:700;
  padding:2px 6px;
  border-radius:6px;
  background:#e7d3c2;          /* beige elegante */
  color:#5a2d0c;
  white-space:nowrap;
  letter-spacing:.5px;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* Estilo para FINALA - 4 veces más alta */
.fase-finala{
  background:linear-gradient(145deg, #c9a227, #f7e27a);
  color:#000;
  font-weight:900;
  font-size:12px;
  padding: 14px 6px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.8);
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid #b38b1e;
  line-height: 1.2;
  min-width: 60px;
  height: auto;
  white-space: nowrap;
  position: relative;
  overflow: visible;
  z-index: 2;
}

/* Media query para textos muy largos - reducción automática de fuente */
@media (max-width: 900px) {
  .etxekoa, .kanpokoa {
    font-size: 14px;
  }
}

/* Para líneas con textos muy largos, reducción dinámica */
.linea[data-long-text="true"] .etxekoa,
.linea[data-long-text="true"] .kanpokoa {
  font-size: 13px;
}

/* ================= FOOTER ================= */

.footer{
  display:flex;
  flex-direction:column;
}

.chapa{
  height:12px;
  background:#000;
}

.pie-gris{
  padding:14px 12px;

  background:linear-gradient(#4a4a4a, #2f2f2f);

  box-shadow:
    inset 0 10px 14px rgba(255,255,255,.25),
    inset 0 -12px 18px rgba(0,0,0,.6);
}

.logos-grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:8px;
}

.logo-item{
  background:#fff;
  padding:6px;
  border-radius:6px;
}

.logo-item img{
  width:100%;
  height:36px;
  object-fit:contain;
}

</style>
</head>

<body>

<div class="exportar">
<button onclick="exportar()">📸 DESKARGATU KARTELA</button>
</div>

<div id="contenedorPaginas"></div>

<script>

  let FASES = {};
  let CATEGORIAS = {};

/* ================= CREAR HEADER/FOOTER REUTILIZABLE ================= */

function crearHeader(){
 return `
 <div class="header">
   <img src="images/logo-larraun.png" class="logo-izq">
   <img src="images/logo-fnp.png" class="logo-der">

   <svg class="titulo-curvo" viewBox="0 0 900 120">
     <path id="arco" d="M60,110 Q450,-60 840,110" fill="transparent"/>
     <text text-anchor="middle">
       <textPath href="#arco" startOffset="50%">LARRAUN PILOTA ELKARTEA</textPath>
     </text>
   </svg>

   <div class="pelota-real"></div>
 </div>
 <div class="chapa"></div>
 `;
}

function crearFooter(){
 return `
 <div class="chapa"></div>

<div class="footer">
  <div class="pie-gris">
    <div class="logos-grid"></div>
  </div>
</div>

 `;
}

/* ================= CREAR NUEVA PÁGINA ================= */

function nuevaPagina(){

 const p=document.createElement("div");
 p.className="pagina";

 const pel=document.createElement("div");
 pel.className="pelotazos";
 p.appendChild(pel);

 p.insertAdjacentHTML("beforeend",
   crearHeader()+
   `<div class="contenido"></div>`+
   crearFooter()
 );

 document.getElementById("contenedorPaginas").appendChild(p);

 rellenarLogos(p);

 return p.querySelector(".contenido");
}

function generarPelotazos(contenedor){

 const altura = document.querySelector(".pagina").scrollHeight;

 for(let i=0;i<6000;i++){

   const d=document.createElement("div");
   const s=Math.random()*4+2;

   d.className="pelota-dot";
   d.style.width=d.style.height=s+"px";
   d.style.left=Math.random()*900+"px";
   d.style.top=Math.random()*altura+"px";

   contenedor.appendChild(d);
 }
}

function rellenarLogos(pagina){

 const LOGOS=[
 "aliprox.jpg","arbeondo.jpg","asadorepeleta.jpg","barainhoa.jpg","kotxera.jpg",
 "barilargi.jpg","barlekuonberri.jpg","begoñajanaridenda.jpg","carniceriaartxueta.jpg",
 "carpinteriahnosazpiroz.jpg","construccionesgañarbe.jpg","construccionesgarciarenasaralegi.jpg",
 "construccionesurangasaigos.jpg","hotelayestaran.jpg",
 "iseelectricidad.jpg","kattagorrielkartea.jpg","lacturale.jpg","lagunasesoria.jpg",
 "maderasnasorena.jpg","maskarada.jpg","suacontrol.jpg","urzubi.jpg",
 "ventamugiro.jpg","dietistaanagurrea.jpg","ekin.jpg",
 "farmaciaitziarmendia.png","fontaneriabalenciaga.jpg","fontaneriairibarren.jpg",
 "izarberri.png","lakita.jpg","sidreriatokialai.jpg","tallereslarraun.jpg",
 "talleresotxotorena.jpg","veterinarialekunberri.jpg"
 ];

 const grid=pagina.querySelector(".logos-grid");

 grid.innerHTML = LOGOS
   .map(f=>`<div class="logo-item"><img src="images/patrocinio/${f}"></div>`)
   .join("");
}

  
/* ================= CREAR BLOQUES PARTIDOS ================= */
function formatearEquipo(texto){

  if(!texto) return "";

  // Inserta salto justo antes del paréntesis para mejor legibilidad
  let resultado = texto.replace(" (","<br>(");
  
  // También inserta saltos después de guiones para nombres compuestos largos
  resultado = resultado.replace(/([a-záéíóúñ])\s+([A-ZÁÉÍÓÚÑ])/g, '$1<br>$2');
  
  return resultado;
}

function formatearLehiaketa(texto, esFinala = false){

  if(!texto) return "";

  const fasesOrdenadas = Object.values(FASES)
    .sort((a,b)=> b.length - a.length);  // 🔥 más largas primero

  let textoProcesado = texto;
  let faseEncontrada = null;

  for(const fase of fasesOrdenadas){

    const regex = new RegExp(`\\b${fase}\\b`, "g");

    if(regex.test(textoProcesado)){
      faseEncontrada = fase;
      let claseExtra = "";

      if(fase.toUpperCase() === "FINALA"){
        claseExtra = " fase-finala";
      }

      textoProcesado = textoProcesado.replace(
        regex,
        `<span class="fase${claseExtra}">${fase}</span>`
      );
      break; // Solo procesamos la primera fase encontrada
    }
  }

  return textoProcesado;
}

function generarClasesCategorias(){

  const style = document.createElement("style");
  let css = "";

  for(const cat in CATEGORIAS){

    css += `
      .cat-${cat}{
        background:${CATEGORIAS[cat]};
      }
    `;
  }

  style.innerHTML = css;
  document.head.appendChild(style);
}
function obtenerClaseCategoria(texto){

  if(!texto) return "";

  const textoLower = texto.toLowerCase();

  for(const cat in CATEGORIAS){

    if(textoLower.includes(cat.toLowerCase())){
      return "cat-"+cat;
    }
  }

  return "";
}

function crearBloques(titulo,data){

 if(!data || data.length===0) return [];

 const arr=[];

 const h2=document.createElement("div");
 h2.className="bloque";
 h2.innerHTML=`<h2>${titulo}</h2>`;
 arr.push(h2);

 const dataFiltrada = data.filter(p=>{

   const e=(p.etxekoa||"").toLowerCase();
   const k=(p.kanpokoak||"").toLowerCase();

   return !(
     e.includes("descanso") ||
     e.includes("atseden") ||
     k.includes("descanso") ||
     k.includes("atseden")
   );
 });

 dataFiltrada.sort((a,b)=>{

   const fechaA = new Date(a.fecha.replace(/\//g,"-"));
   const fechaB = new Date(b.fecha.replace(/\//g,"-"));

   if(fechaA - fechaB !== 0) return fechaA - fechaB;

   if(a.hora !== b.hora){
     return a.hora.localeCompare(b.hora);
   }

   return (a.fronton || "").localeCompare(b.fronton || "");
 });

 const grupos={};

 dataFiltrada.forEach(p=>{

   const key = p.fecha+"|"+p.hora+"|"+p.fronton;

   if(!grupos[key]) grupos[key]=[];
   grupos[key].push(p);
 });

 Object.values(grupos).forEach(partidos=>{

   const g=document.createElement("div");
   g.className="grupo";

   const fronton = partidos[0].fronton || "";

   const esLocal =
     fronton.toLowerCase().includes("lekunberri") ||
     fronton.toLowerCase().includes("aldatz");

   const colorClase = esLocal ? "" : " rojo";

   g.innerHTML=`
     <div class="grupo-header${colorClase}">
       ${partidos[0].fecha} | ${partidos[0].hora} | ${fronton}
     </div>
     ${partidos.map(p => {
       
       // Determinar si es FINALA
       const esFinala = p.lehiaketa && p.lehiaketa.toUpperCase().includes("FINALA");
       
       let etx = formatearEquipo(p.etxekoa);
       let kan = formatearEquipo(p.kanpokoak);

       // Contar caracteres para detectar textos muy largos
       const textoEtxeko = p.etxekoa || "";
       const textoKanpokoa = p.kanpokoak || "";
       const esTextoMuyLargo = textoEtxeko.length > 40 || textoKanpokoa.length > 40;
       
       // Aplicamos clase especial si contiene "Larraun"
       if(etx.toLowerCase().includes("larraun")){
         etx = etx.replace(/Larraun/gi, match => `<strong>${match}</strong>`);
       }

       if(kan.toLowerCase().includes("larraun")){
         kan = kan.replace(/Larraun/gi, match => `<strong>${match}</strong>`);
       }

       // Clase adicional para la línea si es FINALA
       const lineaClass = esFinala ? "linea finala-linea" : "linea";
       
       // Añadir atributo data-long-text si el texto es muy largo
       const longTextAttr = esTextoMuyLargo ? ' data-long-text="true"' : '';
       
       return `
         <div class="${lineaClass} ${obtenerClaseCategoria(p.lehiaketa)}"${longTextAttr}>
           <div class="zkia">${p.zkia}</div>
           <div class="etxekoa equipo">${etx}</div>
           <div class="kanpokoa equipo">${kan}</div>
           <div class="lehiaketa">${formatearLehiaketa(p.lehiaketa, esFinala)}</div>
         </div>
       `;
     }).join("")}
   `;

   arr.push(g);
 });

 return arr;
}

/* ================= FETCH + CONSTRUIR ================= */

Promise.all([
 fetch("data/cartelera-larraun.json").then(r=>r.json()),
 fetch("data/partidos-no-oficiales.json").then(r=>r.json()),
 fetch("data/fases.json").then(r=>r.json()),
 fetch("data/categoriacartel.json").then(r=>r.json())
]).then(([oficiales,noOficiales,fases,categorias])=>{

 FASES = fases;
 CATEGORIAS = categorias;

 generarClasesCategorias();   // 🔥 ESTO FALTABA

 const bloques=[
   ...crearBloques("FNP PARTIDUAK",oficiales),
   ...crearBloques("BESTE TXAPELKETAK OFIZIALAK",noOficiales.filter(p=>p.ofiziala==="true")),
   ...crearBloques("TXAPELKETAK EZ OFIZIALAK",noOficiales.filter(p=>p.ofiziala!=="true"))
 ];

 const contenido = nuevaPagina();

 bloques.forEach(b=>contenido.appendChild(b));

 const pel = document.querySelector(".pelotazos");
 generarPelotazos(pel);

});
/* ================= EXPORTAR ================= */

async function exportar(){

 const pagina=document.querySelector(".pagina");

 const canvas=await html2canvas(pagina,{
   scale:2,
   useCORS:true
 });

 const a=document.createElement("a");
 a.href=canvas.toDataURL("image/jpeg",0.95);
 a.download="kartela-completo.jpg";
 a.click();
}

</script>

</body>
</html>
