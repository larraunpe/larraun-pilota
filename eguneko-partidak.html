<body>
<div class="ordutegi-kartela">
  <div class="header-ordutegiak">
    <img src="images/logo-larraun.png" alt="Larraun Pilota">
    <h1>ORDUTEGIAK</h1>
    <img src="images/logo-fnp.png" alt="FNP">
  </div>

  <!-- SELECTOR DE FUENTE DE DATOS -->
  <div id="iturria-selector-container" class="iturria-selector"></div>

  <!-- TALDE NAGUSIEN SELECTORRA (BERRIA) -->
  <div id="talde-selector-container" class="talde-selector"></div>

  <div id="taldeak-container"></div>

  <div class="footer-ordutegiak">
    <div>📍 Larraun Pilota Elkartea</div>
    <div class="social">@larraunpilota</div>
  </div>
</div>

<script>
  (async function() {
    // ---------- 1. Kategoriak kargatu (categoriaedad.json erabiliz) ----------
    let kategoriakRaw = [];
    let kategoriakMap = new Map(); // izena (uppercase) -> { kolorea, edadMin, edadMax, izenaOriginal }
    let edadMinToKategoria = new Map(); // edadMin -> lehen kategoria izena

    try {
      const katResp = await fetch('/data/categoriaedad.json');
      if (katResp.ok) {
        kategoriakRaw = await katResp.json();
        
        // Lehen pasada: edadMin bakoitzari lehen kategoria esleitu
        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          const edadMax = item.EDADMAX ? parseInt(item.EDADMAX, 10) : 999;
          
          // edadMin hau ez badago map-ean, gorde lehen kategoria
          if (!edadMinToKategoria.has(edadMin)) {
            edadMinToKategoria.set(edadMin, izena);
          }
        });

        // Bigarren pasada: kategoria guztien informazioa gorde
        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const kolorea = item[izena];
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          const edadMax = item.EDADMAX ? parseInt(item.EDADMAX, 10) : 999;
          const kategoriaNagusia = edadMinToKategoria.get(edadMin) || izena;
          
          kategoriakMap.set(izena.toUpperCase().trim(), {
            kolorea: kolorea,
            edadMin: edadMin,
            edadMax: edadMax,
            izena: izena,
            kategoriaNagusia: kategoriaNagusia
          });
        });

        // Kategoria nagusiak ordenatu
        const kategoriaNagusiakSet = new Set();
        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          const kategoriaNagusia = edadMinToKategoria.get(edadMin);
          if (kategoriaNagusia) {
            kategoriaNagusiakSet.add(kategoriaNagusia);
          }
        });

        // Array bihurtu eta ordenatu
        const kategoriaNagusiakArray = Array.from(kategoriaNagusiakSet).map(izena => {
          const item = kategoriakRaw.find(i => {
            const iIzena = Object.keys(i).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
            return iIzena === izena;
          });
          return {
            izena: izena,
            edadMin: item ? parseInt(item.EDADMIN, 10) : 999,
            edadMax: item ? parseInt(item.EDADMAX, 10) : 999
          };
        });

        kategoriakRaw = kategoriaNagusiakArray.sort((a, b) => {
          if (a.edadMin !== b.edadMin) return a.edadMin - b.edadMin;
          return a.izena.localeCompare(b.izena);
        }).map(item => ({ 
          [item.izena]: kategoriakMap.get(item.izena.toUpperCase().trim())?.kolorea || '#cccccc', 
          EDADMIN: item.edadMin,
          EDADMAX: item.edadMax 
        }));

      } else {
        console.warn('ez da categoriaedad.json kargatu');
      }
    } catch (e) {
      console.warn('kategoriak kargatzean errorea:', e);
    }

    // ---------- 2. Iturriaren selectorea sortu ----------
    const iturriaSelectorContainer = document.getElementById('iturria-selector-container');
    
    const iturriak = [
      { id: 'fnp', izena: 'FNP' },
      { id: 'beste-ofizialak', izena: 'BESTE OFIZIALAK' },
      { id: 'ez-ofizialak', izena: 'EZ OFIZIALAK' }
    ];
    
    const iturriaBotoiak = [];
    let iturriaAktibo = 'fnp';
    
    iturriak.forEach(iturri => {
      const botoia = document.createElement('button');
      botoia.className = `iturria-botoia ${iturri.id === iturriaAktibo ? 'aktibo' : ''}`;
      botoia.textContent = iturri.izena;
      botoia.setAttribute('data-iturria', iturri.id);
      iturriaSelectorContainer.appendChild(botoia);
      iturriaBotoiak.push(botoia);
    });

    // ---------- 3. Talde nagusien selectorea sortu (BERRIA) ----------
    const taldeSelectorContainer = document.getElementById('talde-selector-container');
    
    const taldeNagusiak = [
      { id: 'neskak', izena: 'NESKAK' },
      { id: 'txikiak', izena: 'TXIKIAK' },
      { id: 'nagusiak', izena: 'NAGUSIAK' }
    ];
    
    const taldeBotoiak = [];
    let taldeAktibo = 'neskak'; // Hasieran NESKAK
    
    taldeNagusiak.forEach(talde => {
      const botoia = document.createElement('button');
      botoia.className = `talde-botoia ${talde.id === taldeAktibo ? 'aktibo' : ''}`;
      botoia.textContent = talde.izena;
      botoia.setAttribute('data-talde', talde.id);
      taldeSelectorContainer.appendChild(botoia);
      taldeBotoiak.push(botoia);
    });

    // ---------- 4. Partidak kargatu ----------
    let partidakOficiales = [];
    let partidakNoOficiales = [];

    try {
      const [oficialesResp, noOficialesResp] = await Promise.all([
        fetch('/data/cartelera-larraun.json'),
        fetch('/data/partidos-no-oficiales.json')
      ]);
      
      if (!oficialesResp.ok) throw new Error('ezin partida ofizialak kargatu');
      if (!noOficialesResp.ok) throw new Error('ezin partida ez ofizialak kargatu');
      
      partidakOficiales = await oficialesResp.json();
      partidakNoOficiales = await noOficialesResp.json();
    } catch (e) {
      document.getElementById('taldeak-container').innerHTML = '<div class="ez-partidurik">❌ Ezin partidak kargatu.</div>';
      return;
    }

    // Astea 2026/03/02 – 2026/03/08 (egokitu aste honetara)
    const astekoLehen = new Date(2026, 2, 2);
    const astekoAzken = new Date(2026, 2, 8, 23, 59, 59);

    function dateStrToDate(fechaStr) {
      if (!fechaStr) return null;
      const parts = fechaStr.split('/');
      if (parts.length !== 3) return null;
      return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    }

    // ---------- 5. Partidak iragazi iturriaren arabera ----------
    function getPartidakByIturria(iturria) {
      let partidakIturria;
      
      if (iturria === 'fnp') {
        partidakIturria = partidakOficiales;
      } else {
        const ofizialaBalioa = iturria === 'beste-ofizialak' ? 'true' : 'false';
        partidakIturria = partidakNoOficiales.filter(p => 
          String(p.ofiziala).toLowerCase() === ofizialaBalioa
        );
      }

      // Aste honetako partidak
      const partidakAsteHonetan = partidakIturria.filter(p => {
        if (!p.fecha) return false;
        const d = dateStrToDate(p.fecha);
        return d && d >= astekoLehen && d <= astekoAzken;
      });

      // "Descanso" -> "Atsedena"
      partidakAsteHonetan.forEach(p => {
        if (p.etxekoa && p.etxekoa.includes('Descanso')) {
          p.etxekoa = p.etxekoa.replace('Descanso', 'Atsedena');
        }
        if (p.kanpokoak && p.kanpokoak.includes('Descanso')) {
          p.kanpokoak = p.kanpokoak.replace('Descanso', 'Atsedena');
        }
      });

      return partidakAsteHonetan;
    }

    // ---------- 6. Kategoria nagusia esleitu ----------
    function kategoriaNagusia(testua) {
      if (!testua) return 'Beste';
      const up = testua.toUpperCase();
      
      for (let [k, info] of kategoriakMap.entries()) {
        if (up.includes(k)) {
          return info.kategoriaNagusia;
        }
      }
      
      if (up.includes('HAUR')) return 'HAURRAK';
      if (up.includes('KADETE')) return 'KADETE';
      if (up.includes('KIMU')) return 'KIMU';
      if (up.includes('GAZTE')) return 'GAZTE';
      if (up.includes('ALEBIN')) return 'ALEBINAK';
      if (up.includes('SEIN')) return 'SEIN';
      if (up.includes('ESKUZ KOPA')) return 'ESKUZ KOPA';
      return 'Beste';
    }

    // ---------- 7. Talde nagusia esleitu (BERRIA) ----------
    function taldeNagusia(partida, kategoriaIzena) {
      const testua = (partida.lehiaketa || partida.modalidad || '').toUpperCase();
      
      // 1. NESKAK taldea: EMAKUME edo NESKA erroa dutenak
      if (testua.includes('NESKA') || testua.includes('NESKAK') || testua.includes('NESKAKO') || 
          testua.includes('EMAKUME') || testua.includes('EMAKUMEZKO') || testua.includes('EMAKUMENO')) {
        return 'neskak';
      }
      
      // Bilatu kategoriaren EDADMAX
      let edadMax = 99;
      for (let [k, info] of kategoriakMap.entries()) {
        if (info.kategoriaNagusia === kategoriaIzena) {
          edadMax = info.edadMax;
          break;
        }
      }
      
      // 2. TXIKIAK taldea: EDADMAX <= 12
      if (edadMax <= 12) {
        return 'txikiak';
      }
      
      // 3. NAGUSIAK taldea: gainerakoak
      return 'nagusiak';
    }

    // ---------- 8. Iturriaren etiketa lortu ----------
    function getIturriaEtiketa(iturria) {
      switch(iturria) {
        case 'fnp': return { text: 'FNP', class: 'fnp' };
        case 'beste-ofizialak': return { text: 'BESTE OFIZIALA', class: 'beste-ofizialak' };
        case 'ez-ofizialak': return { text: 'EZ OFIZIALA', class: 'ez-ofizialak' };
        default: return { text: iturria, class: '' };
      }
    }

    // ---------- 9. HTML birsortzeko funtzioa ----------
    function renderPartidak(iturria, taldeAktibo) {
      const partidakAsteHonetan = getPartidakByIturria(iturria);

      if (partidakAsteHonetan.length === 0) {
        document.getElementById('taldeak-container').innerHTML = '<div class="ez-partidurik">🗓 Aste honetan ez dago partidarik.</div>';
        return;
      }

      // Partidak talde nagusitan antolatu
      const partidakTaldeka = {
        neskak: [],
        txikiak: [],
        nagusiak: []
      };
      
      const partidaKategoriak = new Map(); // partida -> kategoria
      
      partidakAsteHonetan.forEach(p => {
        const katIzen = kategoriaNagusia(p.lehiaketa || p.modalidad || '');
        partidaKategoriak.set(p, katIzen);
        const taldea = taldeNagusia(p, katIzen);
        partidakTaldeka[taldea].push(p);
      });

      // Egunak euskaraz
      const egunakEus = ['igandea', 'astelehena', 'asteartea', 'asteazkena', 'osteguna', 'ostirala', 'larunbata'];

      // Ordua parseatzeko funtzioa
      function parseOrdua(horaStr) {
        if (!horaStr || horaStr.trim() === '-' || horaStr.startsWith('-')) return '00:00';
        const match = horaStr.match(/(\d{1,2}:\d{2})/);
        return match ? match[1] : '00:00';
      }

      // Maila zenbakia ateratzeko
      function extractLevelNumber(txt) {
        const match = txt?.match(/(KIMU|SEIN|GAZTE|KADETE|HAUR|ALEBIN)\s*(\d+)/i);
        return match ? parseInt(match[2], 10) : 999;
      }

      // Partidak ordenatu
      function ordenatuPartidak(partidak) {
        return partidak.sort((a, b) => {
          const dA = dateStrToDate(a.fecha);
          const dB = dateStrToDate(b.fecha);
          if (!dA && !dB) return 0;
          if (!dA) return 1;
          if (!dB) return -1;
          if (dA.getTime() !== dB.getTime()) return dA - dB;

          const horaA = parseOrdua(a.hora || '00:00');
          const horaB = parseOrdua(b.hora || '00:00');
          if (horaA !== horaB) return horaA.localeCompare(horaB);

          const frontA = a.fronton || '';
          const frontB = b.fronton || '';
          if (frontA !== frontB) return frontA.localeCompare(frontB);

          const levelA = extractLevelNumber(a.lehiaketa);
          const levelB = extractLevelNumber(b.lehiaketa);
          return levelB - levelA;
        });
      }

      // Talde bakoitzaren HTML eraiki
      const taldeakContainer = document.getElementById('taldeak-container');
      taldeakContainer.innerHTML = '';

      const iturriaInfo = getIturriaEtiketa(iturria);

      // Talde izenak eta koloreak
      const taldeKoloreak = {
        neskak: '#d63384',
        txikiak: '#0d6efd',
        nagusiak: '#198754'
      };

      ['neskak', 'txikiak', 'nagusiak'].forEach(taldeId => {
        const partidak = partidakTaldeka[taldeId];
        if (partidak.length === 0) return;

        const taldeDiv = document.createElement('div');
        taldeDiv.className = `talde-nagusia-kontenedorea ${taldeId === taldeAktibo ? '' : 'talde-ezkutuan'}`;
        taldeDiv.setAttribute('data-talde', taldeId);

        // Titulua
        const tituluaDiv = document.createElement('div');
        tituluaDiv.className = 'talde-nagusia-titulua';
        tituluaDiv.style.backgroundColor = taldeKoloreak[taldeId];
        
        let taldeIzena = '';
        if (taldeId === 'neskak') taldeIzena = 'NESKAK';
        else if (taldeId === 'txikiak') taldeIzena = 'TXIKIAK (12 urtez azpikoak)';
        else taldeIzena = 'NAGUSIAK (13 urtez gaindikoak)';
        
        tituluaDiv.innerHTML = `<span>⚾</span> ${taldeIzena} <span style="font-size:0.8rem; margin-left:auto;">${partidak.length} partida</span>`;
        taldeDiv.appendChild(tituluaDiv);

        // Egunak antolatu
        const partidakOrdenatuak = ordenatuPartidak(partidak);
        
        let currentDateStr = null;
        let currentEgunDiv = null;
        let currentFrontoi = null;
        let frontoiDiv = null;

        partidakOrdenatuak.forEach(p => {
          const katIzen = partidaKategoriak.get(p);
          
          // Kategoriaren kolorea lortu
          let kolorea = '#cccccc';
          for (let [k, info] of kategoriakMap.entries()) {
            if (info.kategoriaNagusia === katIzen) {
              kolorea = info.kolorea;
              break;
            }
          }

          const fechaStr = p.fecha;
          if (fechaStr !== currentDateStr) {
            currentDateStr = fechaStr;
            const dObj = dateStrToDate(fechaStr);
            const egunIndizea = dObj ? dObj.getDay() : 0;
            const egunIzenaEus = egunakEus[egunIndizea] || 'eguna';
            const egunFormat = dObj ? `${egunIzenaEus}, ${fechaStr.replace(/\//g,'/')}` : fechaStr;

            currentEgunDiv = document.createElement('div');
            currentEgunDiv.className = 'egun-saila';
            currentEgunDiv.style.borderLeftColor = kolorea;
            currentEgunDiv.innerHTML = `<div class="egun-izena">📅 ${egunFormat}</div>`;
            taldeDiv.appendChild(currentEgunDiv);
            currentFrontoi = null;
          }

          const frontIzen = p.fronton || 'Frontoia zehaztu gabe';
          if (frontIzen !== currentFrontoi) {
            currentFrontoi = frontIzen;
            frontoiDiv = document.createElement('div');
            frontoiDiv.className = 'frontoi-taldea';

            const frontoiSpan = document.createElement('div');
            frontoiSpan.className = 'frontoi-izena';
            if (/lekunberri|aldatz/i.test(frontIzen)) {
              frontoiSpan.classList.add('berezia');
            }
            frontoiSpan.textContent = '🎯 ' + frontIzen;
            frontoiDiv.appendChild(frontoiSpan);
            currentEgunDiv.appendChild(frontoiDiv);
          }

          const partidaDiv = document.createElement('div');
          partidaDiv.className = 'partido-txikia';
          partidaDiv.style.borderLeftColor = kolorea;

          const orduGarbi = parseOrdua(p.hora || '');
          const prov = (p.hora && p.hora.includes('provisional')) ? 'provisorio' : '';

          const etxekoaTestua = p.etxekoa || '?';
          const kanpokoaTestua = p.kanpokoak || '?';

          const etxekoaLarraun = etxekoaTestua.toUpperCase().includes('LARRAUN');
          const kanpokoaLarraun = kanpokoaTestua.toUpperCase().includes('LARRAUN');

          const etxekoaClass = `etxekoa ${etxekoaLarraun ? 'larraun-handiagoa' : ''}`;
          const kanpokoClass = `kanpokoak ${kanpokoaLarraun ? 'larraun-handiagoa' : ''}`;

          // Fasea detektatu
          const faseTestua = p.lehiaketa || p.modalidad || '';
          const finala = faseTestua.toUpperCase().includes('FINALA');

          partidaDiv.innerHTML = `
            <div class="ordu-blokea ${prov}">${orduGarbi} ${prov ? '<small>provis.</small>' : ''}</div>
            <div class="partido-info">
              <div class="parejak">
                <span class="${etxekoaClass}">🏠 ${etxekoaTestua}</span>
                <span class="${kanpokoClass}">✈️ ${kanpokoaTestua}</span>
              </div>
              <div class="lehiaketa-labur">
                <span class="iturria-etiketa ${iturriaInfo.class}">${iturriaInfo.text}</span>
                <span>🏆 ${faseTestua}</span>
                ${finala ? '<span class="fase-etiketa finala">⚡ FINALA</span>' : ''}
                ${p.zkia && p.zkia !== '-' ? `<span class="zkia-etiketa">#${p.zkia}</span>` : ''}
              </div>
            </div>
          `;

          frontoiDiv.appendChild(partidaDiv);
        });

        taldeakContainer.appendChild(taldeDiv);
      });
    }

    // ---------- 10. Hasierako render ----------
    renderPartidak('fnp', 'neskak');

    // ---------- 11. Iturria aldatzean ----------
    iturriaBotoiak.forEach(botoia => {
      botoia.addEventListener('click', (e) => {
        const iturria = e.target.getAttribute('data-iturria');
        
        iturriaBotoiak.forEach(b => b.classList.remove('aktibo'));
        e.target.classList.add('aktibo');
        
        renderPartidak(iturria, taldeAktibo);
      });
    });

    // ---------- 12. Taldea aldatzean ----------
    taldeBotoiak.forEach(botoia => {
      botoia.addEventListener('click', (e) => {
        const taldea = e.target.getAttribute('data-talde');
        taldeAktibo = taldea;
        
        taldeBotoiak.forEach(b => b.classList.remove('aktibo'));
        e.target.classList.add('aktibo');
        
        // Erakutsi talde egokia, ezkutatu besteak
        document.querySelectorAll('.talde-nagusia-kontenedorea').forEach(el => {
          if (el.getAttribute('data-talde') === taldea) {
            el.classList.remove('talde-ezkutuan');
          } else {
            el.classList.add('talde-ezkutuan');
          }
        });
      });
    });

  })();
</script>
</body>
</html>
