<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ordutegiak – Larraun Pilota</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#ececec;
}

.wrapper{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:30px;
  box-shadow:0 10px 35px rgba(0,0,0,.25);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:4px solid #b30000;
  padding-bottom:20px;
  margin-bottom:30px;
}

.header img{ height:75px; }

.header h1{
  flex:1;
  text-align:center;
  margin:0;
  font-size:2.5em;
  letter-spacing:3px;
}

/* ===== CATEGORIA ===== */

.kategoria{
  margin-bottom:35px;
  border-radius:14px;
  overflow:hidden;
}

.kategoria-title{
  padding:12px 18px;
  font-weight:bold;
  font-size:1.3em;
  color:white;
}

.partidos{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ===== PARTIDO ===== */

.partido{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  border-radius:10px;
  padding:12px 15px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
}

.info{
  display:flex;
  flex-direction:column;
}

.fecha{ font-weight:bold; }

.fronton{
  font-style:italic;
  color:#444;
}

.hora{
  font-size:1.4em;
  font-weight:bold;
  color:#b30000;
}

.badge{
  background:#ffc107;
  font-size:.7em;
  padding:3px 6px;
  border-radius:6px;
  margin-left:6px;
  font-weight:bold;
}

@media(max-width:700px){
.partido{
 flex-direction:column;
 align-items:flex-start;
 gap:6px;
}
.hora{ align-self:flex-end; }
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="images/logo-larraun.png">
<h1>ORDUTEGIAK</h1>
<img src="images/logo-fnp.png">
</div>

<div id="ordutegiak"></div>

</div>

<script>

/* ========= LIMPIAR HORA ========= */
function limpiarHora(hora=""){
 const m = hora.match(/\d{1,2}:\d{2}/);
 return m ? m[0] : "00:00";
}

/* ========= FECHA OBJ ========= */
function fechaObj(p){
 return new Date(`${p.fecha} ${limpiarHora(p.hora)}`);
}

/* ========= NIVEL ========= */
function extraerNivel(txt=""){
 const m = txt.match(/(\d+)/);
 return m ? parseInt(m[1]) : 99;
}

/* ========= SEMANA ACTUAL ========= */
function semanaActual(){
 const now=new Date();
 const day=now.getDay()||7;

 const monday=new Date(now);
 monday.setDate(now.getDate()-day+1);
 monday.setHours(0,0,0,0);

 const sunday=new Date(monday);
 sunday.setDate(monday.getDate()+6);
 sunday.setHours(23,59,59);

 return {monday,sunday};
}

/* ========= CARGAR ========= */

Promise.all([
 fetch("/data/cartelera-larraun.json").then(r=>r.json()),
 fetch("/data/categoriacartel.json").then(r=>r.json())
])
.then(([partidos,categorias])=>{

const {monday,sunday}=semanaActual();

/* solo semana actual */
partidos = partidos.filter(p=>{
 const d=fechaObj(p);
 return d>=monday && d<=sunday;
});

/* preparar grupos */
const ordenCategorias=Object.keys(categorias);
const grupos={};
ordenCategorias.forEach(c=>grupos[c]=[]);

/* agrupar */
partidos.forEach(p=>{
 if(grupos[p.categoria])
   grupos[p.categoria].push(p);
});

const cont=document.getElementById("ordutegiak");

/* pintar */
ordenCategorias.forEach(cat=>{

const lista=grupos[cat];
if(!lista.length) return;

/* ordenar */
lista.sort((a,b)=>{

const fa=fechaObj(a);
const fb=fechaObj(b);

if(fa-fb!==0) return fa-fb;

if((a.fronton||"")!=(b.fronton||""))
 return (a.fronton||"").localeCompare(b.fronton||"");

return extraerNivel(b.categoria)
     - extraerNivel(a.categoria);
});

/* bloque categoria */
const bloque=document.createElement("div");
bloque.className="kategoria";

bloque.innerHTML=`
<div class="kategoria-title"
style="background:${categorias[cat].color}">
${cat}
</div>
<div class="partidos"></div>
`;

const listaDiv=bloque.querySelector(".partidos");

/* partidos */
lista.forEach(p=>{

const provisional =
 p.hora && p.hora.includes("!")
 ? `<span class="badge">PROB.</span>`
 : "";

const div=document.createElement("div");
div.className="partido";

div.innerHTML=`
<div class="info">
<div class="fecha">🗓 ${p.fecha}</div>
<div>${p.etxekoa} vs ${p.kanpokoak}</div>
<div class="fronton">📍 ${p.fronton||""}</div>
</div>

<div class="hora">
${limpiarHora(p.hora)} ${provisional}
</div>
`;

listaDiv.appendChild(div);
});

cont.appendChild(bloque);

});

});

</script>

</body>
</html>
