<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordutegiak</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ececec;
}

.wrapper{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:4px solid #b30000;
margin-bottom:30px;
padding-bottom:15px;
}

.header img{height:70px;}

.header h1{
flex:1;
text-align:center;
letter-spacing:3px;
}

.kategoria{
margin-bottom:30px;
border-radius:12px;
overflow:hidden;
}

.kategoria-title{
color:white;
padding:12px 16px;
font-weight:bold;
font-size:1.3em;
}

.partidos{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.partido{
display:flex;
justify-content:space-between;
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.15);
}

.hora{
font-size:1.4em;
font-weight:bold;
color:#b30000;
}

.badge{
background:#ffc107;
padding:3px 6px;
border-radius:6px;
font-size:.7em;
margin-left:5px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="images/logo-larraun.png">
<h1>ORDUTEGIAK</h1>
<img src="images/logo-fnp.png">
</div>

<div id="ordutegiak"></div>

</div>

<script>

/* ========= LIMPIAR HORA ========= */
function limpiarHora(h=""){
const m=h.match(/\d{1,2}:\d{2}/);
return m?m[0]:"00:00";
}

/* ========= FECHA ========= */
function fechaObj(p){

if(!p.fecha) return new Date();

const match = p.fecha.match(/(\d{2})\/(\d{2})/);

if(!match) return new Date();

const dia = match[1];
const mes = match[2];
const año = new Date().getFullYear();

return new Date(
`${año}-${mes}-${dia}T${limpiarHora(p.hora)}`
);
}
/* ========= SEMANA ========= */
function semanaActual(){
const now=new Date();
const day=now.getDay()||7;

const monday=new Date(now);
monday.setDate(now.getDate()-day+1);
monday.setHours(0,0,0,0);

const sunday=new Date(monday);
sunday.setDate(monday.getDate()+6);
sunday.setHours(23,59,59);

return {monday,sunday};
}

/* ========= DETECTAR CATEGORIA ========= */
function detectarCategoria(catPartido, categorias){

if(!catPartido) return null;

catPartido = catPartido.toUpperCase();

return Object.keys(categorias)
.find(c => catPartido.includes(c.toUpperCase()));
}

/* ========= CARGA ========= */

Promise.all([
fetch("/data/cartelera-larraun.json").then(r=>r.json()),
fetch("/data/categoriacartel.json").then(r=>r.json())
])
.then(([partidos,categorias])=>{

const {monday,sunday}=semanaActual();

/* semana actual */
partidos=partidos.filter(p=>{
const d=fechaObj(p);
return d>=monday && d<=sunday;
});

/* crear grupos */
const grupos={};
Object.keys(categorias)
.forEach(c=>grupos[c]=[]);

/* asignar categoria correcta */
partidos.forEach(p=>{

const catBase =
detectarCategoria(p.categoria,categorias);

if(catBase)
grupos[catBase].push(p);

});

/* pintar */
const cont=document.getElementById("ordutegiak");

Object.keys(categorias).forEach(cat=>{

const lista=grupos[cat];
if(!lista.length) return;

/* ordenar */
lista.sort((a,b)=>{

const fa=fechaObj(a);
const fb=fechaObj(b);

if(fa-fb!==0) return fa-fb;

return (a.fronton||"")
.localeCompare(b.fronton||"");
});

const bloque=document.createElement("div");
bloque.className="kategoria";

bloque.innerHTML=`
<div class="kategoria-title"
style="background:${categorias[cat].color}">
${cat}
</div>
<div class="partidos"></div>
`;

const listaDiv=bloque.querySelector(".partidos");

lista.forEach(p=>{

const provisional =
p.hora?.includes("!")
? `<span class="badge">PROB.</span>`
:"";

const div=document.createElement("div");
div.className="partido";

div.innerHTML=`
<div>
<div><b>${p.etxekoa}</b> vs ${p.kanpokoak}</div>
<div>📍 ${p.fronton||""}</div>
<div>🗓 ${p.fecha}</div>
</div>

<div class="hora">
${limpiarHora(p.hora)} ${provisional}
</div>
`;

listaDiv.appendChild(div);

});

cont.appendChild(bloque);

});

});

</script>

</body>
</html>
