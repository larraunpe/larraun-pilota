<body>
<div class="ordutegi-kartela">
  <div class="header-ordutegiak">
    <img src="images/logo-larraun.png" alt="Larraun Pilota">
    <h1>ORDUTEGIAK</h1>
    <img src="images/logo-fnp.png" alt="FNP">
  </div>

  <div id="iturria-selector-container" class="iturria-selector"></div>
  <div id="kategoria-selector-container" class="kategoria-selector"></div>

  <div id="kategoriak-container" class="kategoriak-ordena">
    <div class="ez-partidurik" id="loading-placeholder">⏳ partidak kargatzen...</div>
  </div>

  <div class="footer-ordutegiak">
    <div>📍 Larraun Pilota Elkartea</div>
    <div class="social">@larraunpilota</div>
  </div>
</div>

<script>
  (async function() {
    // ---------- 1. Kategoriak kargatu ----------
    let kategoriakRaw = [];
    let kategoriakMap = new Map();
    let edadMinToKategoria = new Map();

    try {
      const katResp = await fetch('/data/categoriaedad.json');
      if (katResp.ok) {
        kategoriakRaw = await katResp.json();
        
        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          
          if (!edadMinToKategoria.has(edadMin)) {
            edadMinToKategoria.set(edadMin, izena);
          }
        });

        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const kolorea = item[izena];
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          const kategoriaNagusia = edadMinToKategoria.get(edadMin) || izena;
          
          kategoriakMap.set(izena.toUpperCase().trim(), {
            kolorea: kolorea,
            edadMin: edadMin,
            izena: izena,
            kategoriaNagusia: kategoriaNagusia
          });
        });

        const kategoriaNagusiakSet = new Set();
        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          const kategoriaNagusia = edadMinToKategoria.get(edadMin);
          if (kategoriaNagusia) {
            kategoriaNagusiakSet.add(kategoriaNagusia);
          }
        });

        const kategoriaNagusiakArray = Array.from(kategoriaNagusiakSet).map(izena => {
          const item = kategoriakRaw.find(i => {
            const iIzena = Object.keys(i).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
            return iIzena === izena;
          });
          return {
            izena: izena,
            edadMin: item ? parseInt(item.EDADMIN, 10) : 999
          };
        });

        kategoriakRaw = kategoriaNagusiakArray.sort((a, b) => {
          if (a.edadMin !== b.edadMin) return a.edadMin - b.edadMin;
          return a.izena.localeCompare(b.izena);
        }).map(item => ({ [item.izena]: kategoriakMap.get(item.izena.toUpperCase().trim())?.kolorea || '#cccccc', EDADMIN: item.edadMin }));

      } else {
        console.warn('ez da categoriaedad.json kargatu');
      }
    } catch (e) {
      console.warn('kategoriak kargatzean errorea:', e);
    }

    // ---------- 2. Iturriaren selectorea ----------
    const iturriaSelectorContainer = document.getElementById('iturria-selector-container');
    
    const iturriak = [
      { id: 'fnp', izena: 'FNP' },
      { id: 'beste-ofizialak', izena: 'BESTE OFIZIALAK' },
      { id: 'ez-ofizialak', izena: 'EZ OFIZIALAK' }
    ];
    
    const iturriaBotoiak = [];
    let iturriaAktibo = 'fnp';
    
    iturriak.forEach(iturri => {
      const botoia = document.createElement('button');
      botoia.className = `iturria-botoia ${iturri.id === iturriaAktibo ? 'aktibo' : ''}`;
      botoia.textContent = iturri.izena;
      botoia.setAttribute('data-iturria', iturri.id);
      iturriaSelectorContainer.appendChild(botoia);
      iturriaBotoiak.push(botoia);
    });

    // ---------- 3. Partidak kargatu ----------
    let partidakOficiales = [];
    let partidakNoOficiales = [];

    try {
      const [oficialesResp, noOficialesResp] = await Promise.all([
        fetch('/data/cartelera-larraun.json'),
        fetch('/data/partidos-no-oficiales.json')
      ]);
      
      if (!oficialesResp.ok) throw new Error('ezin partida ofizialak kargatu');
      if (!noOficialesResp.ok) throw new Error('ezin partida ez ofizialak kargatu');
      
      partidakOficiales = await oficialesResp.json();
      partidakNoOficiales = await noOficialesResp.json();
    } catch (e) {
      document.getElementById('kategoriak-container').innerHTML = '<div class="ez-partidurik">❌ Ezin partidak kargatu.</div>';
      return;
    }

    // ---------- 4. ASTE HONETAKO PARTIDAK - CORREGIDO ----------
    // Calculamos la semana actual dinámicamente basada en la fecha de los partidos
    // Primero, encontramos la fecha más temprana y más tardía en los datos
    function dateStrToDate(fechaStr) {
      if (!fechaStr) return null;
      const parts = fechaStr.split('/');
      if (parts.length !== 3) return null;
      return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    }

    // Obtener todas las fechas de los partidos oficiales
    const todasLasFechas = partidakOficiales
      .map(p => p.fecha)
      .filter(f => f)
      .map(f => dateStrToDate(f))
      .filter(d => d !== null);

    if (todasLasFechas.length > 0) {
      // Encontrar la fecha mínima y máxima
      const fechaMin = new Date(Math.min(...todasLasFechas.map(d => d.getTime())));
      const fechaMax = new Date(Math.max(...todasLasFechas.map(d => d.getTime())));
      
      // Calcular el inicio de la semana (lunes) y fin de la semana (domingo)
      const diaSemana = fechaMin.getDay(); // 0 = domingo, 1 = lunes, etc.
      const diffToMonday = diaSemana === 0 ? 6 : diaSemana - 1; // Si es domingo (0), restamos 6 para ir al lunes anterior
      
      const astekoLehen = new Date(fechaMin);
      astekoLehen.setDate(fechaMin.getDate() - diffToMonday);
      astekoLehen.setHours(0, 0, 0, 0);
      
      const astekoAzken = new Date(astekoLehen);
      astekoAzken.setDate(astekoLehen.getDate() + 6);
      astekoAzken.setHours(23, 59, 59, 999);
      
      console.log('Astea:', astekoLehen.toLocaleDateString(), '-', astekoAzken.toLocaleDateString());
      
      // Guardamos en variables globales para usarlas en getPartidakByIturria
      window.astekoLehen = astekoLehen;
      window.astekoAzken = astekoAzken;
    } else {
      // Fallback a fechas fijas si no hay datos
      window.astekoLehen = new Date(2026, 2, 9);  // 9 de marzo de 2026
      window.astekoAzken = new Date(2026, 2, 15, 23, 59, 59); // 15 de marzo de 2026
    }

    // ---------- 5. Partidak iragazi ----------
    function getPartidakByIturria(iturria) {
      let partidakIturria;
      
      if (iturria === 'fnp') {
        partidakIturria = partidakOficiales;
      } else {
        const ofizialaBalioa = iturria === 'beste-ofizialak' ? 'true' : 'false';
        partidakIturria = partidakNoOficiales.filter(p => 
          String(p.ofiziala).toLowerCase() === ofizialaBalioa
        );
      }

      // Aste honetako partidak usando las fechas calculadas
      const partidakAsteHonetan = partidakIturria.filter(p => {
        if (!p.fecha) return false;
        const d = dateStrToDate(p.fecha);
        return d && d >= window.astekoLehen && d <= window.astekoAzken;
      });

      partidakAsteHonetan.forEach(p => {
        if (p.etxekoa && p.etxekoa.includes('Descanso')) {
          p.etxekoa = p.etxekoa.replace('Descanso', 'Atsedena');
        }
        if (p.kanpokoak && p.kanpokoak.includes('Descanso')) {
          p.kanpokoak = p.kanpokoak.replace('Descanso', 'Atsedena');
        }
      });

      return partidakAsteHonetan;
    }

    // ---------- 6. Kategoria esleitu ----------
    function kategoriaNagusia(testua) {
      if (!testua) return 'Beste';
      const up = testua.toUpperCase();
      
      for (let [k, info] of kategoriakMap.entries()) {
        if (up.includes(k)) {
          return info.kategoriaNagusia;
        }
      }
      
      if (up.includes('HAUR')) return 'HAURRAK';
      if (up.includes('KADETE')) return 'KADETE';
      if (up.includes('KIMU')) return 'KIMU';
      if (up.includes('GAZTE')) return 'GAZTE';
      if (up.includes('ALEBIN')) return 'ALEBINAK';
      if (up.includes('SEIN')) return 'SEIN';
      if (up.includes('ESKUZ KOPA')) return 'ESKUZ KOPA';
      return 'Beste';
    }

    // ---------- 7. HTML birsortu ----------
    function renderPartidak(iturria) {
      const partidakAsteHonetan = getPartidakByIturria(iturria);

      if (partidakAsteHonetan.length === 0) {
        document.getElementById('kategoriak-container').innerHTML = '<div class="ez-partidurik">🗓 Aste honetan ez dago partida ofizialik.</div>';
        document.getElementById('kategoria-selector-container').innerHTML = '';
        return;
      }

      const partidakKategoriaka = new Map();
      partidakAsteHonetan.forEach(p => {
        const iz = kategoriaNagusia(p.lehiaketa || p.modalidad || '');
        if (!partidakKategoriaka.has(iz)) partidakKategoriaka.set(iz, []);
        partidakKategoriaka.get(iz).push(p);
      });

      const ordenaPrior = new Map();
      kategoriakRaw.forEach((item, index) => {
        const izena = Object.keys(item)[0];
        if (izena) {
          ordenaPrior.set(izena.toUpperCase().trim(), index);
        }
      });

      const kategoriaIzenak = Array.from(partidakKategoriaka.keys()).sort((a, b) => {
        const aUp = a.toUpperCase().trim();
        const bUp = b.toUpperCase().trim();
        const idxA = ordenaPrior.has(aUp) ? ordenaPrior.get(aUp) : 999;
        const idxB = ordenaPrior.has(bUp) ? ordenaPrior.get(bUp) : 999;
        if (idxA !== idxB) return idxA - idxB;
        return a.localeCompare(b);
      });

      const selectorContainer = document.getElementById('kategoria-selector-container');
      selectorContainer.innerHTML = '';
      
      const guztiakBotoia = document.createElement('button');
      guztiakBotoia.className = 'kategoria-botoia guztiak aktibo';
      guztiakBotoia.textContent = 'Guztiak';
      guztiakBotoia.setAttribute('data-kategoria', 'guztiak');
      selectorContainer.appendChild(guztiakBotoia);
      
      const kategoriaBotoiak = [];
      kategoriaIzenak.forEach(katIzen => {
        const botoia = document.createElement('button');
        botoia.className = 'kategoria-botoia';
        botoia.textContent = katIzen;
        botoia.setAttribute('data-kategoria', katIzen);
        selectorContainer.appendChild(botoia);
        kategoriaBotoiak.push(botoia);
      });

      const container = document.getElementById('kategoriak-container');
      container.innerHTML = '';

      const egunakEus = ['igandea', 'astelehena', 'asteartea', 'asteazkena', 'osteguna', 'ostirala', 'larunbata'];

      const kategoriaBlokeak = {};

      for (let katIzen of kategoriaIzenak) {
        const partidaLista = partidakKategoriaka.get(katIzen);
        const katUp = katIzen.toUpperCase().trim();
        
        let kolorea = '#cccccc';
        for (let [k, info] of kategoriakMap.entries()) {
          if (info.kategoriaNagusia === katIzen) {
            kolorea = info.kolorea;
            break;
          }
        }
        const bordeKolorea = kolorea;

        const katBlokea = document.createElement('div');
        katBlokea.className = 'kategoria-blokea';
        katBlokea.style.backgroundColor = bordeKolorea;
        katBlokea.setAttribute('data-kategoria', katIzen);

        const tituluaDiv = document.createElement('div');
        tituluaDiv.className = 'kategoria-titulua';
        tituluaDiv.style.backgroundColor = `rgba(255, 255, 255, 0.95)`;
        tituluaDiv.innerHTML = `<span class="emoji-big">⚾</span> ${katIzen}  ·  (${partidaLista.length} partida)`;
        katBlokea.appendChild(tituluaDiv);

        // Función parseOrdua corregida
        function parseOrdua(horaStr) {
          if (!horaStr || horaStr.trim() === '' || horaStr.trim() === '-' || horaStr.startsWith('-')) {
            return '23:59';
          }
          const match = horaStr.match(/(\d{1,2}:\d{2})/);
          return match ? match[1] : '23:59';
        }

        function extractLevelNumber(txt) {
          const match = txt?.match(/(KIMU|SEIN|GAZTE|KADETE|HAUR|ALEBIN)\s*(\d+)/i);
          return match ? parseInt(match[2], 10) : 999;
        }

        partidaLista.sort((a, b) => {
          const dA = dateStrToDate(a.fecha);
          const dB = dateStrToDate(b.fecha);
          if (!dA && !dB) return 0;
          if (!dA) return 1;
          if (!dB) return -1;
          if (dA.getTime() !== dB.getTime()) return dA - dB;

          const horaA = parseOrdua(a.hora || '');
          const horaB = parseOrdua(b.hora || '');
          if (horaA !== horaB) return horaA.localeCompare(horaB);

          const frontA = a.fronton || '';
          const frontB = b.fronton || '';
          if (frontA !== frontB) return frontA.localeCompare(frontB);

          const levelA = extractLevelNumber(a.lehiaketa);
          const levelB = extractLevelNumber(b.lehiaketa);
          return levelB - levelA;
        });

        let currentDateStr = null;
        let currentDateDiv = null;
        let currentFrontoi = null;
        let frontoiDiv = null;

        partidaLista.forEach(p => {
          const fechaStr = p.fecha;
          if (fechaStr !== currentDateStr) {
            currentDateStr = fechaStr;
            const dObj = dateStrToDate(fechaStr);
            const egunIndizea = dObj ? dObj.getDay() : 0;
            const egunIzenaEus = egunakEus[egunIndizea] || 'eguna';
            const egunFormat = dObj ? `${egunIzenaEus}, ${fechaStr.replace(/\//g,'/')}` : fechaStr;

            currentDateDiv = document.createElement('div');
            currentDateDiv.className = 'egun-saila';
            currentDateDiv.style.borderLeftColor = bordeKolorea;
            currentDateDiv.innerHTML = `<div class="egun-izena">📅 ${egunFormat}</div>`;
            katBlokea.appendChild(currentDateDiv);
            currentFrontoi = null;
          }

          const frontIzen = p.fronton || 'Frontoia zehaztu gabe';
          if (frontIzen !== currentFrontoi) {
            currentFrontoi = frontIzen;
            frontoiDiv = document.createElement('div');
            frontoiDiv.className = 'frontoi-taldea';

            const frontoiSpan = document.createElement('div');
            frontoiSpan.className = 'frontoi-izena';
            if (/lekunberri|aldatz/i.test(frontIzen)) {
              frontoiSpan.classList.add('berezia');
            }
            frontoiSpan.textContent = '🎯 ' + frontIzen;
            frontoiDiv.appendChild(frontoiSpan);
            currentDateDiv.appendChild(frontoiDiv);
          }

          const partidaDiv = document.createElement('div');
          partidaDiv.className = 'partido-txikia';
          partidaDiv.style.borderLeftColor = bordeKolorea;

          const orduGarbi = parseOrdua(p.hora || '');
          const orduErakutsi = orduGarbi === '23:59' ? '⏳ PENDIENTE' : orduGarbi;
          const prov = (p.hora && p.hora.includes('provisional')) ? 'provisorio' : '';

          const etxekoaTestua = p.etxekoa || '?';
          const kanpokoaTestua = p.kanpokoak || '?';

          const etxekoaLarraun = etxekoaTestua.toUpperCase().includes('LARRAUN');
          const kanpokoaLarraun = kanpokoaTestua.toUpperCase().includes('LARRAUN');

          const etxekoaClass = `etxekoa ${etxekoaLarraun ? 'larraun-handiagoa' : ''}`;
          const kanpokoClass = `kanpokoak ${kanpokoaLarraun ? 'larraun-handiagoa' : ''}`;

          partidaDiv.innerHTML = `
            <div class="ordu-blokea ${prov}">${orduErakutsi} ${prov ? '<small>provis.</small>' : ''}</div>
            <div class="partido-info">
              <div class="parejak">
                <span class="${etxekoaClass}">🏠 ${etxekoaTestua}</span>
                <span class="${kanpokoClass}">✈️ ${kanpokoaTestua}</span>
              </div>
              <div class="lehiaketa-labur">
                <span>🏆 ${p.lehiaketa || p.modalidad || ''}</span>
                ${p.zkia && p.zkia !== '-' ? `<span class="zkia-etiketa">#${p.zkia}</span>` : ''}
                ${p.lehiaketa?.toUpperCase().includes('FINALA') ? '<span class="fase-tag">⚡ FINALA</span>' : ''}
              </div>
            </div>
          `;
          frontoiDiv.appendChild(partidaDiv);
        });

        container.appendChild(katBlokea);
        kategoriaBlokeak[katIzen] = katBlokea;
      }

      function filterKategoriak(kategoria) {
        if (kategoria === 'guztiak') {
          Object.values(kategoriaBlokeak).forEach(blokea => {
            blokea.classList.remove('kategoria-ezkutuan');
          });
        } else {
          Object.values(kategoriaBlokeak).forEach(blokea => {
            if (blokea.getAttribute('data-kategoria') === kategoria) {
              blokea.classList.remove('kategoria-ezkutuan');
            } else {
              blokea.classList.add('kategoria-ezkutuan');
            }
          });
        }

        guztiakBotoia.classList.remove('aktibo');
        kategoriaBotoiak.forEach(b => b.classList.remove('aktibo'));

        if (kategoria === 'guztiak') {
          guztiakBotoia.classList.add('aktibo');
        } else {
          const botoiaAktiboa = kategoriaBotoiak.find(b => b.getAttribute('data-kategoria') === kategoria);
          if (botoiaAktiboa) botoiaAktiboa.classList.add('aktibo');
        }
      }

      guztiakBotoia.addEventListener('click', () => filterKategoriak('guztiak'));
      kategoriaBotoiak.forEach(botoia => {
        botoia.addEventListener('click', (e) => {
          const kategoria = e.target.getAttribute('data-kategoria');
          filterKategoriak(kategoria);
        });
      });
    }

    // Hasierako render
    renderPartidak('fnp');

    iturriaBotoiak.forEach(botoia => {
      botoia.addEventListener('click', (e) => {
        const iturria = e.target.getAttribute('data-iturria');
        iturriaBotoiak.forEach(b => b.classList.remove('aktibo'));
        e.target.classList.add('aktibo');
        renderPartidak(iturria);
      });
    });

  })();
</script>
</body>
</html>
