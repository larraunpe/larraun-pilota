<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Larraun Pilota – ORDUTEGIAK</title>
  <link rel="icon" type="image/png" href="/kartelera.png">
  <meta property="og:title" content="ORDUTEGIAK – Larraun Pilota Elkartea">
  <meta property="og:description" content="Asterako partiden ordutegi provisionalak, kategoriaka antolatuta">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }
    .ordutegi-kartela {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 32px 32px 24px 24px;
      box-shadow: 0 20px 40px rgba(0, 20, 30, 0.25);
      overflow: hidden;
      padding: 30px 35px 35px 35px;
    }
    .header-ordutegiak {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 4px solid #b30000;
    }
    .header-ordutegiak img {
      height: 80px;
      width: auto;
      object-fit: contain;
    }
    .header-ordutegiak h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b30000;
      margin: 0 20px;
    }
    .kategoriak-ordena {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .kategoria-blokea {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }
    .kategoria-titulua {
      padding: 14px 24px;
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a1a;
      border-bottom: 4px solid;
      background: rgba(255, 255, 255, 0.85);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .egun-saila {
      margin: 20px 20px 25px 20px;
      border-left: 8px solid;
      background: #ffffffd9;
      border-radius: 18px 8px 8px 18px;
      padding: 12px 15px 8px 15px;
    }
    .egun-izena {
      font-size: 1.6rem;
      font-weight: 600;
      color: #0b2c5d;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
      border-bottom: 2px dashed #aaa;
      padding-bottom: 6px;
      text-transform: capitalize;
    }
    .frontoi-taldea {
      margin-bottom: 20px;
      margin-left: 8px;
    }
    .frontoi-izena {
      font-weight: 600;
      font-size: 1.3rem;
      background: #f2f2f2;
      display: inline-block;
      padding: 5px 20px 5px 16px;
      border-radius: 40px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
    }
    .frontoi-izena.berezia {
      background: #0b5ed7 !important;
      color: white !important;
      border-color: #003f8c;
    }
    .partido-txikia {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      background: #ffffff;
      padding: 14px 18px;
      margin-bottom: 8px;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      border-left: 8px solid;
    }
    .ordu-blokea {
      min-width: 110px;
      font-weight: 700;
      font-size: 1.3rem;
      background: #0b2c5d;
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      text-align: center;
      flex-shrink: 0;
    }
    .ordu-blokea.provisorio {
      background: #b34a00;
    }
    .ordu-blokea small {
      font-size: 0.7rem;
      display: block;
      opacity: 0.9;
    }
    .partido-info {
      flex: 1;
    }
    .parejak {
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .etxekoa { color: #0b2c5d; }
    .kanpokoak { color: #b00000; }
    .larraun-handiagoa {
      font-size: 1.3rem;
      font-weight: 800;
      background: #fff0f0;
      padding: 2px 8px;
      border-radius: 30px;
      border: 1px solid currentColor;
    }
    .lehiaketa-labur {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #444;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .zkia-etiketa {
      background: #333;
      color: white;
      border-radius: 30px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .fase-tag {
      background: #d4af37;
      color: #1a1a1a;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .footer-ordutegiak {
      margin-top: 45px;
      padding-top: 20px;
      border-top: 2px solid #bbb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-ordutegiak .social {
      background: #b30000;
      color: white;
      padding: 6px 18px;
      border-radius: 40px;
    }
    .ez-partidurik { padding: 20px; text-align: center; font-size: 1.5rem; color: #777; }
  </style>
</head>
<body>
<div class="ordutegi-kartela">
  <div class="header-ordutegiak">
    <img src="images/logo-larraun.png" alt="Larraun Pilota" onerror="this.style.display='none'">
    <h1>ORDUTEGIAK</h1>
    <img src="images/logo-fnp.png" alt="FNP" onerror="this.style.display='none'">
  </div>

  <div id="kategoriak-container" class="kategoriak-ordena">
    <div class="ez-partidurik" id="loading-placeholder">⏳ partidak kargatzen...</div>
  </div>

  <div class="footer-ordutegiak">
    <div>📍 Larraun Pilota Elkartea</div>
    <div class="social">@larraunpilota</div>
  </div>
</div>

<script>
  (async function() {
    // ----- 1. Kategoriak kargatu (EDADMIN erabiliko dugu ordenatzeko) -----
    let kategoriakRaw = [];
    let kategoriakMap = new Map(); // izena (uppercase) -> { kolorea, edadMin, izenaOriginal }

    try {
      const katResp = await fetch('/data/categoriacartel.json');
      if (katResp.ok) {
        kategoriakRaw = await katResp.json();
        // Formatua: [ { "SEIN": "#FFCC85", "EDADMIN": "9", "EDADMAX": "10" }, ... ]
        kategoriakRaw.forEach(item => {
          const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
          if (!izena) return;
          const kolorea = item[izena];
          const edadMin = item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999;
          kategoriakMap.set(izena.toUpperCase().trim(), {
            kolorea: kolorea,
            edadMin: edadMin,
            izena: izena
          });
        });
      } else {
        console.warn('ez da kategoriacartel.json kargatu');
      }
    } catch (e) {
      console.warn('kategoriak kargatzean errorea:', e);
    }

    // Kategoria ordena sortu: lehenik EDADMIN, gero alfabetikoz
    const kategoriaOrdenList = kategoriakRaw
      .map(item => {
        const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
        if (!izena) return null;
        return {
          izena: izena,
          upKey: izena.toUpperCase().trim(),
          kolorea: item[izena],
          edadMin: item.EDADMIN ? parseInt(item.EDADMIN, 10) : 999
        };
      })
      .filter(k => k !== null)
      .sort((a, b) => {
        if (a.edadMin !== b.edadMin) return a.edadMin - b.edadMin; // EDADMIN txikienetik
        return a.izena.localeCompare(b.izena); // berdina bada, alfabetiko
      });

    // ----- 2. Partidak kargatu -----
    let partidak = [];
    try {
      const partidosResp = await fetch('/data/cartelera-larraun.json');
      if (!partidosResp.ok) throw new Error('ezin partidak kargatu');
      partidak = await partidosResp.json();
    } catch (e) {
      document.getElementById('kategoriak-container').innerHTML = '<div class="ez-partidurik">❌ Ezin partidak kargatu.</div>';
      return;
    }

    // ----- 3. Astea iragazi (egokitu aste honetara) -----
    const astekoLehen = new Date(2026, 2, 2);  // Martxoak 2, astelehena
    const astekoAzken = new Date(2026, 2, 8, 23, 59, 59); // Martxoak 8, igandea

    function dateStrToDate(fechaStr) {
      if (!fechaStr) return null;
      const parts = fechaStr.split('/');
      if (parts.length !== 3) return null;
      return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    }

    const partidakAsteHonetan = partidak.filter(p => {
      if (!p.fecha) return false;
      const d = dateStrToDate(p.fecha);
      return d && d >= astekoLehen && d <= astekoAzken;
    });

    if (partidakAsteHonetan.length === 0) {
      document.getElementById('kategoriak-container').innerHTML = '<div class="ez-partidurik">🗓 Aste honetan ez dago partida ofizialik.</div>';
      return;
    }

    // ----- 4. Kategoria esleitu partida bakoitzari -----
    function kategoriaIzena(testua) {
      if (!testua) return 'Beste';
      const up = testua.toUpperCase();
      // Lehentasunez kategoria ezagunak
      const posibleKategoriak = Array.from(kategoriakMap.keys());
      for (let k of posibleKategoriak) {
        if (up.includes(k)) {
          return kategoriakMap.get(k).izena;
        }
      }
      // Hitz arruntak
      if (up.includes('HAUR')) return 'HAURRAK';
      if (up.includes('KADETE')) return 'KADETE';
      if (up.includes('KIMU')) return 'KIMU';
      if (up.includes('GAZTE')) return 'GAZTE';
      if (up.includes('SEIN')) return 'SEIN';
      if (up.includes('ESKUZ KOPA')) return 'ESKUZ KOPA';
      return 'Beste';
    }

    const partidakKategoriaka = new Map();
    partidakAsteHonetan.forEach(p => {
      // Aldatu "Descanso" "Atsedena" bihurtu etxekoa edo kanpokoak badira
      if (p.etxekoa && p.etxekoa.includes('Descanso')) p.etxekoa = p.etxekoa.replace('Descanso', 'Atsedena');
      if (p.kanpokoak && p.kanpokoak.includes('Descanso')) p.kanpokoak = p.kanpokoak.replace('Descanso', 'Atsedena');
      
      const iz = kategoriaIzena(p.lehiaketa || p.modalidad || '');
      if (!partidakKategoriaka.has(iz)) partidakKategoriaka.set(iz, []);
      partidakKategoriaka.get(iz).push(p);
    });

    // ----- 5. Kategoriak ordenatu (EDADMIN + alfabetiko) -----
    const kategoriaIzenak = Array.from(partidakKategoriaka.keys()).sort((a, b) => {
      const aUp = a.toUpperCase().trim();
      const bUp = b.toUpperCase().trim();
      const aInfo = kategoriaOrdenList.find(k => k.upKey === aUp);
      const bInfo = kategoriaOrdenList.find(k => k.upKey === bUp);
      
      // Biak aurkitu badira, ordena lehen ezarritakoaren arabera
      if (aInfo && bInfo) {
        if (aInfo.edadMin !== bInfo.edadMin) return aInfo.edadMin - bInfo.edadMin;
        return aInfo.izena.localeCompare(bInfo.izena);
      }
      // Bat ez bada aurkitu, amaieran
      if (aInfo) return -1;
      if (bInfo) return 1;
      return a.localeCompare(b);
    });

    // ----- 6. HTML eraiki -----
    const container = document.getElementById('kategoriak-container');
    container.innerHTML = '';

    const egunakEus = ['igandea', 'astelehena', 'asteartea', 'asteazkena', 'osteguna', 'ostirala', 'larunbata'];

    for (let katIzen of kategoriaIzenak) {
      const partidaLista = partidakKategoriaka.get(katIzen);
      const katUp = katIzen.toUpperCase().trim();
      const kategoriaInfo = kategoriaOrdenList.find(k => k.upKey === katUp) || { kolorea: '#cccccc' };
      const bordeKolorea = kategoriaInfo.kolorea;

      const katBlokea = document.createElement('div');
      katBlokea.className = 'kategoria-blokea';
      katBlokea.style.backgroundColor = bordeKolorea;

      const tituluaDiv = document.createElement('div');
      tituluaDiv.className = 'kategoria-titulua';
      tituluaDiv.style.borderBottomColor = bordeKolorea;
      tituluaDiv.innerHTML = `<span>⚾</span> ${katIzen} (${partidaLista.length})`;
      katBlokea.appendChild(tituluaDiv);

      // Ordenatu partidak: egun, ordu, frontoi
      function parseOrdua(horaStr) {
        if (!horaStr || horaStr.trim() === '-' || horaStr.startsWith('-')) return '00:00';
        const match = horaStr.match(/(\d{1,2}:\d{2})/);
        return match ? match[1] : '00:00';
      }

      partidaLista.sort((a, b) => {
        const dA = dateStrToDate(a.fecha);
        const dB = dateStrToDate(b.fecha);
        if (!dA && !dB) return 0;
        if (!dA) return 1;
        if (!dB) return -1;
        if (dA.getTime() !== dB.getTime()) return dA - dB;

        const horaA = parseOrdua(a.hora || '00:00');
        const horaB = parseOrdua(b.hora || '00:00');
        if (horaA !== horaB) return horaA.localeCompare(horaB);

        const frontA = a.fronton || '';
        const frontB = b.fronton || '';
        return frontA.localeCompare(frontB);
      });

      let currentDateStr = null;
      let currentDateDiv = null;
      let currentFrontoi = null;
      let frontoiDiv = null;

      partidaLista.forEach(p => {
        const fechaStr = p.fecha;
        if (fechaStr !== currentDateStr) {
          currentDateStr = fechaStr;
          const dObj = dateStrToDate(fechaStr);
          const egunIndizea = dObj ? dObj.getDay() : 0;
          const egunIzenaEus = egunakEus[egunIndizea];
          const egunFormat = dObj ? `${egunIzenaEus}, ${fechaStr.replace(/\//g, '/')}` : fechaStr;

          currentDateDiv = document.createElement('div');
          currentDateDiv.className = 'egun-saila';
          currentDateDiv.style.borderLeftColor = bordeKolorea;
          currentDateDiv.innerHTML = `<div class="egun-izena">📅 ${egunFormat}</div>`;
          katBlokea.appendChild(currentDateDiv);
          currentFrontoi = null;
        }

        const frontIzen = p.fronton || 'Frontoia zehaztu gabe';
        if (frontIzen !== currentFrontoi) {
          currentFrontoi = frontIzen;
          frontoiDiv = document.createElement('div');
          frontoiDiv.className = 'frontoi-taldea';

          const frontoiSpan = document.createElement('div');
          frontoiSpan.className = 'frontoi-izena';
          if (/lekunberri|aldatz/i.test(frontIzen)) {
            frontoiSpan.classList.add('berezia');
          }
          frontoiSpan.textContent = '🎯 ' + frontIzen;
          frontoiDiv.appendChild(frontoiSpan);
          currentDateDiv.appendChild(frontoiDiv);
        }

        const partidaDiv = document.createElement('div');
        partidaDiv.className = 'partido-txikia';
        partidaDiv.style.borderLeftColor = bordeKolorea;

        const orduGarbi = parseOrdua(p.hora || '');
        const prov = (p.hora && p.hora.includes('provisional')) ? 'provisorio' : '';

        const etxekoaTestua = p.etxekoa || '?';
        const kanpokoaTestua = p.kanpokoak || '?';
        const etxekoaLarraun = etxekoaTestua.toUpperCase().includes('LARRAUN');
        const kanpokoaLarraun = kanpokoaTestua.toUpperCase().includes('LARRAUN');

        const etxekoaClass = `etxekoa ${etxekoaLarraun ? 'larraun-handiagoa' : ''}`;
        const kanpokoClass = `kanpokoak ${kanpokoaLarraun ? 'larraun-handiagoa' : ''}`;

        partidaDiv.innerHTML = `
          <div class="ordu-blokea ${prov}">${orduGarbi} ${prov ? '<small>provis.</small>' : ''}</div>
          <div class="partido-info">
            <div class="parejak">
              <span class="${etxekoaClass}">🏠 ${etxekoaTestua}</span>
              <span class="${kanpokoClass}">✈️ ${kanpokoaTestua}</span>
            </div>
            <div class="lehiaketa-labur">
              <span>🏆 ${p.lehiaketa || p.modalidad || ''}</span>
              ${p.zkia && p.zkia !== '-' ? `<span class="zkia-etiketa">#${p.zkia}</span>` : ''}
            </div>
          </div>
        `;
        frontoiDiv.appendChild(partidaDiv);
      });

      container.appendChild(katBlokea);
    }
  })();
</script>
</body>
</html>
