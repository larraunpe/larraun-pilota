<script>
    let CATEGORIAS = {};
    let todosLosPartidos = [];
    let partidosPorDia = {};

    function dayEU(d) {
        const days = ["IGANDEA", "ASTELEHENA", "ASTEARTEA", "ASTEAZKENA", "OSTEGUNA", "OSTIRALA", "LARUNBATA"];
        const months = ["URTARRILA", "OTSAILA", "MARTXOA", "APIRILA", "MAIATZA", "EKAINA", "UZTAILA", "ABUZTUA", "IRAILA", "URRIA", "AZAROA", "ABENDUA"];
        return {
            dia: days[d.getDay()],
            fecha: `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`
        };
    }
    
    function formatearFechaKey(d) {
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }
    
    function parseFecha(fechaStr) {
        if (!fechaStr) return new Date();
        let fecha;
        if (fechaStr.match(/^\d{4}\/\d{2}\/\d{2}$/)) {
            const partes = fechaStr.split('/');
            fecha = new Date(`${partes[0]}-${partes[1]}-${partes[2]}T12:00:00`);
        } else {
            fecha = new Date(fechaStr + "T12:00:00");
        }
        return isNaN(fecha.getTime()) ? new Date() : fecha;
    }

    function esPartidoNeskak(texto) {
        if (!texto) return false;
        const patron = /neska|neskak|emakume|emakumea|emakumeak/i;
        return patron.test(texto);
    }

    function destacarLarraun(texto) {
        if (!texto) return texto;
        const partes = texto.split(/(LARRAUN(?:[-\s]+[A-Z]+)?)/i);
        return partes.map(part => {
            if (part.toUpperCase().includes('LARRAUN')) {
                return `<span class="equipo-larraun">${part}</span>`;
            }
            return part;
        }).join('');
    }

    function generarClasesCategorias() {
        const style = document.createElement("style");
        let css = "";
        for (const cat in CATEGORIAS) {
            css += `
                .cat-${cat} {
                    background: ${CATEGORIAS[cat]} !important;
                    color: white !important;
                    text-shadow: 1px 1px 0 rgba(0,0,0,0.5) !important;
                }
            `;
        }
        style.innerHTML = css;
        document.head.appendChild(style);
    }

    function obtenerClaseCategoria(texto) {
        if (!texto) return "";
        const textoLower = texto.toLowerCase();
        for (const cat in CATEGORIAS) {
            if (textoLower.includes(cat.toLowerCase())) {
                return "cat-" + cat;
            }
        }
        return "";
    }

    function paginarGrupos(grupos, maxPartidos = 5) {
        const paginas = [];
        let paginaActual = [];
        let cuentaActual = 0;
        grupos.forEach(g => {
            if (cuentaActual + g.length > maxPartidos && paginaActual.length > 0) {
                paginas.push(paginaActual);
                paginaActual = [g];
                cuentaActual = g.length;
            } else {
                paginaActual.push(g);
                cuentaActual += g.length;
            }
        });
        if (paginaActual.length) paginas.push(paginaActual);
        return paginas;
    }

    function generarPelotazos(contenedor, altura) {
        contenedor.innerHTML = '';
        for (let i = 0; i < 1500; i++) {
            const d = document.createElement('div');
            d.className = 'pelota-dot';
            d.style.left = Math.random() * 1080 + 'px';
            d.style.top = Math.random() * altura + 'px';
            d.style.width = d.style.height = (Math.random() * 4 + 2) + 'px';
            contenedor.appendChild(d);
        }
    }

    function crearPagina(gruposPagina, numPagina, totalPaginas, diaInfo, fechaOriginal) {
        const p = document.createElement('div');
        p.className = 'pagina';

        let totalEnPagina = gruposPagina.reduce((acc, g) => acc + g.length, 0);

        let html = `<div class="story-header">
            <img src="images/logo-larraun.png" class="logo" onerror="this.style.display='none'">
            <div class="titulo-central">ETXEKO PARTIDUAK</div>
            <img src="images/logo-fnp.png" class="logo" onerror="this.style.display='none'">
        </div>`;

        html += `<div class="story-content">`;
        html += `<div class="info-dia-card">`;
        html += `<div class="dia">${diaInfo.dia}</div>`;
        html += `<div class="fecha">${diaInfo.fecha}</div>`;
        if (totalPaginas > 1) {
            html += `<div class="paginacion">⚡ ${totalEnPagina} partidu · ZATIA ${numPagina}/${totalPaginas}</div>`;
        }
        html += `</div>`;

        gruposPagina.forEach(grupo => {
            const primero = grupo[0];
            const esTrinkete = /trinkete/i.test(primero.fronton || '');
            html += `<div class="grupo-partidos">`;
            html += `<div class="grupo-header ${esTrinkete ? 'trinkete' : ''}">`;
            html += `<div class="fronton"><span>📍</span> ${primero.fronton || 'Frontoia'}</div>`;
            html += `<div class="datetime"><span>🗓 ${primero.fecha || ''}</span> <span>⏰ ${primero.hora || '00:00'}</span></div>`;
            html += `</div>`;
            html += `<div class="grupo-body">`;

            grupo.forEach((partido, index) => {
                const esFinala = partido.lehiaketa && partido.lehiaketa.toUpperCase().includes('FINALA');
                const esNeskak = esPartidoNeskak(partido.lehiaketa);
                const claseCategoria = obtenerClaseCategoria(partido.lehiaketa);
                
                let clasesPartido = ['partido-item'];
                if (esFinala) clasesPartido.push('finala');
                if (esNeskak) clasesPartido.push('neskak');
                
                html += `<div class="${clasesPartido.join(' ')}">`;
                
                if (partido.zkia) {
                    html += `<div class="partido-numero">${partido.zkia}</div>`;
                }
                
                html += `<div class="partido-torneo ${claseCategoria}">${partido.lehiaketa || 'Txapelketa'}</div>`;
                
                html += `<div class="equipo-row">`;
                html += `<span class="equipo-icon">🏠</span>`;
                html += `<span class="etxekoa">${destacarLarraun(partido.etxekoa || '')}</span>`;
                html += `</div>`;
                
                if (partido.kanpokoak) {
                    html += `<div class="equipo-row">`;
                    html += `<span class="equipo-icon">✈️</span>`;
                    html += `<span class="kanpokoa">${destacarLarraun(partido.kanpokoak)}</span>`;
                    html += `</div>`;
                }
                
                html += `</div>`;
            });

            html += `</div></div>`;
        });

        if (numPagina < totalPaginas) {
            html += `<div class="continuation"><span>👇</span> JARRAITU <span>👇</span></div>`;
        }

        html += `</div>`;
        html += `<div class="story-footer"><div class="logos-grid"></div></div>`;
        html += `<div class="page-number">${numPagina}/${totalPaginas}</div>`;
        html += `<div class="pelotazos"></div>`;

        p.innerHTML = html;
        document.getElementById('contenedorPaginas').appendChild(p);

        const logos = [
            "aliprox.jpg","arbeondo.jpg","asadorepeleta.jpg","barainhoa.jpg","kotxera.jpg",
            "barilargi.jpg","barlekuonberri.jpg","begoñajanaridenda.jpg","carniceriaartxueta.jpg",
            "carpinteriahnosazpiroz.jpg","construccionesgañarbe.jpg","construccionesgarciarenasaralegi.jpg",
            "construccionesurangasaijos.jpg","hotelayestaran.jpg","iseelectricidad.jpg",
            "kattagorrielkartea.jpg","lacturale.jpg","lagunasesoria.jpg","maderasnasorena.jpg",
            "maskarada.jpg","suacontrol.jpg","urzubi.jpg","ventamugiro.jpg","dietistaanagurrea.jpg",
            "ekin.jpg","farmaciaitziarmendia.png","fontaneriabalenciaga.jpg","fontaneriairibarren.jpg",
            "izarberri.png","lakita.jpg","sidreriatokialai.jpg","tallereslarraun.jpg",
            "talleresotxotorena.jpg","veterinarialekunberri.jpg"
        ];
        const grid = p.querySelector('.logos-grid');
        if (grid) {
            grid.innerHTML = logos.map(f => `<div class="logo-item"><img src="images/patrocinio/${f}" onerror="this.style.display='none'"></div>`).join('');
        }

        setTimeout(() => {
            const altura = p.offsetHeight;
            const pel = p.querySelector('.pelotazos');
            generarPelotazos(pel, altura);
        }, 50);

        return p;
    }

    // --- CARGAR DATOS CON FALLBACK ---
    Promise.all([
        fetch('data/cartelera-larraun.json').then(r => r.json()).catch(() => []),
        fetch('data/partidos-no-oficiales.json').then(r => r.json()).catch(() => []),
        fetch('data/categoriacartel.json').then(r => r.json()).catch(() => ({}))
    ]).then(([oficiales, noOficiales, categorias]) => {
        
        CATEGORIAS = categorias;
        generarClasesCategorias();

        // Si no hay datos, usar datos de ejemplo
        if (oficiales.length === 0 && noOficiales.length === 0) {
            console.log('Usando datos de ejemplo');
            oficiales = [
                {
                    "fecha": "2026/03/13",
                    "hora": "20:15",
                    "zkia": "1",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN – OBERENA (A. Balda - U. Arcelus)",
                    "kanpokoak": "BETI ONAK (M. Ezkurra - S. Santesteban)",
                    "lehiaketa": "MANO PAREJAS - FASE 3 NKJ - ESKUZ BINAKA KADETE 1. LIGAXKA"
                },
                {
                    "fecha": "2026/03/13",
                    "hora": "20:15",
                    "zkia": "2",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN (J. Bildarraz - I. Sotil)",
                    "kanpokoak": "ESTERIBAR (I. Fonseca - M. Villanueva)",
                    "lehiaketa": "MANO PAREJAS - FASE 3 NKJ - ESKUZ BINAKA KADETE 1. LIGAXKA"
                },
                {
                    "fecha": "2026/03/14",
                    "hora": "10:00",
                    "zkia": "1",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN (L. Bengoetxea - I. Larreta)",
                    "kanpokoak": "OBERENA (M. Glaria - I. Nuin)",
                    "lehiaketa": "FASE 2 NKJ - PGOMA NESKA BINAKA KADETE LIGAXKA"
                },
                {
                    "fecha": "2026/03/14",
                    "hora": "10:00",
                    "zkia": "2",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN (M. Goikoetxea)",
                    "kanpokoak": "ZUGARRALDE (X. Garcia)",
                    "lehiaketa": "ESKUZ KOPA - ESKUZ BANAKA 4½ 2ª LIGAXKA"
                },
                {
                    "fecha": "2026/03/14",
                    "hora": "10:00",
                    "zkia": "3",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN (L. Navarro)",
                    "kanpokoak": "ARDOI (J. Guelbenzu)",
                    "lehiaketa": "ESKUZ KOPA - ESKUZ BANAKA 4½ 2ª LIGAXKA"
                },
                {
                    "fecha": "2026/03/14",
                    "hora": "10:00",
                    "zkia": "4",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN (X. Telletxea)",
                    "kanpokoak": "ZUGARRALDE (A. Agirre)",
                    "lehiaketa": "ESKUZ KOPA - ESKUZ BANAKA 4½ 1. LIGAXKA"
                },
                {
                    "fecha": "2026/03/14",
                    "hora": "10:00",
                    "zkia": "5",
                    "fronton": "Lekunberri - Jaian Jai",
                    "etxekoa": "LARRAUN (U. Agirrezabala - A. Apezetxea)",
                    "kanpokoak": "IK. SAN FERMIN (A. Vicuña - E. Zarranz)",
                    "lehiaketa": "MANO PAREJAS - FASE 3 NKJ - ESKUZ BINAKA SEIN 2. LIGAXKA"
                }
            ];
        }

        // Combinar y filtrar
        todosLosPartidos = [
            ...oficiales.map(p => ({ ...p, ofiziala: true })),
            ...noOficiales.map(p => ({ ...p, ofiziala: p.ofiziala === "true" }))
        ].filter(p => {
            if (!p.fronton) return false;
            const f = p.fronton.toLowerCase();
            return f.includes('lekunberri') || f.includes('aldatz');
        });

        // Si sigue sin haber partidos, usar todos
        if (todosLosPartidos.length === 0 && oficiales.length > 0) {
            todosLosPartidos = oficiales;
        }

        // Agrupar por fecha
        todosLosPartidos.forEach(p => {
            const fecha = parseFecha(p.fecha);
            const key = formatearFechaKey(fecha);
            if (!partidosPorDia[key]) {
                partidosPorDia[key] = { fecha, partidos: [] };
            }
            partidosPorDia[key].partidos.push(p);
        });

        const diasGrid = document.getElementById('diasGrid');
        const diasOrdenados = Object.keys(partidosPorDia).sort();

        diasOrdenados.forEach(key => {
            const data = partidosPorDia[key];
            const info = dayEU(data.fecha);
            const btn = document.createElement('button');
            btn.className = 'dia-btn' + (info.dia === 'IGANDEA' ? ' sunday' : '');
            btn.innerHTML = `${info.dia}<br><small>${info.fecha}</small><br><strong>${data.partidos.length} partidu</strong>`;
            btn.onclick = (e) => {
                document.querySelectorAll('.dia-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                seleccionarDia(key);
            };
            diasGrid.appendChild(btn);
        });

        if (diasOrdenados.length) {
            seleccionarDia(diasOrdenados[0]);
            document.querySelector('.dia-btn')?.classList.add('active');
        } else {
            document.getElementById('infoDia').innerHTML = '❌ No hay partidos';
        }
    }).catch(error => {
        console.error('Error:', error);
        document.getElementById('infoDia').innerHTML = '❌ Error cargando datos';
    });

    function seleccionarDia(fechaKey) {
        const contenedor = document.getElementById('contenedorPaginas');
        contenedor.innerHTML = '';

        const diaData = partidosPorDia[fechaKey];
        if (!diaData) return;

        const diaInfo = dayEU(diaData.fecha);
        const partidos = [...diaData.partidos].sort((a,b) => (a.hora || '00:00').localeCompare(b.hora || '00:00'));

        const gruposMap = {};
        partidos.forEach(p => {
            const key = `${p.fronton}|${p.fecha}|${p.hora}`;
            if (!gruposMap[key]) gruposMap[key] = [];
            gruposMap[key].push(p);
        });
        const grupos = Object.values(gruposMap);

        const paginas = paginarGrupos(grupos, 5);

        paginas.forEach((gruposPagina, idx) => {
            crearPagina(gruposPagina, idx+1, paginas.length, diaInfo, `${diaInfo.dia} ${diaInfo.fecha}`);
        });

        document.getElementById('infoDia').innerHTML = `📅 ${diaInfo.dia} ${diaInfo.fecha} · ${partidos.length} partidos · ${paginas.length} página${paginas.length > 1 ? 's' : ''}`;
        document.getElementById('pageCounter').innerHTML = `📱 ${paginas.length} story${paginas.length > 1 ? 's' : ''}`;
    }

    async function exportarTodasLasStories() {
        const paginas = document.querySelectorAll('.pagina');
        for (let i = 0; i < paginas.length; i++) {
            document.getElementById('pageCounter').innerHTML = `📸 Exportando ${i+1}/${paginas.length}...`;
            await new Promise(r => setTimeout(r, 200));
            const canvas = await html2canvas(paginas[i], {
                scale: 2, backgroundColor: null, windowWidth: 1080,
                height: paginas[i].offsetHeight, windowHeight: paginas[i].offsetHeight
            });
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/jpeg', 0.95);
            
            const diaCard = paginas[i].querySelector('.info-dia-card .dia');
            const dia = diaCard ? diaCard.textContent.trim() : 'dia';
            
            const parte = paginas[i].querySelector('.paginacion')?.textContent.match(/ZATIA (\d+)/);
            const sufijo = parte ? `-parte-${parte[1]}` : '';
            a.download = `etxekoak-${dia}${sufijo}.jpg`;
            a.click();
            await new Promise(r => setTimeout(r, 500));
        }
        document.getElementById('pageCounter').innerHTML = `✅ ¡${paginas.length} stories exportadas!`;
    }

    async function exportarTodosLosDias() {
        const dias = Object.keys(partidosPorDia).sort();
        for (const key of dias) {
            seleccionarDia(key);
            await new Promise(r => setTimeout(r, 1000));
            await exportarTodasLasStories();
        }
    }

    window.exportarTodasLasStories = exportarTodasLasStories;
    window.exportarTodosLosDias = exportarTodosLosDias;
</script>
</body>
