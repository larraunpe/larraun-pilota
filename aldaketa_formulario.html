<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Larraun Pilota – Ordutegien Kudeaketa (Pilotari bakoitzaren botoa)</title>
    <link rel="icon" type="image/png" href="/egutegia.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f0f2f5; padding: 16px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 12px 30px rgba(0,0,0,0.2); padding: 20px; }
        @media (min-width: 768px) { body { padding: 24px; } .container { padding: 32px 40px; } }
        .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 4px solid #b30000; }
        .logo-group { display: flex; gap: 20px; align-items: center; }
        .header img { height: 55px; width: auto; }
        @media (min-width: 768px) { .header img { height: 80px; } }
        .header h1 { font-size: 1.8rem; font-weight: 800; color: #b30000; }
        .idioma-toggle { display: flex; gap: 10px; background: #e9ecef; padding: 5px 12px; border-radius: 60px; }
        .idioma-boton { background: none; border: none; font-weight: 700; padding: 6px 18px; border-radius: 40px; cursor: pointer; }
        .idioma-boton.aktibo { background: #b30000; color: white; }
        .filtro-categoria { background: #f8f9fc; border-radius: 28px; padding: 16px 20px; margin-bottom: 24px; }
        .filtro-titulo { font-weight: 800; margin-bottom: 12px; }
        .filtro-botones { display: flex; flex-wrap: wrap; gap: 10px; }
        .filtro-btn { padding: 8px 18px; border: none; border-radius: 40px; background: #e2e6ea; font-weight: 700; cursor: pointer; }
        .filtro-btn.aktibo { background: #b30000; color: white; }
        select, input, textarea { width: 100%; padding: 12px 16px; border-radius: 60px; border: 2px solid #ccc; font-size: 1rem; }
        .card { background: #f8f9fc; border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        .btn { border: none; padding: 12px 24px; border-radius: 60px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #b30000; color: white; }
        .btn-primary:hover { background: #800000; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        .btn-secondary { background: #6c757d; color: white; }
        .opcion-grilla { display: flex; flex-wrap: wrap; gap: 12px; margin: 15px 0; }
        .opcion-voto { background: #f1f3f5; border-radius: 50px; padding: 10px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: space-between; }
        .votos-container { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        .btn-jugador { padding: 8px 16px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-local { background: #cfe2ff; color: #084298; border: 1px solid #084298; }
        .btn-local.aktibo { background: #0d6efd; color: white; border-color: #0d6efd; }
        .btn-visitante { background: #f8d7da; color: #721c24; border: 1px solid #721c24; }
        .btn-visitante.aktibo { background: #dc3545; color: white; border-color: #dc3545; }
        .error-msg, .success-msg { border-radius: 40px; padding: 10px; margin-top: 15px; display: none; text-align: center; }
        .error-msg { background: #ffe6e6; color: #b30000; }
        .success-msg { background: #d4edda; color: #155724; }
        .badge { background: #b30000; color: white; padding: 4px 10px; border-radius: 40px; font-size: 0.75rem; }
        .info-partido { background: #fff8e7; border-radius: 24px; padding: 16px; margin-bottom: 20px; }
        footer { margin-top: 36px; text-align: center; font-size: 0.8rem; color: #666; }
        @media (max-width: 600px) { .btn-jugador { padding: 6px 12px; font-size: 0.75rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-group"><img src="images/logo-larraun.png" alt="Larraun"><img src="images/logo-fnp.png" alt="FNP"></div>
        <h1 id="titulo">🗓️ ORDUTEGIEN KUDEAKETA</h1>
        <div class="idioma-toggle"><button class="idioma-boton aktibo" data-lang="eu">EUSKARA</button><button class="idioma-boton" data-lang="es">CASTELLANO</button></div>
    </div>

    <!-- FASE 1: ANTOLAKETA -->
    <div id="faseAntolaketa">
        <div class="filtro-categoria"><div class="filtro-titulo" id="filtroTitulo">🏷️ Iragazi kategoria</div><div id="filtroBotones" class="filtro-botones"></div></div>
        <div class="card"><div class="filtro-titulo" id="selectLabel">🏆 Hautatu partidua</div><select id="partidoSelect"><option>-- Kargatzen... --</option></select></div>
        <div id="configAntolaketa" style="display: none;">
            <div class="card"><div class="filtro-titulo" id="tipoLabel">📌 Partidu mota</div>
                <div style="display: flex; gap: 20px;"><label><input type="radio" name="tipoPartido" value="banaka"> 🏅 Banaka (Banaka)</label><label><input type="radio" name="tipoPartido" value="binaka"> 👥 Binaka (Binaka)</label></div>
            </div>
            <div class="card"><div class="filtro-titulo" id="opcionesLabel">⏰ Ordutegi aukerak (antolakuntzak proposatuta)</div>
                <div id="opcionesOrgGrilla" class="opcion-grilla"></div>
                <div style="margin-top: 15px;"><label id="obsLabel">📝 Oharrak (adib: 17:00 eta 21:00 artean)</label><textarea id="observacionesOrg" rows="2" placeholder="Informazio gehigarria ordutegiei buruz..."></textarea></div>
            </div>
            <button id="btnPublicarEncuesta" class="btn btn-primary" id="publicarBtn">📢 Argitaratu inkesta pilotarientzat</button>
        </div>
    </div>

    <!-- FASE 2: PILOTARIAK (bozketa) -->
    <div id="fasePilotariak" style="display: none;">
        <div class="info-partido" id="infoPartidoBozketa"></div>
        <div id="observacionesMostradas" class="card" style="background:#e7f3ff;"></div>
        <div id="bozketaContainer"></div>
        <div style="margin-top: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
            <button id="btnResetBozketa" class="btn btn-secondary">🔄 Berrabiarazi bozketa (inkesta berria)</button>
            <button id="btnEnviarEmaitzak" class="btn btn-success">💬 Bidali emaitzak WhatsApp bidez</button>
        </div>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <footer><span id="footerText">📌 1. fasea: Antolakuntzak ordutegiak proposatzen ditu. 2. fasea: Pilotariek bozkatzen dute.</span></footer>
</div>

<script>
    // ------------------ DATU GLOBALAK ------------------
    let partidaGuztiak = [];
    let kategoriakMap = new Map();
    let kategoriaNagusiakOrdenatuak = [];
    let currentLang = 'eu';
    let currentKategoriaFilter = 'GUZTIAK';
    
    let estado = {
        fase: 'antolaketa',
        partido: null,
        tipoPartido: 'banaka',
        opcionesOrg: [],
        observaciones: '',
        votos: {}
    };

    const opcionesBase = [
        { id: 'lun_tarde',  labelEu: 'Astelehena arratsaldea', labelEs: 'Lunes tarde' },
        { id: 'mar_tarde',  labelEu: 'Asteartea arratsaldea', labelEs: 'Martes tarde' },
        { id: 'mie_tarde',  labelEu: 'Asteazkena arratsaldea', labelEs: 'Miércoles tarde' },
        { id: 'jue_tarde',  labelEu: 'Osteguna arratsaldea', labelEs: 'Jueves tarde' },
        { id: 'vie_tarde',  labelEu: 'Ostirala arratsaldea', labelEs: 'Viernes tarde' },
        { id: 'sab_manana', labelEu: 'Larunbata goiza', labelEs: 'Sábado mañana' },
        { id: 'sab_tarde',  labelEu: 'Larunbata arratsaldea', labelEs: 'Sábado tarde' },
        { id: 'dom_manana', labelEu: 'Igandea goiza', labelEs: 'Domingo mañana' },
        { id: 'dom_tarde',  labelEu: 'Igandea arratsaldea', labelEs: 'Domingo tarde' }
    ];

    // --- PILOTARIEN IDENTIFIKAZIOA (ZUZENDUTA) ---
    // Extrae los clubs que están ANTES del paréntesis
    function extraerClubs(nombreEquipo) {
        if (!nombreEquipo) return [];
        const parentesisIndex = nombreEquipo.indexOf('(');
        let clubsPart = parentesisIndex !== -1 ? nombreEquipo.substring(0, parentesisIndex).trim() : nombreEquipo;
        // Los clubs pueden venir separados por " – " o " - "
        return clubsPart.split(/\s*[–-]\s*/).map(c => c.trim()).filter(c => c);
    }

    // Extrae los pelotaris que están DENTRO del paréntesis, separados por " – " o " - "
    function extraerPilotariak(nombreEquipo) {
        if (!nombreEquipo) return [];
        const match = nombreEquipo.match(/\(([^)]+)\)/);
        if (!match) return [];
        const pilotariakStr = match[1];
        // Separar por guión largo " – " o corto "-"
        return pilotariakStr.split(/\s*[–-]\s*/).map(p => p.trim()).filter(p => p);
    }

    // Asigna cada pelotari a su club correspondiente (por orden)
    function getPilotariak(partido, tipo) {
        const localRaw = partido.etxekoa || '';
        const kanpokoaRaw = partido.kanpokoak || '';
        
        const localPilotariak = extraerPilotariak(localRaw);
        const kanpokoaPilotariak = extraerPilotariak(kanpokoaRaw);
        const localClubs = extraerClubs(localRaw);
        const kanpokoaClubs = extraerClubs(kanpokoaRaw);
        
        let pilotariak = [];
        
        if (tipo === 'banaka') {
            // Individual: 1 pelotari por equipo
            pilotariak.push({
                id: 'local_1',
                izena: localPilotariak[0] || 'Jokalari 1 Etxekoa',
                kluba: localClubs[0] || (localClubs.length > 1 ? localClubs.join(' - ') : 'Etxekoa'),
                taldea: 'local'
            });
            pilotariak.push({
                id: 'kanpokoa_1',
                izena: kanpokoaPilotariak[0] || 'Jokalari 1 Kanpokoa',
                kluba: kanpokoaClubs[0] || (kanpokoaClubs.length > 1 ? kanpokoaClubs.join(' - ') : 'Kanpokoa'),
                taldea: 'kanpokoa'
            });
        } else {
            // Parejas: 2 pelotaris por equipo, cada uno con su club (por orden)
            for (let i = 0; i < 2; i++) {
                const localClub = localClubs[i] || (localClubs.length === 1 ? localClubs[0] : (localClubs.length > i ? localClubs[i] : 'Etxekoa'));
                const kanpokoaClub = kanpokoaClubs[i] || (kanpokoaClubs.length === 1 ? kanpokoaClubs[0] : (kanpokoaClubs.length > i ? kanpokoaClubs[i] : 'Kanpokoa'));
                
                pilotariak.push({
                    id: `local_${i+1}`,
                    izena: localPilotariak[i] || `Jokalari ${i+1} Etxekoa`,
                    kluba: localClub,
                    taldea: 'local'
                });
                pilotariak.push({
                    id: `kanpokoa_${i+1}`,
                    izena: kanpokoaPilotariak[i] || `Jokalari ${i+1} Kanpokoa`,
                    kluba: kanpokoaClub,
                    taldea: 'kanpokoa'
                });
            }
        }
        return pilotariak;
    }

    // --- Datuen karga (kategoriak eta partidak) ---
    async function kargatuKategoriak() {
        try {
            const resp = await fetch('/data/categoriaedad.json');
            if (!resp.ok) throw new Error();
            const data = await resp.json();
            const edadMinToKategoria = new Map();
            data.forEach(item => {
                const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
                if (!izena) return;
                const edadMin = item.EDADMIN ? parseInt(item.EDADMIN,10) : 999;
                if (!edadMinToKategoria.has(edadMin)) edadMinToKategoria.set(edadMin, izena);
            });
            data.forEach(item => {
                const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
                if (!izena) return;
                const kolorea = item[izena];
                const edadMin = item.EDADMIN ? parseInt(item.EDADMIN,10) : 999;
                const kategoriaNagusia = edadMinToKategoria.get(edadMin) || izena;
                kategoriakMap.set(izena.toUpperCase().trim(), { kolorea, edadMin, izena, kategoriaNagusia });
            });
            const kategoriaNagusiakSet = new Set();
            data.forEach(item => {
                const izena = Object.keys(item).find(key => key !== 'EDADMIN' && key !== 'EDADMAX');
                if (!izena) return;
                const edadMin = item.EDADMIN ? parseInt(item.EDADMIN,10) : 999;
                const nagusia = edadMinToKategoria.get(edadMin);
                if (nagusia) kategoriaNagusiakSet.add(nagusia);
            });
            const kategoriaNagusiakArray = Array.from(kategoriaNagusiakSet).map(izena => {
                const item = data.find(i => { const iIzena = Object.keys(i).find(key => key !== 'EDADMIN' && key !== 'EDADMAX'); return iIzena === izena; });
                return { izena, edadMin: item ? parseInt(item.EDADMIN,10) : 999 };
            });
            kategoriaNagusiakOrdenatuak = kategoriaNagusiakArray.sort((a,b) => a.edadMin - b.edadMin).map(k => k.izena);
        } catch(e) { console.warn(e); kategoriaNagusiakOrdenatuak = ['BENJAMIN','ALEBINAK','KIMU','SEIN','KADETE','GAZTE','JUVENIL','SENIOR','Beste']; }
    }

    function kategoriaNagusiaPartida(partida) {
        const testua = (partida.lehiaketa || partida.modalidad || '').toUpperCase();
        if (!testua) return 'Beste';
        for (let [k, info] of kategoriakMap.entries()) if (testua.includes(k)) return info.kategoriaNagusia;
        if (testua.includes('HAUR')) return 'HAURRAK';
        if (testua.includes('KADETE')) return 'KADETE';
        if (testua.includes('KIMU')) return 'KIMU';
        if (testua.includes('GAZTE')) return 'GAZTE';
        if (testua.includes('ALEBIN')) return 'ALEBINAK';
        if (testua.includes('SEIN')) return 'SEIN';
        return 'Beste';
    }

    async function kargatuPartidak() {
        try {
            const [oficialesResp, noOficialesResp] = await Promise.all([fetch('/data/cartelera-larraun.json'), fetch('/data/partidos-no-oficiales.json')]);
            if (!oficialesResp.ok || !noOficialesResp.ok) throw new Error();
            const ofi = await oficialesResp.json();
            const noOfi = await noOficialesResp.json();
            const todos = [...ofi, ...noOfi];
            todos.forEach(p => {
                if (p.etxekoa && p.etxekoa.includes('Descanso')) p.etxekoa = p.etxekoa.replace('Descanso', 'Atsedena');
                if (p.kanpokoak && p.kanpokoak.includes('Descanso')) p.kanpokoak = p.kanpokoak.replace('Descanso', 'Atsedena');
                p.kategoria = kategoriaNagusiaPartida(p);
            });
            partidaGuztiak = todos;
        } catch(err) { console.error(err); partidaGuztiak = []; }
    }

    function getPartidosFiltrados() {
        if (currentKategoriaFilter === 'GUZTIAK') return partidaGuztiak;
        return partidaGuztiak.filter(p => p.kategoria === currentKategoriaFilter);
    }

    function formatearFecha(fechaStr, lang) {
        if (!fechaStr) return lang === 'es' ? 'fecha desconocida' : 'data ezezaguna';
        const partes = fechaStr.split('/');
        if (partes.length !== 3) return fechaStr;
        const [anyo, mes, dia] = partes;
        const fechaObj = new Date(anyo, mes-1, dia);
        const diasEs = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
        const diasEu = ['Igandea','Astelehena','Asteartea','Asteazkena','Osteguna','Ostirala','Larunbata'];
        const diaSemana = fechaObj.getDay();
        if (lang === 'es') return `${diasEs[diaSemana]}, ${dia}/${mes}/${anyo}`;
        else return `${diasEu[diaSemana]}, ${dia}/${mes}/${anyo}`;
    }

    // --- Estado persistente ---
    function gordeEgoera() { localStorage.setItem('ordutegienKudeaketa', JSON.stringify(estado)); }
    function kargatuEgoera() {
        const saved = localStorage.getItem('ordutegienKudeaketa');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.fase && parsed.partido) estado = parsed;
                if (!estado.votos) estado.votos = {};
                if (!estado.opcionesOrg) estado.opcionesOrg = [];
            } catch(e) {}
        }
    }

    // --- UI errendatzea ---
    function eguneratuUI() {
        if (estado.fase === 'antolaketa') {
            document.getElementById('faseAntolaketa').style.display = 'block';
            document.getElementById('fasePilotariak').style.display = 'none';
            kargatuFiltroakEtaSelect();
            if (estado.partido) {
                document.getElementById('configAntolaketa').style.display = 'block';
                kargatuConfigAntolaketa();
            } else {
                document.getElementById('configAntolaketa').style.display = 'none';
            }
        } else {
            document.getElementById('faseAntolaketa').style.display = 'none';
            document.getElementById('fasePilotariak').style.display = 'block';
            errendatuBozketa();
        }
    }

    function kargatuFiltroakEtaSelect() {
        const kategorias = [...new Set(partidaGuztiak.map(p => p.kategoria))];
        const container = document.getElementById('filtroBotones');
        container.innerHTML = '';
        const guztiakBtn = document.createElement('button');
        guztiakBtn.className = `filtro-btn ${currentKategoriaFilter === 'GUZTIAK' ? 'aktibo' : ''}`;
        guztiakBtn.textContent = currentLang === 'es' ? 'TODOS' : 'GUZTIAK';
        guztiakBtn.onclick = () => { currentKategoriaFilter = 'GUZTIAK'; eguneratuFiltroakUI(); kargatuSelectPartidak(); };
        container.appendChild(guztiakBtn);
        kategorias.forEach(kat => {
            const btn = document.createElement('button');
            btn.className = `filtro-btn ${currentKategoriaFilter === kat ? 'aktibo' : ''}`;
            btn.textContent = kat;
            btn.onclick = () => { currentKategoriaFilter = kat; eguneratuFiltroakUI(); kargatuSelectPartidak(); };
            container.appendChild(btn);
        });
        kargatuSelectPartidak();
    }

    function eguneratuFiltroakUI() {
        document.querySelectorAll('#filtroBotones .filtro-btn').forEach(btn => {
            const kat = btn.textContent === 'TODOS' || btn.textContent === 'GUZTIAK' ? 'GUZTIAK' : btn.textContent;
            if (kat === currentKategoriaFilter) btn.classList.add('aktibo');
            else btn.classList.remove('aktibo');
        });
    }

    function kargatuSelectPartidak() {
        const select = document.getElementById('partidoSelect');
        const filtrados = getPartidosFiltrados();
        select.innerHTML = '<option value="">-- Hautatu partidua --</option>';
        filtrados.forEach((p, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = `${p.fecha || 'data gabe'} | ${p.etxekoa || '?'} vs ${p.kanpokoak || '?'} | ${p.kategoria}`;
            select.appendChild(option);
        });
        select.onchange = () => {
            const idx = select.value;
            if (idx !== "") {
                estado.partido = filtrados[parseInt(idx)];
                estado.opcionesOrg = [];
                estado.observaciones = '';
                estado.votos = {};
                gordeEgoera();
                kargatuConfigAntolaketa();
                document.getElementById('configAntolaketa').style.display = 'block';
            } else {
                estado.partido = null;
                document.getElementById('configAntolaketa').style.display = 'none';
                gordeEgoera();
            }
        };
    }

    function kargatuConfigAntolaketa() {
        document.querySelectorAll('input[name="tipoPartido"]').forEach(radio => {
            radio.checked = (radio.value === estado.tipoPartido);
            radio.onchange = () => { if(radio.checked) estado.tipoPartido = radio.value; gordeEgoera(); };
        });
        const grilla = document.getElementById('opcionesOrgGrilla');
        grilla.innerHTML = '';
        opcionesBase.forEach(op => {
            const label = currentLang === 'es' ? op.labelEs : op.labelEu;
            const checked = estado.opcionesOrg.some(o => o.id === op.id);
            const wrapper = document.createElement('label');
            wrapper.className = 'opcion-voto';
            wrapper.style.background = '#fff';
            wrapper.style.cursor = 'pointer';
            wrapper.innerHTML = `<input type="checkbox" value="${op.id}" ${checked ? 'checked' : ''}> <span>${label}</span>`;
            const cb = wrapper.querySelector('input');
            cb.onchange = (e) => {
                if (e.target.checked) {
                    if (!estado.opcionesOrg.find(o => o.id === op.id)) estado.opcionesOrg.push({ id: op.id, texto: label });
                } else {
                    estado.opcionesOrg = estado.opcionesOrg.filter(o => o.id !== op.id);
                }
                gordeEgoera();
            };
            grilla.appendChild(wrapper);
        });
        document.getElementById('observacionesOrg').value = estado.observaciones || '';
        document.getElementById('observacionesOrg').oninput = (e) => { estado.observaciones = e.target.value; gordeEgoera(); };
    }

    // --- BOZKETA (pilotari bakoitzak bere botoa) ---
    function errendatuBozketa() {
        const partido = estado.partido;
        if (!partido) return;
        const pilotariak = getPilotariak(partido, estado.tipoPartido);
        const infoDiv = document.getElementById('infoPartidoBozketa');
        infoDiv.innerHTML = `
            <p><strong>🏆 ${partido.lehiaketa || partido.modalidad || 'Lehiaketa'}</strong></p>
            <p>🏠 ${partido.etxekoa}  vs  ✈️ ${partido.kanpokoak}</p>
            <p>📅 ${formatearFecha(partido.fecha, currentLang)}  |  🕒 ${partido.hora || '--:--'}  |  🎯 ${partido.fronton || 'Frontoia?'}</p>
            <p>📌 Mota: ${estado.tipoPartido === 'banaka' ? 'Banaka' : 'Binaka'}</p>
        `;
        const obsDiv = document.getElementById('observacionesMostradas');
        if (estado.observaciones) obsDiv.innerHTML = `<strong>📝 ${currentLang === 'es' ? 'Observaciones:' : 'Oharrak:'}</strong> ${estado.observaciones}`;
        else obsDiv.innerHTML = '';
        
        if (!estado.votos) estado.votos = {};
        estado.opcionesOrg.forEach(op => { if (!estado.votos[op.id]) estado.votos[op.id] = {}; });
        
        const container = document.getElementById('bozketaContainer');
        container.innerHTML = '';
        
        estado.opcionesOrg.forEach(op => {
            const opDiv = document.createElement('div');
            opDiv.className = 'card';
            opDiv.innerHTML = `<div class="filtro-titulo">⏰ ${op.texto}</div><div class="votos-container" id="votos-${op.id.replace(/[^a-zA-Z0-9]/g, '_')}"></div>`;
            const votosContainer = opDiv.querySelector(`.votos-container`);
            
            pilotariak.forEach(pilot => {
                const bozkatuta = estado.votos[op.id]?.[pilot.id] === true;
                const btn = document.createElement('button');
                btn.className = `btn-jugador ${pilot.taldea === 'local' ? 'btn-local' : 'btn-visitante'} ${bozkatuta ? 'aktibo' : ''}`;
                // Mostrar solo el nombre del pelotari y su club
                btn.innerHTML = `${pilot.izena} (${pilot.kluba}) ${bozkatuta ? '✓' : '○'}`;
                btn.onclick = () => {
                    if (!estado.votos[op.id]) estado.votos[op.id] = {};
                    estado.votos[op.id][pilot.id] = !estado.votos[op.id][pilot.id];
                    gordeEgoera();
                    errendatuBozketa(); // Refrescar
                };
                votosContainer.appendChild(btn);
            });
            container.appendChild(opDiv);
        });
    }

    // --- Mezua sortu ---
    function sortuEmaitzenMezua() {
        if (!estado.partido) return null;
        const p = estado.partido;
        const pilotariak = getPilotariak(p, estado.tipoPartido);
        let mezua = currentLang === 'eu' 
            ? `🗓️ *ORDUTEGI BOZKETAREN EMAITZAK* 🗓️\n\nPartidua: ${p.etxekoa} vs ${p.kanpokoak}\n📅 Jatorrizko data: ${formatearFecha(p.fecha, currentLang)}\n🎯 Frontoia: ${p.fronton || '?'}\n📌 Mota: ${estado.tipoPartido === 'banaka' ? 'Banaka' : 'Binaka'}\n`
            : `🗓️ *RESULTADOS VOTACIÓN HORARIOS* 🗓️\n\nPartido: ${p.etxekoa} vs ${p.kanpokoak}\n📅 Fecha original: ${formatearFecha(p.fecha, currentLang)}\n🎯 Frontón: ${p.fronton || '?'}\n📌 Tipo: ${estado.tipoPartido === 'banaka' ? 'Individual' : 'Parejas'}\n`;
        if (estado.observaciones) mezua += `\n📝 Oharrak: ${estado.observaciones}\n`;
        mezua += `\n✅ *Aukera bakoitzaren emaitzak:*\n`;
        estado.opcionesOrg.forEach(op => {
            mezua += `\n⏰ ${op.texto}:\n`;
            pilotariak.forEach(pilot => {
                const voto = estado.votos[op.id]?.[pilot.id] === true;
                const disponibilidad = voto ? (currentLang === 'eu' ? '✓ Eskuragarri' : '✓ Disponible') : (currentLang === 'eu' ? '✗ Ez eskuragarri' : '✗ No disponible');
                mezua += `   • ${pilot.izena} (${pilot.kluba}): ${disponibilidad}\n`;
            });
        });
        mezua += `\n⚡ Mesedez, konfirmatu behin betiko ordutegia.\n📍 Larraun Pilota Elkartea`;
        return mezua;
    }

    // --- Eventuak ---
    document.getElementById('btnPublicarEncuesta').addEventListener('click', () => {
        if (estado.opcionesOrg.length === 0) {
            mostrarError(currentLang === 'eu' ? 'Aukeratu ordutegi aukera bat gutxienez.' : 'Selecciona al menos una opción de horario.');
            return;
        }
        estado.fase = 'pilotariak';
        gordeEgoera();
        eguneratuUI();
    });

    document.getElementById('btnResetBozketa').addEventListener('click', () => {
        if (confirm(currentLang === 'eu' ? 'Bozketa guztia berrabiarazi? Botoak galduko dira.' : '¿Resetear toda la votación? Se perderán los votos.')) {
            estado.fase = 'antolaketa';
            estado.votos = {};
            estado.opcionesOrg = [];
            estado.observaciones = '';
            gordeEgoera();
            eguneratuUI();
        }
    });

    document.getElementById('btnEnviarEmaitzak').addEventListener('click', () => {
        const mezua = sortuEmaitzenMezua();
        if (!mezua) return;
        const url = `https://wa.me/669866803?text=${encodeURIComponent(mezua)}`;
        window.open(url, '_blank');
    });

    function mostrarError(msg) {
        const errDiv = document.getElementById('errorMsg');
        errDiv.textContent = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 4000);
    }

    // Hizkuntza aldaketa
    function eguneratuHizkuntzaTestuak() {
        document.getElementById('filtroTitulo').innerHTML = currentLang === 'es' ? '🏷️ Filtrar por categoría' : '🏷️ Iragazi kategoria';
        document.getElementById('selectLabel').innerHTML = currentLang === 'es' ? '🏆 Seleccionar partido' : '🏆 Hautatu partidua';
        document.getElementById('tipoLabel').innerHTML = currentLang === 'es' ? '📌 Tipo de partido' : '📌 Partidu mota';
        document.getElementById('opcionesLabel').innerHTML = currentLang === 'es' ? '⏰ Opciones de horario (propuestas por la organización)' : '⏰ Ordutegi aukerak (antolakuntzak proposatuta)';
        document.getElementById('obsLabel').innerHTML = currentLang === 'es' ? '📝 Observaciones (ej: entre las 17:00 y 21:00)' : '📝 Oharrak (adib: 17:00 eta 21:00 artean)';
        document.getElementById('footerText').innerHTML = currentLang === 'es' ? '📌 Fase 1: Organización propone horarios. Fase 2: Pelotaris votan.' : '📌 1. fasea: Antolakuntzak ordutegiak proposatzen ditu. 2. fasea: Pilotariek bozkatzen dute.';
        if (estado.fase === 'pilotariak') errendatuBozketa();
        else if (estado.partido) kargatuConfigAntolaketa();
    }

    // Hasieraketa
    async function init() {
        await kargatuKategoriak();
        await kargatuPartidak();
        kargatuEgoera();
        eguneratuUI();
        eguneratuHizkuntzaTestuak();
        const langBtns = document.querySelectorAll('.idioma-boton');
        langBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const lang = e.target.getAttribute('data-lang');
                if (!lang) return;
                currentLang = lang;
                langBtns.forEach(b => b.classList.remove('aktibo'));
                e.target.classList.add('aktibo');
                eguneratuHizkuntzaTestuak();
                if (estado.fase === 'antolaketa' && estado.partido) kargatuConfigAntolaketa();
                else if (estado.fase === 'pilotariak') errendatuBozketa();
            });
        });
    }
    init();
</script>
</body>
</html>
