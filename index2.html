<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larraun Pilota Elkartea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #cc0000;
            --secondary-blue: #003366;
        }
        .bg-primary { background-color: var(--primary-red); }
        .text-primary { color: var(--primary-red); }
        .active-tab { border-bottom: 4px solid white; opacity: 1; }
        
        iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-red);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-hidden">

    <!-- Header / Navigation -->
    <header class="bg-primary text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-3">
                <div class="flex items-center space-x-3">
                    <div class="bg-white p-1 rounded-full">
                        <i class="fas fa-table-tennis text-primary text-xl"></i>
                    </div>
                    <h1 class="font-bold text-lg tracking-tight leading-tight">
                        LARRAUN <br> <span class="text-xs uppercase">Pilota Elkartea</span>
                    </h1>
                </div>
                
                <!-- Language Switcher -->
                <button id="langToggle" class="bg-white text-primary px-3 py-1 rounded-md text-sm font-bold hover:bg-gray-100 transition shadow-sm">
                    ES / EU
                </button>
            </div>
            
            <!-- Main Tabs -->
            <nav class="flex overflow-x-auto no-scrollbar space-x-6 text-sm font-medium mt-2">
                <button onclick="loadFrame('home')" id="tab-home" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap active-tab lang-eu">Hasiera</button>
                <button onclick="loadFrame('home')" id="tab-home-es" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap hidden lang-es">Inicio</button>
                
                <button onclick="loadFrame('ordutegiak')" id="tab-ordutegiak" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap lang-eu">Karteldegia</button>
                <button onclick="loadFrame('ordutegiak')" id="tab-ordutegiak-es" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap hidden lang-es">Cartelera</button>

                <button onclick="loadFrame('hurrengo')" id="tab-hurrengo" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap lang-eu">Hurrengoak</button>
                <button onclick="loadFrame('hurrengo')" id="tab-hurrengo-es" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap hidden lang-es">Próximos</button>

                <button onclick="loadFrame('emaitzak')" id="tab-emaitzak" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap lang-eu">Emaitzak</button>
                <button onclick="loadFrame('emaitzak')" id="tab-emaitzak-es" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap hidden lang-es">Resultados</button>

                <button onclick="loadFrame('aldaketa')" id="tab-aldaketa" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap lang-eu">Aldaketak</button>
                <button onclick="loadFrame('aldaketa')" id="tab-aldaketa-es" class="pb-2 opacity-80 hover:opacity-100 transition whitespace-nowrap hidden lang-es">Cambios</button>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="relative bg-white">
        <!-- Loading State -->
        <div id="loadingOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-10 hidden">
            <div class="loader"></div>
            <p class="mt-4 text-gray-500 font-medium lang-eu">Kargatzen...</p>
            <p class="mt-4 text-gray-500 font-medium hidden lang-es">Cargando...</p>
        </div>

        <!-- Iframe container -->
        <div id="frameContainer">
            <iframe id="mainFrame" src="https://larraunpilota.eus/index.html" title="Larraun Pilota content"></iframe>
        </div>
    </main>

    <!-- Bottom Navigation (Mobile Friendly) -->
    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around items-center py-2 md:hidden">
        <button onclick="loadFrame('home')" class="flex flex-col items-center text-primary">
            <i class="fas fa-home"></i>
            <span class="text-[10px] lang-eu">Hasiera</span>
            <span class="text-[10px] hidden lang-es">Inicio</span>
        </button>
        <button onclick="loadFrame('ordutegiak')" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-calendar-alt"></i>
            <span class="text-[10px] lang-eu">Karteldegia</span>
            <span class="text-[10px] hidden lang-es">Cartelera</span>
        </button>
        <button onclick="loadFrame('emaitzak')" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-trophy"></i>
            <span class="text-[10px] lang-eu">Emaitzak</span>
            <span class="text-[10px] hidden lang-es">Resultados</span>
        </button>
    </footer>

    <script>
        const urls = {
            home: 'https://larraunpilota.eus/index.html',
            ordutegiak: 'https://larraunpilota.eus/ordutegiak.html',
            hurrengo: 'https://larraunpilota.eus/hurrengo-ordutegiak.html',
            emaitzak: 'https://larraunpilota.eus/emaitzak1.html',
            aldaketa: 'https://larraunpilota.eus/aldaketa-osoa.html'
        };

        const frame = document.getElementById('mainFrame');
        const loader = document.getElementById('loadingOverlay');
        const langBtn = document.getElementById('langToggle');
        let currentLang = 'eu';

        function loadFrame(key) {
            // Show loader
            loader.classList.remove('hidden');
            
            // Set URL
            frame.src = urls[key];

            // Update Tabs Styling (Desktop)
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active-tab');
                if (btn.id.includes(key)) {
                    btn.classList.add('active-tab');
                }
            });

            // Update Bottom Nav Styling (Mobile)
            document.querySelectorAll('footer button').forEach(btn => {
                btn.classList.remove('text-primary');
                btn.classList.add('text-gray-500');
            });
            // We could logic map this to footer too if needed
        }

        // Hide loader when iframe finishes loading
        frame.onload = function() {
            loader.classList.add('hidden');
        };

        // Language Toggle Logic
        langBtn.addEventListener('click', () => {
            currentLang = currentLang === 'eu' ? 'es' : 'eu';
            
            if (currentLang === 'es') {
                document.querySelectorAll('.lang-eu').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.lang-es').forEach(el => el.classList.remove('hidden'));
                langBtn.innerText = 'EU / ES';
            } else {
                document.querySelectorAll('.lang-es').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.lang-eu').forEach(el => el.classList.remove('hidden'));
                langBtn.innerText = 'ES / EU';
            }
        });

        // Initialize with home active
        window.onload = () => {
            loadFrame('home');
        };
    </script>
</body>
</html>
