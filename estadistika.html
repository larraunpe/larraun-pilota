<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Estadísticas Larraun Pilota · Redes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #1e1e2f 0%, #2a2a40 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 24px;
        }

        /* Tarjeta principal elegante */
        .stats-card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 56px;
            padding: 48px 42px;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.15) inset;
            transition: all 0.2s ease;
        }

        /* Header con escudo y título */
        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 28px;
        }

        .shield-emblem {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f5e56b, #e4c42b);
            border-radius: 30px 30px 30px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 700;
            color: #1a1a2a;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.6);
            transform: rotate(2deg);
            border: 2px solid #ffd966;
        }

        .title-section h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: white;
            line-height: 1.1;
        }

        .title-section .subhead {
            font-size: 1.1rem;
            color: #b9b9d6;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 6px;
        }

        .title-section .subhead span {
            background: #34345c;
            padding: 5px 15px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #ddddf5;
        }

        /* Cuadro de total global */
        .global-record {
            background: linear-gradient(115deg, #232339, #1b1b2c);
            border-radius: 42px;
            padding: 28px 32px;
            margin-bottom: 42px;
            border: 1px solid #41416e;
            box-shadow: 0 20px 30px -15px black;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .global-stats {
            display: flex;
            gap: 38px;
        }

        .global-item {
            text-align: center;
        }

        .global-label {
            color: #a9a9e0;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .global-number {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .win-color { color: #2ee6a8; }
        .loss-color { color: #ff7b89; }
        .total-color { color: #ffdb7e; }

        .balance-badge {
            background: rgba(46, 230, 168, 0.1);
            border: 1px solid #2ee6a8;
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #c6f0e0;
        }
        .balance-badge.positive { color: #2ee6a8; }
        .balance-badge.negative { color: #ff7b89; }

        /* Grid de categorías */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 40px 0 32px;
        }

        .category-card {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 22px 14px 18px 14px;
            transition: transform 0.15s;
            box-shadow: 0 10px 20px -10px #0a0a14;
        }

        .category-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 215, 0, 0.35);
            background: rgba(30, 30, 50, 0.9);
        }

        .category-name {
            font-size: 1.9rem;
            font-weight: 700;
            color: #f2e9c2;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-shadow: 0 2px 5px #00000050;
        }

        .category-bars {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 14px 0 8px;
        }

        .bar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
        }

        .bar-label {
            color: #b5b5e0;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .bar {
            width: 28px;
            height: 80px;
            background: #26263b;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            border: 1px solid #51517e;
            box-shadow: inset 0 3px 6px #00000055;
        }

        .bar-fill-win {
            background: linear-gradient(0deg, #1ddb9a, #2ee6a8);
            width: 100%;
            height: 0%;
            transition: height 0.3s;
            border-radius: 20px 20px 4px 4px;
            box-shadow: 0 -2px 8px #2ee6a880;
        }

        .bar-fill-loss {
            background: linear-gradient(0deg, #f05b6b, #ff7b89);
            width: 100%;
            height: 0%;
            transition: height 0.3s;
            border-radius: 20px 20px 4px 4px;
            box-shadow: 0 -2px 8px #ff7b89b0;
        }

        .bar-numbers {
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 8px;
        }
        .win-number { color: #2ee6a8; margin-right: 6px; }
        .loss-number { color: #ff7b89; }

        /* Nota de partidos jugados */
        .matches-played {
            font-size: 0.9rem;
            color: #8888bb;
            text-align: center;
            border-top: 1px dashed #3a3a60;
            padding-top: 22px;
            margin-top: 20px;
        }

        .footer-note {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            color: #6b6b9c;
            font-size: 0.9rem;
        }

        .hashtags {
            color: #e4c42b;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Responsive ajustes */
        @media (max-width: 600px) {
            .stats-card { padding: 28px 18px; }
            .title-section h1 { font-size: 2.2rem; }
            .global-number { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <div class="stats-card">
        <!-- Cabecera -->
        <div class="header">
            <div class="shield-emblem">⛰️</div>
            <div class="title-section">
                <h1>LARRAUN PILOTA</h1>
                <div class="subhead">
                    <span>📊 ESTADÍSTICAS 2026 · CATEGORÍAS</span>
                    <span>⚾ 21 PARTIDOS</span>
                </div>
            </div>
        </div>

        <!-- Balance general destacado -->
        <div class="global-record">
            <div class="global-stats">
                <div class="global-item">
                    <div class="global-label">VICTORIAS</div>
                    <div class="global-number win-color">11</div>
                </div>
                <div class="global-item">
                    <div class="global-label">DERROTAS</div>
                    <div class="global-number loss-color">10</div>
                </div>
                <div class="global-item">
                    <div class="global-label">TOTAL</div>
                    <div class="global-number total-color">21</div>
                </div>
            </div>
            <div class="balance-badge positive">
                ⚖️ +1 (52% VIC)
            </div>
        </div>

        <!-- Grid de categorías con gráfico de barras elegante -->
        <div class="categories-grid" id="categoriesContainer">
            <!-- Las categorías se cargarán automáticamente con JavaScript -->
        </div>

        <!-- Fuente y fechas -->
        <div class="footer-note">
            <span>⚡ Datos: emaitzak-kartela7.html · 13-15 marzo 2026</span>
            <span class="hashtags">#LarraunPilota #Estadísticas #PelotaVasca</span>
        </div>
        <div class="matches-played">
            ⚾ Victorias/derrotas por categoría · Gráfico para RRSS
        </div>
    </div>

    <script>
        (function() {
            // Datos extraídos manualmente de la página (verificados)
            const categoriesData = [
                { name: 'SEIN', wins: 2, losses: 0, total: 2 },
                { name: 'HAUR', wins: 0, losses: 2, total: 2 },
                { name: 'KADETE', wins: 2, losses: 1, total: 3 },
                { name: 'HELDUAK', wins: 2, losses: 3, total: 5 },
                { name: 'GAZTE', wins: 2, losses: 2, total: 4 },
                { name: 'KIMU', wins: 3, losses: 2, total: 5 }
            ];

            const container = document.getElementById('categoriesContainer');
            if (!container) return;

            // Encontrar el máximo de partidos en una categoría para escalar barras (máx = 5 partidos)
            const maxTotal = Math.max(...categoriesData.map(c => c.total), 5); // al menos 5 para escala

            categoriesData.forEach(cat => {
                // Calcular porcentajes para altura de barra (mínimo 8% para que se vea)
                const winPercent = (cat.wins / maxTotal) * 100;
                const lossPercent = (cat.losses / maxTotal) * 100;

                // Crear tarjeta
                const card = document.createElement('div');
                card.className = 'category-card';

                // Nombre categoría
                const catName = document.createElement('div');
                catName.className = 'category-name';
                catName.textContent = cat.name;
                card.appendChild(catName);

                // Barras
                const barsDiv = document.createElement('div');
                barsDiv.className = 'category-bars';

                // Barra Victorias
                const winBarContainer = document.createElement('div');
                winBarContainer.className = 'bar-container';
                winBarContainer.innerHTML = `
                    <div class="bar-label">V</div>
                    <div class="bar">
                        <div class="bar-fill-win" style="height: ${winPercent}%;"></div>
                    </div>
                `;
                // Barra Derrotas
                const lossBarContainer = document.createElement('div');
                lossBarContainer.className = 'bar-container';
                lossBarContainer.innerHTML = `
                    <div class="bar-label">D</div>
                    <div class="bar">
                        <div class="bar-fill-loss" style="height: ${lossPercent}%;"></div>
                    </div>
                `;

                barsDiv.appendChild(winBarContainer);
                barsDiv.appendChild(lossBarContainer);
                card.appendChild(barsDiv);

                // Números grandes
                const numbersDiv = document.createElement('div');
                numbersDiv.style.textAlign = 'center';
                numbersDiv.style.marginTop = '10px';
                numbersDiv.innerHTML = `
                    <span class="win-number">${cat.wins}</span>
                    <span style="color:#5a5a8a;">/</span>
                    <span class="loss-number">${cat.losses}</span>
                `;
                card.appendChild(numbersDiv);

                container.appendChild(card);
            });
        })();
    </script>
</body>
</html>
