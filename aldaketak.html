<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Larraun Pilota – Aldatu partiduaren ordutegia</title>
  <link rel="icon" type="image/png" href="/egutegia.png">
  <meta property="og:title" content="Ordutegia aldatu – Larraun Pilota">
  <meta property="og:description" content="Aldatu zure partiduaren ordutegia, aukerak proposatu eta mezua WhatsApp bidez bidali.">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f0f2f5;
      padding: 16px;
    }

    .kudeaketa-kartela {
      max-width: 1300px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      padding: 20px 20px 30px;
    }

    @media (min-width: 768px) {
      body {
        padding: 24px;
      }
      .kudeaketa-kartela {
        padding: 32px 40px 40px;
        border-radius: 36px;
      }
    }

    /* header estilo */
    .header-kudeaketa {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 4px solid #b30000;
    }

    .logo-logo {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .header-kudeaketa img {
      height: 55px;
      width: auto;
      object-fit: contain;
    }

    @media (min-width: 768px) {
      .header-kudeaketa img {
        height: 80px;
      }
    }

    .header-kudeaketa h1 {
      font-size: 1.8rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #b30000;
      letter-spacing: 1px;
      text-align: center;
    }

    @media (min-width: 480px) {
      .header-kudeaketa h1 {
        font-size: 2rem;
      }
    }

    @media (min-width: 768px) {
      .header-kudeaketa h1 {
        font-size: 2.6rem;
      }
    }

    /* pestañas idioma */
    .idioma-toggle {
      display: flex;
      gap: 10px;
      background: #e9ecef;
      padding: 5px 12px;
      border-radius: 60px;
    }

    .idioma-boton {
      background: none;
      border: none;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      color: #2c3e66;
    }

    .idioma-boton.aktibo {
      background: #b30000;
      color: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    /* selector partido */
    .partidu-aukeraketa {
      background: #f8f9fc;
      border-radius: 28px;
      padding: 20px 20px;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .label-izan {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 60px;
      border: 2px solid #ccc;
      background: white;
      font-weight: 500;
      cursor: pointer;
    }

    select:focus {
      border-color: #b30000;
      outline: none;
    }

    .partidu-info-laburra {
      margin-top: 16px;
      background: #ffffff;
      padding: 14px 18px;
      border-radius: 28px;
      border-left: 8px solid #b30000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .info-linea {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 6px 0;
      font-size: 0.95rem;
    }

    .info-linea strong {
      min-width: 90px;
      color: #1e466e;
    }

    /* opciones horario */
    .aukerak-taldea {
      margin: 28px 0 20px;
    }

    .aukerak-titulua {
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .opcion-grilla {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .opcion-check {
      background: #f1f3f5;
      border-radius: 50px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .opcion-check input {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #b30000;
    }

    .opcion-check:hover {
      background: #e2e6ea;
      transform: scale(0.98);
    }

    .festibo-oharra {
      background: #fff3cd;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.85rem;
      color: #856404;
      margin-top: 10px;
    }

    /* observaciones */
    .observaciones-area {
      margin: 20px 0 24px;
    }

    textarea {
      width: 100%;
      padding: 14px 18px;
      border-radius: 24px;
      border: 2px solid #ccc;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
    }

    textarea:focus {
      border-color: #b30000;
      outline: none;
    }

    /* botón */
    .btn-whatsapp {
      background: #25D366;
      border: none;
      width: 100%;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: 800;
      color: white;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-top: 8px;
    }

    .btn-whatsapp:hover {
      background: #1da15e;
      transform: translateY(-2px);
    }

    .error-msg {
      color: #b30000;
      background: #ffe6e6;
      border-radius: 40px;
      padding: 10px 16px;
      margin-top: 16px;
      font-weight: 600;
      display: none;
    }

    footer {
      margin-top: 36px;
      text-align: center;
      font-weight: 500;
      border-top: 2px solid #ddd;
      padding-top: 20px;
      font-size: 0.9rem;
      color: #444;
    }

    @media (max-width: 550px) {
      .opcion-check {
        padding: 6px 14px;
        font-size: 0.85rem;
      }
      .kudeaketa-kartela {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
<div class="kudeaketa-kartela">
  <div class="header-kudeaketa">
    <div class="logo-logo">
      <img src="images/logo-larraun.png" alt="Larraun Pilota">
      <img src="images/logo-fnp.png" alt="FNP">
    </div>
    <h1>⚡ ORDUTEGIA ALDATU</h1>
    <div class="idioma-toggle" id="idiomaToggle">
      <button class="idioma-boton aktibo" data-lang="eu">EUSKARA</button>
      <button class="idioma-boton" data-lang="es">CASTELLANO</button>
    </div>
  </div>

  <!-- selector partido -->
  <div class="partidu-aukeraketa">
    <div class="label-izan">
      <span>🏆</span> <span id="selectPartidoLabel">🔽 Hautatu partidua / Selecciona el partido</span>
    </div>
    <select id="partidoSelect">
      <option value="">-- Kargatzen... / Cargando --</option>
    </select>
    <div id="partidoInfoPreview" class="partidu-info-laburra" style="display: none;">
      <!-- se rellena dinámicamente -->
    </div>
  </div>

  <!-- opciones horario -->
  <div class="aukerak-taldea">
    <div class="aukerak-titulua">
      <span>⏰</span> <span id="horarioTitle">📅 Proposatu ordutegi berriak / Propón nuevos horarios</span>
    </div>
    <div class="opcion-grilla" id="opcionesContainer"></div>
    <div id="festivosMsg" class="festibo-oharra" style="display: none;"></div>
  </div>

  <!-- observaciones -->
  <div class="observaciones-area">
    <label id="obsLabel" style="font-weight: 700; display: block; margin-bottom: 8px;">📝 Oharrak / Observaciones (aukerakoa / opcional)</label>
    <textarea id="observaciones" rows="3" placeholder="Adibidez: ezin dugu goizeko ordutegira, mesedez ahal bada arratsaldez. / Ej: no podemos por la mañana, por favor tarde si es posible."></textarea>
  </div>

  <!-- botón whatsapp -->
  <button id="enviarWhatsappBtn" class="btn-whatsapp">
    💬 <span id="btnText">WhatsApp bidez mezua sortu / Generar mensaje WhatsApp</span>
  </button>
  <div id="errorMsg" class="error-msg"></div>
  <footer>
    <span>📲 Mezua zure telefonoan irekiko da bidali aurretik · El mensaje se abrirá en tu teléfono antes de enviar</span>
  </footer>
</div>

<script>
  // -----------------------------------------------
  // 1. DATUAK KARGATU (partidak ofizialak + ez ofizialak)
  // -----------------------------------------------
  let partidaGuztiak = [];      // array con todos los partidos (oficiales + no oficiales)
  let partidoSeleccionado = null;

  // Fechas de festivos en Navarra 2025 (ampliable)
  // formato 'YYYY-MM-DD'
  const festivosNavarra = [
    '2025-01-01', '2025-01-06', '2025-04-18', '2025-05-01', '2025-07-25',
    '2025-08-15', '2025-10-12', '2025-11-01', '2025-12-06', '2025-12-08', '2025-12-25'
  ];
  // Para simplificar, también detectamos cualquier fecha que caiga en festivo local (podemos ampliar)
  function esFestivoEnNavarra(fechaStr) {
    if (!fechaStr) return false;
    // fechaStr formato "YYYY/MM/DD" o "YYYY-MM-DD"? en nuestros datos viene "2025/04/10"
    let normalizada = fechaStr.replace(/\//g, '-');
    return festivosNavarra.includes(normalizada);
  }

  async function kargatuPartidak() {
    try {
      const [oficialesResp, noOficialesResp] = await Promise.all([
        fetch('/data/cartelera-larraun.json'),
        fetch('/data/partidos-no-oficiales.json')
      ]);
      if (!oficialesResp.ok || !noOficialesResp.ok) throw new Error('Errorea datuak kargatzean');
      const ofi = await oficialesResp.json();
      const noOfi = await noOficialesResp.json();
      
      // unimos, añadiendo un flag de fuente para debug
      const todos = [...ofi, ...noOfi];
      // limpiar textos 'Descanso'
      todos.forEach(p => {
        if (p.etxekoa && p.etxekoa.includes('Descanso')) p.etxekoa = p.etxekoa.replace('Descanso', 'Atsedena');
        if (p.kanpokoak && p.kanpokoak.includes('Descanso')) p.kanpokoak = p.kanpokoak.replace('Descanso', 'Atsedena');
      });
      partidaGuztiak = todos;
    } catch (err) {
      console.error(err);
      const select = document.getElementById('partidoSelect');
      select.innerHTML = '<option value="">❌ Ezin izan da partidurik kargatu / No se pudieron cargar partidos</option>';
    }
  }

  // Obtener nombre del equipo Larraun (el que contenga LARRAUN)
  function getEquipoLarraun(partida) {
    const local = partida.etxekoa || '';
    const visitante = partida.kanpokoak || '';
    if (local.toUpperCase().includes('LARRAUN')) return local;
    if (visitante.toUpperCase().includes('LARRAUN')) return visitante;
    return null;
  }

  // Formatear fecha legible
  function formatearFecha(fechaStr, lang) {
    if (!fechaStr) return lang === 'eu' ? 'data ezezaguna' : 'fecha desconocida';
    const partes = fechaStr.split('/');
    if (partes.length !== 3) return fechaStr;
    const [anyo, mes, dia] = partes;
    const fechaObj = new Date(anyo, mes-1, dia);
    const diasSemanaEu = ['Igandea', 'Astelehena', 'Asteartea', 'Asteazkena', 'Osteguna', 'Ostirala', 'Larunbata'];
    const diasSemanaEs = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const diaSemana = fechaObj.getDay();
    if (lang === 'eu') {
      return `${diasSemanaEu[diaSemana]}, ${dia}/${mes}/${anyo}`;
    } else {
      return `${diasSemanaEs[diaSemana]}, ${dia}/${mes}/${anyo}`;
    }
  }

  // Actualizar preview del partido seleccionado
  function actualizarPreviewPartido(partida, lang) {
    const previewDiv = document.getElementById('partidoInfoPreview');
    if (!partida) {
      previewDiv.style.display = 'none';
      return;
    }
    previewDiv.style.display = 'block';
    const fechaFormateada = formatearFecha(partida.fecha, lang);
    const local = partida.etxekoa || '?';
    const visitante = partida.kanpokoak || '?';
    const fronton = partida.fronton || 'Frontoi zehaztu gabe';
    const lehiaketa = partida.lehiaketa || partida.modalidad || 'Lehiaketa';
    const horaRaw = partida.hora || '--:--';
    const horaMostrar = horaRaw.includes('provisional') ? horaRaw : horaRaw;
    
    if (lang === 'eu') {
      previewDiv.innerHTML = `
        <div class="info-linea"><strong>📅 Data:</strong> ${fechaFormateada}  |  🕒 ${horaMostrar}</div>
        <div class="info-linea"><strong>🏟️ Frontoi:</strong> ${fronton}</div>
        <div class="info-linea"><strong>🏠 Etxekoa:</strong> ${local} &nbsp;|&nbsp; <strong>✈️ Kanpokoa:</strong> ${visitante}</div>
        <div class="info-linea"><strong>🏆 Lehiaketa:</strong> ${lehiaketa}</div>
      `;
    } else {
      previewDiv.innerHTML = `
        <div class="info-linea"><strong>📅 Fecha:</strong> ${fechaFormateada}  |  🕒 ${horaMostrar}</div>
        <div class="info-linea"><strong>🏟️ Frontón:</strong> ${fronton}</div>
        <div class="info-linea"><strong>🏠 Local:</strong> ${local} &nbsp;|&nbsp; <strong>✈️ Visitante:</strong> ${visitante}</div>
        <div class="info-linea"><strong>🏆 Competición:</strong> ${lehiaketa}</div>
      `;
    }
  }

  // Generar opciones de horario (dinámico según festivos)
  function generarOpcionesHorario(fechaPartidoStr, langActual) {
    // opciones base
    const opcionesBase = [
      { id: 'lun_tarde',  labelEu: 'Astelehena arratsaldea', labelEs: 'Lunes tarde' },
      { id: 'mar_tarde',  labelEu: 'Asteartea arratsaldea', labelEs: 'Martes tarde' },
      { id: 'mie_tarde',  labelEu: 'Asteazkena arratsaldea', labelEs: 'Miércoles tarde' },
      { id: 'jue_tarde',  labelEu: 'Osteguna arratsaldea', labelEs: 'Jueves tarde' },
      { id: 'vie_tarde',  labelEu: 'Ostirala arratsaldea', labelEs: 'Viernes tarde' },
      { id: 'sab_manana', labelEu: 'Larunbata goiza', labelEs: 'Sábado mañana' },
      { id: 'sab_tarde',  labelEu: 'Larunbata arratsaldea', labelEs: 'Sábado tarde' },
      { id: 'dom_manana', labelEu: 'Igandea goiza', labelEs: 'Domingo mañana' },
      { id: 'dom_tarde',  labelEu: 'Igandea arratsaldea', labelEs: 'Domingo tarde' }
    ];
    let opciones = [...opcionesBase];
    // festivos detectar si el partido es de una semana concreta? según requerimiento: dar opción festivo de lunes a viernes por la mañana si es festivo en Navarra
    // Necesitamos una fecha de referencia? Usamos la fecha del partido para determinar la semana? Pero la solicitud pide: "Si se detecta que un día de lunes a viernes es festivo en Navarra, dará la opción de ese día por la mañana."
    // Tomamos como referencia la semana del partido: comprobar fechas de lunes a viernes de esa semana. Simplemente generamos dinámicamente.
    if (fechaPartidoStr) {
      const partes = fechaPartidoStr.split('/');
      if (partes.length === 3) {
        const anyo = parseInt(partes[0]);
        const mes = parseInt(partes[1])-1;
        const dia = parseInt(partes[2]);
        const fechaRef = new Date(anyo, mes, dia);
        // obtenemos el lunes de esa semana
        const diaSemana = fechaRef.getDay(); // 0 domingo
        const diffLunes = diaSemana === 0 ? 6 : diaSemana-1;
        const lunes = new Date(fechaRef);
        lunes.setDate(fechaRef.getDate() - diffLunes);
        // revisar lunes a viernes de esa semana
        for (let i=0; i<5; i++) {
          const diaActual = new Date(lunes);
          diaActual.setDate(lunes.getDate() + i);
          const fechaStrNorm = `${diaActual.getFullYear()}-${String(diaActual.getMonth()+1).padStart(2,'0')}-${String(diaActual.getDate()).padStart(2,'0')}`;
          if (festivosNavarra.includes(fechaStrNorm)) {
            // añadir opción mañana de ese día de semana (nombre)
            const nombreDiaEu = ['Astelehena', 'Asteartea', 'Asteazkena', 'Osteguna', 'Ostirala'][i];
            const nombreDiaEs = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'][i];
            const opId = `fest_${i}_manana`;
            // evitar duplicados
            if (!opciones.some(o => o.id === opId)) {
              opciones.push({
                id: opId,
                labelEu: `${nombreDiaEu} goiza (JAIA)`,
                labelEs: `${nombreDiaEs} mañana (FESTIVO)`
              });
            }
          }
        }
      }
    }
    return opciones;
  }

  let opcionesActuales = [];

  function renderizarOpciones(lang, fechaPartido) {
    const container = document.getElementById('opcionesContainer');
    const opciones = generarOpcionesHorario(fechaPartido, lang);
    opcionesActuales = opciones;
    container.innerHTML = '';
    opciones.forEach(op => {
      const label = lang === 'eu' ? op.labelEu : op.labelEs;
      const wrapper = document.createElement('label');
      wrapper.className = 'opcion-check';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = op.id;
      cb.setAttribute('data-label-eu', op.labelEu);
      cb.setAttribute('data-label-es', op.labelEs);
      wrapper.appendChild(cb);
      wrapper.appendChild(document.createTextNode(' ' + label));
      container.appendChild(wrapper);
    });
    // mostrar mensaje festivos si aplica
    const festMsgDiv = document.getElementById('festivosMsg');
    if (opciones.some(o => o.id.startsWith('fest_'))) {
      festMsgDiv.style.display = 'block';
      festMsgDiv.innerHTML = lang === 'eu' ? '📢 Jaieguna dela eta, goizeko aukera erantsi da astelehenetik ostiralera.' : '📢 Se ha añadido opción por la mañana en días festivos (de lunes a viernes).';
    } else {
      festMsgDiv.style.display = 'none';
    }
  }

  // Obtener opciones marcadas (texto en cada idioma)
  function getOpcionesMarcadas(lang) {
    const checkboxes = document.querySelectorAll('#opcionesContainer input[type="checkbox"]');
    const seleccionadas = [];
    checkboxes.forEach(cb => {
      if (cb.checked) {
        const label = lang === 'eu' ? cb.getAttribute('data-label-eu') : cb.getAttribute('data-label-es');
        if (label) seleccionadas.push(label);
        else {
          // fallback
          const op = opcionesActuales.find(o => o.id === cb.value);
          if (op) seleccionadas.push(lang === 'eu' ? op.labelEu : op.labelEs);
        }
      }
    });
    return seleccionadas;
  }

  // Generar mensaje final (bilingüe)
  function generarMensaje(lang) {
    if (!partidoSeleccionado) return null;
    const equipoLarraun = getEquipoLarraun(partidoSeleccionado);
    if (!equipoLarraun) return null;
    const fechaOriginal = partidoSeleccionado.fecha;
    const fechaLegible = formatearFecha(fechaOriginal, lang);
    const fronton = partidoSeleccionado.fronton || 'Frontoi zehaztu gabe';
    const opcionesSel = getOpcionesMarcadas(lang);
    if (opcionesSel.length === 0) return null;
    const observaciones = document.getElementById('observaciones').value.trim();
    
    let mensaje = '';
    if (lang === 'eu') {
      mensaje = `🔄 *ORDUTEGI ALDAKETA ESKAERA* 🔄\n\n`;
      mensaje += `🏠 ${equipoLarraun} taldeak partiduaren ordutegia aldatzea eskatzen du.\n`;
      mensaje += `📅 Jatorrizko partidua: *${fechaLegible}* - 🕒 ${partidoSeleccionado.hora || 'ordua zehazteke'}\n`;
      mensaje += `🎯 Frontoia: ${fronton}\n\n`;
      mensaje += `✅ *Proposatutako ordutegi aukerak:*\n${opcionesSel.map(o => `   • ${o}`).join('\n')}\n`;
      if (observaciones) {
        mensaje += `\n📌 *Oharrak:* ${observaciones}\n`;
      }
      mensaje += `\n🙏 Eskerrik asko aldez aurretik.\n📍 Larraun Pilota Elkartea`;
    } else {
      mensaje = `🔄 *SOLICITUD DE CAMBIO DE HORARIO* 🔄\n\n`;
      mensaje += `🏠 El equipo formado por *${equipoLarraun}* solicita cambiar el horario del partido.\n`;
      mensaje += `📅 Partido fijado: *${fechaLegible}* - 🕒 ${partidoSeleccionado.hora || 'hora por definir'}\n`;
      mensaje += `🎯 Frontón: ${fronton}\n\n`;
      mensaje += `✅ *Opciones propuestas:*\n${opcionesSel.map(o => `   • ${o}`).join('\n')}\n`;
      if (observaciones) {
        mensaje += `\n📌 *Nota:* ${observaciones}\n`;
      }
      mensaje += `\n🙏 Muchas gracias de antemano. Un saludo.\n📍 Larraun Pilota Elkartea`;
    }
    // Añadir emojis extra y formato amigable
    return mensaje;
  }

  // Actualizar interfaz según idioma
  let currentLang = 'eu';
  function actualizarIdioma(lang) {
    currentLang = lang;
    // textos estáticos
    document.getElementById('selectPartidoLabel').innerHTML = lang === 'eu' ? '🔽 Hautatu partidua' : '🔽 Selecciona el partido';
    document.getElementById('horarioTitle').innerHTML = lang === 'eu' ? '📅 Proposatu ordutegi berriak' : '📅 Propón nuevos horarios';
    document.getElementById('obsLabel').innerHTML = lang === 'eu' ? '📝 Oharrak / Observaciones (aukerakoa)' : '📝 Observaciones (opcional)';
    document.getElementById('btnText').innerHTML = lang === 'eu' ? 'WhatsApp bidez mezua sortu' : 'Generar mensaje WhatsApp';
    // volver a renderizar opciones con el idioma actual y fecha del partido seleccionado
    if (partidoSeleccionado) {
      renderizarOpciones(lang, partidoSeleccionado.fecha);
      actualizarPreviewPartido(partidoSeleccionado, lang);
    } else {
      // si no hay partido, igual renderizar opciones por si acaso
      renderizarOpciones(lang, null);
    }
    // cambiar placeholder textarea
    const textarea = document.getElementById('observaciones');
    if (lang === 'eu') {
      textarea.placeholder = "Adibidez: ezin dugu goizeko ordutegira, mesedez ahal bada arratsaldez.";
    } else {
      textarea.placeholder = "Ejemplo: no podemos por la mañana, por favor tarde si es posible.";
    }
  }

  // Llenar selector de partidos
  async function initSelectPartidos() {
    await kargatuPartidak();
    const select = document.getElementById('partidoSelect');
    if (partidaGuztiak.length === 0) {
      select.innerHTML = '<option value="">❌ Ez dago partidarik / No hay partidos</option>';
      return;
    }
    select.innerHTML = '<option value="">-- Aukeratu partidua / Seleccionar partido --</option>';
    partidaGuztiak.forEach((p, idx) => {
      const local = p.etxekoa || '?';
      const visitante = p.kanpokoak || '?';
      const comp = p.lehiaketa || p.modalidad || '';
      const fechaCorta = p.fecha || 'sin fecha';
      const option = document.createElement('option');
      option.value = idx;
      option.textContent = `${fechaCorta} | ${local} vs ${visitante} | ${comp}`;
      select.appendChild(option);
    });
    select.addEventListener('change', (e) => {
      const idx = e.target.value;
      if (idx === "") {
        partidoSeleccionado = null;
        document.getElementById('partidoInfoPreview').style.display = 'none';
        renderizarOpciones(currentLang, null);
        return;
      }
      partidoSeleccionado = partidaGuztiak[parseInt(idx)];
      actualizarPreviewPartido(partidoSeleccionado, currentLang);
      renderizarOpciones(currentLang, partidoSeleccionado.fecha);
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.style.display = 'none';
    });
  }

  // Evento botón WhatsApp
  document.getElementById('enviarWhatsappBtn').addEventListener('click', () => {
    if (!partidoSeleccionado) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = currentLang === 'eu' ? '❌ Hautatu partidua lehenik.' : '❌ Selecciona un partido primero.';
      return;
    }
    const opcionesMarcadas = getOpcionesMarcadas(currentLang);
    if (opcionesMarcadas.length === 0) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = currentLang === 'eu' ? '⚠️ Aukeratu gutxienez ordutegi aukera bat.' : '⚠️ Selecciona al menos una opción de horario.';
      return;
    }
    const mensaje = generarMensaje(currentLang);
    if (!mensaje) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.style.display = 'block';
      errorDiv.innerHTML = currentLang === 'eu' ? '❌ Errorea mezua sortzean.' : '❌ Error generando mensaje.';
      return;
    }
    const urlWhatsapp = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
    window.open(urlWhatsapp, '_blank');
  });

  // Toggle idioma
  const langBtns = document.querySelectorAll('.idioma-boton');
  langBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const lang = e.target.getAttribute('data-lang');
      if (!lang) return;
      langBtns.forEach(b => b.classList.remove('aktibo'));
      e.target.classList.add('aktibo');
      actualizarIdioma(lang);
    });
  });

  // Inicializar todo
  initSelectPartidos().then(() => {
    actualizarIdioma('eu');
  });
</script>
</body>
</html>
