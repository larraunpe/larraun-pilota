name: Actualizar cartelera Larraun

on:
  schedule:
    # 08:00, 15:00 y 20:00 Europe/Madrid (invierno UTC+1)
    - cron: "0 7,8,13,14,15,18,19,20 * * 1,2"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ⛔️ importante: NO guardar dependencias en git
      - name: Instalar jsdom
        run: npm install jsdom --no-save

      - name: Ejecutar scraper
        run: node scripts/scrape-cartelera.js

      - name: Commit cambios
        run: |
          git config user.name "larraun-bot"
          git config user.email "bot@larraunpilota.eus"

          git add data/cartelera-larraun.json
          git commit -m "🔄 Actualiza cartelera Larraun" || echo "Sin cambios"
          git push
