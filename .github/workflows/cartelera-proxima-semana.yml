name: Actualizar cartelera - Semana siguiente

on:
  schedule:
    - cron: "0 7,8,13,14,15,18,19,20 * * *"
  workflow_dispatch:

jobs:
  update-next-week:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar jsdom
        run: npm install jsdom --no-save

      - name: Ejecutar scraper
        run: node scripts/scrape-cartelera-proxima-semana.mjs

      - name: 📤 Subir HTML de depuración
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: data/debug-response.html

      - name: Commit y push
        run: |
          git config user.name "larraun-bot"
          git config user.email "bot@larraunpilota.eus"
          git add data/cartelera-proxima-semana.json
          git commit -m "🔄 Actualiza cartelera semana siguiente ($(date +'%Y-%m-%d'))" || echo "Sin cambios"
          git push
